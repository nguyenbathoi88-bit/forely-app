<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORELY - Explore the Future</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .page { display: none; }
        .page.active { display: block; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* Màu chủ đạo Indigo từ Logo */
        :root {
            --primary-indigo: #1e293b; /* Indigo đậm */
            --bg-indigo-light: #f1f5f9; /* Indigo rất nhạt cho nền */
        }
        
        /* Hiệu ứng Glassmorphism nhẹ cho thẻ dự báo */
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(5px); }
    </style>
</head>
<body class="bg-[#f1f5f9] min-h-screen pb-24 font-sans text-slate-800">

    <nav class="bg-white p-3.5 sticky top-0 z-50 flex justify-between items-center border-b border-slate-200 shadow-sm">
        <div class="flex items-center gap-2.5">
            <div class="w-8 h-8 flex items-center justify-center rounded-full bg-[#1e293b] p-1.5 shadow-md">
                <svg viewBox="0 0 100 100" class="w-full h-full fill-white">
                    <circle cx="50" cy="50" r="45" stroke="white" stroke-width="6" fill="none"/>
                    <path d="M50 5 L50 20 M50 80 L50 95 M5 50 L20 50 M80 50 L95 50" stroke="white" stroke-width="6"/>
                    <polygon points="50,15 60,50 50,85 40,50" fill="white"/>
                </svg>
            </div>
            <h1 class="text-2xl font-black text-[#1e293b] tracking-tighter italic">Forely</h1>
        </div>
        <div onclick="showPage('portfolio-page')" class="bg-[#f1f5f9] px-4 py-2 rounded-full border border-slate-200 flex items-center gap-1.5 active:scale-95 transition-all">
            <span class="text-amber-500 text-[10px]">💎</span>
            <span id="header-balance" class="text-[10px] font-black text-slate-700 tracking-wider">1,250 P</span>
        </div>
    </nav>

    <div id="home-page" class="page active">
        <div class="flex gap-2.5 overflow-x-auto p-4 bg-white no-scrollbar border-b border-slate-100 sticky top-[75px] z-40">
            <button onclick="filterEvents('Tất cả', this)" class="category-tab whitespace-nowrap px-6 py-2 rounded-full bg-[#1e293b] text-white font-bold text-[10px] uppercase tracking-widest shadow-lg shadow-indigo-900/20">Tất cả</button>
            <button onclick="filterEvents('Kinh tế', this)" class="category-tab whitespace-nowrap px-6 py-2 rounded-full bg-[#f1f5f9] text-[#64748b] font-bold text-[10px] uppercase tracking-widest border border-slate-200">Kinh tế</button>
            <button onclick="filterEvents('Giải trí', this)" class="category-tab whitespace-nowrap px-6 py-2 rounded-full bg-[#f1f5f9] text-[#64748b] font-bold text-[10px] uppercase tracking-widest border border-slate-200">Giải trí</button>
            <button onclick="filterEvents('Công nghệ', this)" class="category-tab whitespace-nowrap px-6 py-2 rounded-full bg-[#f1f5f9] text-[#64748b] font-bold text-[10px] uppercase tracking-widest border border-slate-200">Công nghệ</button>
            <button onclick="filterEvents('Thể thao', this)" class="category-tab whitespace-nowrap px-6 py-2 rounded-full bg-[#f1f5f9] text-[#64748b] font-bold text-[10px] uppercase tracking-widest border border-slate-200">Thể thao</button>
            <button onclick="filterEvents('Đời sống', this)" class="category-tab whitespace-nowrap px-6 py-2 rounded-full bg-[#f1f5f9] text-[#64748b] font-bold text-[10px] uppercase tracking-widest border border-slate-200">Đời sống</button>
        </div>

        <div id="grid-container" class="p-3 grid grid-cols-2 gap-3">
            </div>
    </div>

    <div class="fixed bottom-6 left-6 right-6 bg-white/95 backdrop-blur-md border border-slate-200 flex justify-around py-4.5 rounded-[2rem] shadow-2xl z-50">
        <button onclick="showPage('home-page')" id="n-home" class="flex flex-col items-center gap-1.5 text-[#1e293b] scale-105 font-black">
            <span class="text-xl">🏛️</span>
            <span class="text-[8px] font-black uppercase tracking-widest">Khám phá</span>
        </button>
        <button onclick="showPage('portfolio-page')" id="n-wallet" class="flex flex-col items-center gap-1.5 text-slate-400">
            <span class="text-xl">💎</span>
            <span class="text-[8px] font-black uppercase tracking-widest">Đổi quà</span>
        </button>
        <button onclick="alert('Bảng xếp hạng đang cập nhật!')" class="flex flex-col items-center gap-1.5 text-slate-400">
            <span class="text-xl">🏆</span>
            <span class="text-[8px] font-black uppercase tracking-widest">Hạng</span>
        </button>
    </div>

    <script>
        // Tạo dữ liệu cho 50 dự báo (giữ nguyên logic cũ)
        const categories = ["Kinh tế", "Giải trí", "Công nghệ", "Thể thao", "Đời sống"];
        const samples = ["VN-Index vượt 1.500?", "SJC lên 120 triệu?", "iPhone 18 bỏ sạc?", "Việt Nam dự World Cup?", "Sơn Tùng ra Album?", "Lãi suất giảm 3%?"];
        
        const allEvents = Array.from({ length: 50 }, (_, i) => ({
            id: i + 1,
            cat: categories[i % categories.length],
            title: samples[i % samples.length] + " #" + (i + 1),
            yes: Math.floor(Math.random() * 90 + 5) + "%",
            vol: (Math.random() * 5).toFixed(1) + "B P"
        }));

        function render(data = allEvents) {
            const container = document.getElementById('grid-container');
            container.innerHTML = data.map(e => `
                <div class="glass-card p-3 rounded-2xl border border-slate-200 active:scale-95 transition-all shadow-sm">
                    <div class="flex justify-between items-center mb-1.5">
                        <span class="text-[8px] font-black uppercase text-[#1e293b] bg-[#f1f5f9] px-1.5 py-0.5 rounded-md">${e.cat}</span>
                        <span class="text-[8px] text-slate-400 font-bold">${e.vol}</span>
                    </div>
                    <h3 class="text-[11px] font-bold text-slate-800 line-clamp-2 mb-3 leading-tight h-7 italic">${e.title}</h3>
                    <div class="flex gap-1.5">
                        <button onclick="trade()" class="flex-1 bg-[#1e293b] text-white text-[9px] font-black py-1.5 rounded-lg active:bg-indigo-950 transition-all">CÓ ${e.yes}</button>
                        <button onclick="trade()" class="flex-1 bg-[#f1f5f9] text-[#64748b] text-[9px] font-black py-1.5 rounded-lg border border-slate-200">KHÔNG</button>
                    </div>
                </div>
            `).join('');
        }

        // Logic Lọc, Tìm kiếm và Chuyển trang (Giữ nguyên)
        function filterEvents(category, el) {
            document.querySelectorAll('.category-tab').forEach(t => {
                t.className = "category-tab whitespace-nowrap px-6 py-2 rounded-full bg-[#f1f5f9] text-[#64748b] font-bold text-[10px] uppercase tracking-widest border border-slate-200";
            });
            el.className = "category-tab whitespace-nowrap px-6 py-2 rounded-full bg-[#1e293b] text-white font-bold text-[10px] uppercase tracking-widest shadow-lg shadow-indigo-900/20";
            render(category === 'Tất cả' ? allEvents : allEvents.filter(e => e.cat === category));
        }

        function trade() { alert("🎯 Dự báo thành công! (100 P)"); }

        render();
    </script>
</body>
</html>
