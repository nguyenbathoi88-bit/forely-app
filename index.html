<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forely Prediction Market</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#1e1e2f,#000);
color:white;
padding:30px
}

.market{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:10px;
margin-bottom:20px
}

.bar{
display:flex;
height:30px;
border-radius:5px;
overflow:hidden;
margin:10px 0
}

.yes{
background:#00c853;
text-align:center
}

.no{
background:#ff5252;
text-align:center
}

button{
padding:10px;
border:none;
border-radius:5px;
cursor:pointer;
font-weight:bold
}

.yesBtn{background:#00c853}
.noBtn{background:#ff5252}

.wallet{
background:rgba(255,255,255,0.1);
padding:20px;
margin-bottom:20px;
border-radius:10px
}

.news{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:10px;
margin-top:30px
}

</style>

</head>

<body>

<h1>Forely Prediction Market</h1>

<div class="wallet">

<h2>Wallet</h2>

Balance: <span id="balance">100</span> credits

<br><br>

<button onclick="generateQR()">Deposit</button>

<div id="qr"></div>

</div>

<input id="betAmount" type="number" value="10">

<div id="markets"></div>

<div class="news">

<h2>Tin tức từ báo</h2>

<ul id="newsList"></ul>

</div>

<script>

let balance=100

let markets=[

{
id:1,
question:"Bitcoin > $100k năm 2026?",
yesPool:600,
noPool:400
},

{
id:2,
question:"AI thay thế dev vào 2027?",
yesPool:500,
noPool:500
}

]

function renderMarkets(){

const container=document.getElementById("markets")

container.innerHTML=""

markets.forEach(m=>{

const total=m.yesPool+m.noPool

const yes=Math.round(m.yesPool/total*100)

const no=100-yes

const div=document.createElement("div")

div.className="market"

div.innerHTML=`

<h3>${m.question}</h3>

<div class="bar">

<div class="yes" style="width:${yes}%">YES ${yes}%</div>

<div class="no" style="width:${no}%">NO ${no}%</div>

</div>

<button class="yesBtn" onclick="bet(${m.id},'yes')">Bet YES</button>

<button class="noBtn" onclick="bet(${m.id},'no')">Bet NO</button>

`

container.appendChild(div)

})

}

function bet(id,side){

const amount=parseInt(document.getElementById("betAmount").value)

if(balance<amount){

alert("Không đủ tiền")

return

}

balance-=amount

document.getElementById("balance").innerText=balance

const m=markets.find(x=>x.id==id)

if(side==="yes"){

m.yesPool+=amount

}else{

m.noPool+=amount

}

renderMarkets()

}

function generateQR(){

const bank="970422"

const account="0123456789"

const amount=100000

const url=`https://img.vietqr.io/image/${bank}-${account}-compact2.png?amount=${amount}&addInfo=deposit`

document.getElementById("qr").innerHTML=`<img src="${url}" width="200">`

}



/* LOAD NEWS RSS */

async function loadNews(){

const rss="https://api.allorigins.win/get?url="+encodeURIComponent("https://vnexpress.net/rss/tin-moi-nhat.rss")

const res=await fetch(rss)

const data=await res.json()

const parser=new DOMParser()

const xml=parser.parseFromString(data.contents,"text/xml")

const items=xml.querySelectorAll("item")

const list=document.getElementById("newsList")

items.forEach((item,i)=>{

if(i>5)return

const title=item.querySelector("title").textContent

const link=item.querySelector("link").textContent

const li=document.createElement("li")

li.innerHTML=`<a href="${link}" target="_blank">${title}</a>`

list.appendChild(li)

})

}

renderMarkets()

loadNews()

</script>

</body>

</html>
