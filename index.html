<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORELY - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page { display: none; }
        .page.active { display: block; }
        .text-gradient { background: linear-gradient(135deg, #0d9488 0%, #7e22ce 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="bg-[#f1f5f9] min-h-screen font-sans">

    <div id="login-page" class="page active">
        <div class="flex flex-col items-center justify-center min-h-screen p-6 text-center">
            <div class="w-20 h-20 bg-gradient-to-br from-teal-500 to-purple-600 rounded-[2rem] flex items-center justify-center rotate-45 mb-8 shadow-2xl">
                <span class="text-white text-4xl font-black rotate-[-45deg] italic">F</span>
            </div>
            <h1 class="text-4xl font-black italic tracking-tighter text-gradient mb-2 uppercase">Forely</h1>
            <p class="text-slate-500 text-sm font-medium mb-12">Dự đoán tương lai - Nhận quà giá trị</p>

            <div class="w-full space-y-4">
                <button onclick="fakeLogin('Google')" class="w-full bg-white border border-slate-200 py-4 rounded-2xl flex items-center justify-center gap-3 shadow-sm active:scale-95 transition-all">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-5 h-5">
                    <span class="font-bold text-slate-700">Tiếp tục với Google</span>
                </button>
                <button onclick="fakeLogin('Facebook')" class="w-full bg-[#1877F2] text-white py-4 rounded-2xl flex items-center justify-center gap-3 shadow-sm active:scale-95 transition-all">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_2023.png" class="w-5 h-5 invert">
                    <span class="font-bold">Tiếp tục với Facebook</span>
                </button>
            </div>
            <p class="mt-8 text-[10px] text-slate-400 px-6 italic">Bằng cách đăng nhập, bạn đồng ý với Điều khoản và mô hình Dự đoán có thưởng của Forely.</p>
        </div>
    </div>

    <div id="main-app" class="page">
        <div class="p-6 text-center">
            <h2 class="text-xl font-bold">Chào mừng bạn đã quay lại!</h2>
            <button onclick="location.reload()" class="mt-4 text-teal-600 font-bold underline">Vào sảnh dự báo</button>
        </div>
    </div>

    <script>
        function fakeLogin(provider) {
            // Đây là nơi Web3Auth sẽ xử lý thực tế
            alert(`Đang kết nối với ${provider}...`);
            setTimeout(() => {
                document.getElementById('login-page').classList.remove('active');
                document.getElementById('main-app').classList.add('active');
            }, 1000);
        }
    </script>
</body>
</html>
