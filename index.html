<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORELY - Forecast Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .page { display: none; }
        .page.active { display: block; }
        .logo-diamond { background: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 100%); clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }
        .text-gradient { background: linear-gradient(135deg, #0891b2 0%, #7e22ce 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-gradient { background: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 100%); }
        .tab-active { background-color: #0f172a !important; color: white !important; box-shadow: 0 4px 12px rgba(15, 23, 42, 0.2); }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen pb-32 font-sans text-slate-800">

    <div id="home-page" class="page active">
        <nav class="bg-white/90 backdrop-blur-md p-5 sticky top-0 z-50 flex justify-between items-center border-b border-slate-100">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 logo-diamond shadow-lg"></div>
                <h1 class="text-2xl font-black tracking-tighter italic text-gradient">FORELY</h1>
            </div>
            <div class="bg-slate-100 px-4 py-2 rounded-2xl border border-slate-200 flex items-center gap-2">
                <span class="text-amber-500">💎</span>
                <span id="header-balance" class="text-xs font-black text-slate-700">1,250 P</span>
            </div>
        </nav>

        <div class="flex gap-2 overflow-x-auto p-4 bg-white no-scrollbar border-b border-slate-100 sticky top-[73px] z-40">
            <button onclick="filterEvents('Tất cả', this)" class="category-tab tab-active whitespace-nowrap px-6 py-2.5 rounded-full bg-slate-100 text-slate-500 font-bold text-[11px] uppercase tracking-widest transition-all">Tất cả</button>
            <button onclick="filterEvents('Kinh tế', this)" class="category-tab whitespace-nowrap px-6 py-2.5 rounded-full bg-slate-100 text-slate-500 font-bold text-[11px] uppercase tracking-widest transition-all">Kinh tế</button>
            <button onclick="filterEvents('Giải trí', this)" class="category-tab whitespace-nowrap px-6 py-2.5 rounded-full bg-slate-100 text-slate-500 font-bold text-[11px] uppercase tracking-widest transition-all">Giải trí</button>
            <button onclick="filterEvents('Công nghệ', this)" class="category-tab whitespace-nowrap px-6 py-2.5 rounded-full bg-slate-100 text-slate-500 font-bold text-[11px] uppercase tracking-widest transition-all">Công nghệ</button>
            <button onclick="filterEvents('Thể thao', this)" class="category-tab whitespace-nowrap px-6 py-2.5 rounded-full bg-slate-100 text-slate-500 font-bold text-[11px] uppercase tracking-widest transition-all">Thể thao</button>
            <button onclick="filterEvents('Đời sống', this)" class="category-tab whitespace-nowrap px-6 py-2.5 rounded-full bg-slate-100 text-slate-500 font-bold text-[11px] uppercase tracking-widest transition-all">Đời sống</button>
        </div>

        <div id="market-container" class="p-5 space-y-5"></div>
    </div>

    <div class="fixed bottom-8 left-8 right-8 bg-white/90 backdrop-blur-2xl border border-slate-200 flex justify-around py-5 rounded-[2.5rem] shadow-2xl z-50">
        <button class="text-teal-600 flex flex-col items-center gap-1"><span class="text-xl">🧭</span><span class="text-[8px] font-black uppercase">Dự báo</span></button>
        <button onclick="alert('Tính năng đổi quà sắp ra mắt')" class="text-slate-400 flex flex-col items-center gap-1"><span class="text-xl">🎁</span><span class="text-[8px] font-black uppercase">Đổi quà</span></button>
        <button class="text-slate-400 flex flex-col items-center gap-1"><span class="text-xl">📈</span><span class="text-[8px] font-black uppercase">Bảng xếp hạng</span></button>
    </div>

    <script>
        let balance = 1250;
        const events = [
            { cat: "Kinh tế", title: "VN-Index vượt mốc 1.450 điểm trong Q2/2026?", yes: "62%", vol: "1.2B P" },
            { cat: "Giải trí", title: "Sơn Tùng M-TP tổ chức concert tại Mỹ Đình năm nay?", yes: "85%", vol: "850M P" },
            { cat: "Công nghệ", title: "Việt Nam chính thức cấp phép cho xe taxi tự lái?", yes: "21%", vol: "320M P" },
            { cat: "Đời sống", title: "Giá vàng SJC xuống dưới 80 triệu/lượng tháng tới?", yes: "45%", vol: "2.5B P" },
            { cat: "Thể thao", title: "Việt Nam vô địch AFF Cup 2026?", yes: "75%", vol: "4.1B P" },
            { cat: "Kinh tế", title: "Tỷ giá USD/VND vượt mốc 26.000đ cuối năm?", yes: "32%", vol: "1.1B P" },
            { cat: "Giải trí", title: "Anh Trai Say Hi mùa 2 có quán quân từ miền Bắc?", yes: "55%", vol: "600M P" },
            { cat: "Công nghệ", title: "Apple Store vật lý đầu tiên khai trương tại HN?", yes: "68%", vol: "920M P" }
        ];

        function renderEvents(filter = "Tất cả") {
            const container = document.getElementById('market-container');
            const filtered = filter === "Tất cả" ? events : events.filter(e => e.cat === filter);
            
            container.innerHTML = filtered.map(e => `
                <div class="bg-white rounded-[2rem] p-6 border border-slate-100 shadow-sm transition-all active:scale-[0.98]">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-[10px] font-black uppercase tracking-widest text-teal-600 bg-teal-50 px-2 py-1 rounded-md">${e.cat}</span>
                        <span class="text-[10px] font-bold text-slate-400 italic">Volume: ${e.vol}</span>
                    </div>
                    <h3 class="text-lg font-bold text-slate-800 mb-6 leading-tight italic">${e.title}</h3>
                    <div class="flex gap-3 items-center">
                        <button onclick="trade()" class="flex-1 bg-teal-50 border border-teal-100 text-teal-600 py-3 rounded-xl font-black italic">CÓ ${e.yes}</button>
                        <button onclick="trade()" class="flex-1 bg-purple-50 border border-purple-100 text-purple-600 py-3 rounded-xl font-black italic">KHÔNG</button>
                    </div>
                </div>
            `).join('');
        }

        function filterEvents(category, el) {
            document.querySelectorAll('.category-tab').forEach(tab => tab.classList.remove('tab-active'));
            el.classList.add('tab-active');
            renderEvents(category);
        }

        function trade() {
            if(balance >= 100) {
                balance -= 100;
                document.getElementById('header-balance').innerText = balance.toLocaleString() + ' P';
                alert("Dự báo thành công! -100 P");
            } else { alert("Hết điểm rồi!"); }
        }

        renderEvents();
    </script>
</body>
</html>
