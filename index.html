<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forely - Nền tảng Khảo sát & Dữ liệu Cộng đồng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f7f9fa; color: #111827; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal.active { display: flex; }
        
        /* Hiệu ứng loading */
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #0f172a; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Disable button style */
        .btn-disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(100%); }
    </style>
</head>
<body class="pb-24">

    <nav class="bg-white px-4 py-3 sticky top-0 z-50 flex justify-between items-center border-b border-gray-200">
        <div onclick="goHome()" class="flex items-center gap-2.5 cursor-pointer">
            <svg width="28" height="28" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="55" cy="60" r="45" stroke="#0f172a" stroke-width="8"/>
                <circle cx="95" cy="25" r="10" stroke="#0f172a" stroke-width="7"/>
                <path d="M55 20v8M55 92v8M20 60h8M82 60h8" stroke="#0f172a" stroke-width="5" stroke-linecap="round"/>
                <path d="M35 85L85 35L62 90L52 68Z" fill="#0f172a"/>
                <path d="M35 85L85 35L30 62L52 68Z" fill="#334155"/>
            </svg>
            <h1 class="text-xl font-bold text-gray-900 tracking-tight">Forely</h1>
        </div>
        <div id="auth-area">
            <button onclick="openLoginModal()" class="bg-gray-100 hover:bg-gray-200 text-gray-900 text-sm font-semibold px-4 py-1.5 rounded-lg transition-colors">Log In</button>
        </div>
    </nav>

    <div class="bg-white sticky top-[53px] z-40 border-b border-gray-200">
        <div class="px-4 pt-3 pb-2">
            <div class="relative mb-3">
                <input type="text" id="search-input" oninput="searchEvents()" placeholder="Tìm kiếm khảo sát..." class="w-full bg-gray-100 border-none rounded-lg py-2 pl-9 pr-4 text-sm font-medium text-gray-900 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <span class="absolute left-3 top-2.5 text-gray-400">🔍</span>
            </div>
            
            <div class="flex gap-2 bg-gray-100 p-1 rounded-lg">
                <button onclick="setStatusView('active')" id="tab-active" class="flex-1 py-1.5 text-xs font-bold rounded-md bg-white text-gray-900 shadow-sm transition-all">🟢 Đang mở</button>
                <button onclick="setStatusView('ended')" id="tab-ended" class="flex-1 py-1.5 text-xs font-bold rounded-md bg-transparent text-gray-500 transition-all">⏳ Lịch sử</button>
            </div>
        </div>

        <div class="flex gap-2 overflow-x-auto px-4 pb-3 no-scrollbar">
            <button onclick="filterCat('Tất cả', this)" class="cat-tab bg-gray-900 text-white px-4 py-1.5 rounded-full text-[11px] font-semibold shrink-0 transition-all">Tất cả</button>
            <button onclick="filterCat('Kinh tế vĩ mô', this)" class="cat-tab bg-gray-100 text-gray-600 px-4 py-1.5 rounded-full text-[11px] font-semibold shrink-0">Kinh tế vĩ mô</button>
            <button onclick="filterCat('Chính sách', this)" class="cat-tab bg-gray-100 text-gray-600 px-4 py-1.5 rounded-full text-[11px] font-semibold shrink-0">Chính sách</button>
            <button onclick="filterCat('Giải trí - Xã hội', this)" class="cat-tab bg-gray-100 text-gray-600 px-4 py-1.5 rounded-full text-[11px] font-semibold shrink-0">Giải trí - Xã hội</button>
            <button onclick="filterCat('Hạ tầng - BĐS', this)" class="cat-tab bg-gray-100 text-gray-600 px-4 py-1.5 rounded-full text-[11px] font-semibold shrink-0">Hạ tầng - BĐS</button>
            <button onclick="filterCat('Công nghệ', this)" class="cat-tab bg-gray-100 text-gray-600 px-4 py-1.5 rounded-full text-[11px] font-semibold shrink-0">Công nghệ</button>
            <button onclick="filterCat('Thể thao', this)" class="cat-tab bg-gray-100 text-gray-600 px-4 py-1.5 rounded-full text-[11px] font-semibold shrink-0">Thể thao</button>
        </div>
    </div>

    <div id="loading" class="text-center mt-10">
        <div class="loader"></div><p class="text-xs text-gray-500 mt-2">Đang đồng bộ dữ liệu...</p>
    </div>
    <div id="market-grid" class="p-4 grid grid-cols-2 gap-3 hidden">
        </div>

    <div id="login-modal" class="modal">
        <div class="bg-white w-[85%] max-w-sm rounded-2xl p-6 text-center shadow-xl">
            <h2 class="text-xl font-bold text-gray-900 mb-2">Đăng nhập Forely</h2>
            <p class="text-gray-500 text-sm mb-6">Đăng nhập để nhận <span class="text-blue-600 font-semibold">5,000 P</span> trải nghiệm.</p>
            <div class="space-y-3">
                <button onclick="doLogin()" class="w-full bg-white border border-gray-300 py-3 rounded-lg flex items-center justify-center gap-3 hover:bg-gray-50">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-5 h-5">
                    <span class="text-sm font-semibold text-gray-700">Tiếp tục với Google</span>
                </button>
                <button onclick="closeModal('login-modal')" class="w-full py-2 text-sm font-medium text-gray-500 mt-2">Hủy</button>
            </div>
        </div>
    </div>

    <div id="trade-modal" class="modal">
        <div class="bg-white w-[90%] max-w-sm rounded-2xl shadow-2xl overflow-hidden flex flex-col">
            <div class="px-5 py-4 flex justify-between items-start border-b border-gray-100">
                <div class="pr-4">
                    <p id="modal-side-badge" class="text-[10px] font-bold uppercase tracking-wider mb-1"></p>
                    <h3 id="modal-title" class="text-sm font-semibold text-gray-900 leading-snug"></h3>
                </div>
                <button onclick="closeModal('trade-modal')" class="text-gray-400 hover:text-gray-600 text-xl font-bold">×</button>
            </div>
            <div class="p-5">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-sm font-medium text-gray-700">Điểm thành viên (P) sử dụng</span>
                    <span class="text-xs font-medium text-gray-500">Số dư: <span id="modal-balance">0</span></span>
                </div>
                <div class="relative mb-6">
                    <input type="number" id="input-amount" value="100" class="w-full bg-gray-50 border border-gray-200 rounded-lg py-3 px-4 text-xl font-bold text-gray-900 focus:outline-none" oninput="calculatePrize()">
                    <span class="absolute right-4 top-3.5 text-gray-400 font-semibold">P</span>
                </div>
                <div class="bg-gray-50 rounded-lg p-3 mb-6 flex items-center justify-between border border-gray-100">
                    <span class="text-xs font-medium text-gray-500">Voucher tri ân ước tính</span>
                    <span id="prize-estimate" class="text-sm font-bold text-green-600">Thẻ nạp 10k</span>
                </div>
                <button onclick="confirmTrade()" id="btn-confirm" class="w-full py-3.5 rounded-lg text-sm font-bold text-white shadow-sm transition-colors">Xác nhận gửi nhận định</button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around py-3 z-50">
        <button onclick="goHome()" class="flex flex-col items-center gap-1 text-gray-900">
            <span class="text-lg">🧭</span><span class="text-[10px] font-semibold">Khảo sát</span>
        </button>
        <button onclick="alert('Tính năng Nạp điểm đang nâng cấp')" class="flex flex-col items-center gap-1 text-gray-400">
            <span class="text-lg">💳</span><span class="text-[10px] font-semibold">Nạp điểm</span>
        </button>
        <button onclick="alert('Kho Voucher sẽ sớm ra mắt!')" class="flex flex-col items-center gap-1 text-gray-400">
            <span class="text-lg">🎁</span><span class="text-[10px] font-semibold">Đổi quà</span>
        </button>
    </div>

    <script>
        // LINK GOOGLE SHEETS (Thay link của bạn vào đây)
        const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vREHXHIoKFy_Vhds8sFY8pJzrvcLZItNS2O0hQTy8Z-JJ9TiwFvCYmQgWVyhLVpcyY1IheROL0ljntf/pub?gid=0&single=true&output=csv";

        let isGuest = true;
        let balance = 0;
        let allEvents = [];
        let currentStatusView = 'active'; // 'active' hoặc 'ended'
        let currentCategory = 'Tất cả';
        let selectedEvent = null;

        // XỬ LÝ FORMAT NGÀY THÁNG
        function formatDate(dateString) {
            if (!dateString) return "Không có hạn";
            const date = new Date(dateString);
            if(isNaN(date)) return dateString; // Nếu format lỗi, trả về nguyên bản gốc
            const day = date.getDate().toString().padStart(2, '0');
            const month = (date.getMonth() + 1).toString().padStart(2, '0');
            return `${day}/${month}/${date.getFullYear()}`;
        }

        // TẢI DỮ LIỆU
        function fetchEventsFromGoogleSheets() {
            Papa.parse(GOOGLE_SHEET_CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const now = new Date().getTime();

                    allEvents = results.data.filter(row => row.Title).map((row, index) => {
                        let isExpired = false;
                        if(row.Deadline) {
                            const dlDate = new Date(row.Deadline).getTime();
                            if(dlDate < now) isExpired = true; // Đã quá hạn
                        }
                        
                        // Xác định trạng thái cuối cùng
                        let finalActiveStatus = true;
                        if(row.Status === "Ended" || isExpired) {
                            finalActiveStatus = false;
                        }

                        return {
                            id: index,
                            cat: row.Category || "Khác",
                            title: row.Title,
                            yesRate: parseInt(row.YesRate) || 50,
                            vol: row.Volume || "10M",
                            deadline: row.Deadline ? formatDate(row.Deadline) : "Không thời hạn",
                            isActive: finalActiveStatus
                        };
                    });
                    
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('market-grid').classList.remove('hidden');
                    renderGrid();
                },
                error: function() {
                    alert("Lỗi kết nối CSDL, đang tải bản thử nghiệm.");
                }
            });
        }

        // CHUYỂN ĐỔI TAB ĐANG MỞ / LỊCH SỬ
        function setStatusView(status) {
            currentStatusView = status;
            
            // Đổi UI của nút toggle
            const btnActive = document.getElementById('tab-active');
            const btnEnded = document.getElementById('tab-ended');
            
            if(status === 'active') {
                btnActive.className = "flex-1 py-1.5 text-xs font-bold rounded-md bg-white text-gray-900 shadow-sm transition-all";
                btnEnded.className = "flex-1 py-1.5 text-xs font-bold rounded-md bg-transparent text-gray-500 transition-all";
            } else {
                btnActive.className = "flex-1 py-1.5 text-xs font-bold rounded-md bg-transparent text-gray-500 transition-all";
                btnEnded.className = "flex-1 py-1.5 text-xs font-bold rounded-md bg-white text-gray-900 shadow-sm transition-all";
            }
            renderGrid();
        }

        // LỌC CATEGORY
        function filterCat(cat, el) {
            currentCategory = cat;
            document.querySelectorAll('.cat-tab').forEach(t => {
                t.className = "cat-tab bg-gray-100 text-gray-600 px-4 py-1.5 rounded-full text-[11px] font-semibold shrink-0";
            });
            el.className = "cat-tab bg-gray-900 text-white px-4 py-1.5 rounded-full text-[11px] font-semibold shrink-0 transition-all";
            renderGrid();
        }

        // TÌM KIẾM
        function searchEvents() { renderGrid(); }

        // RENDER DANH SÁCH CUỐI CÙNG
        function renderGrid() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const grid = document.getElementById('market-grid');
            
            // Áp dụng 3 bộ lọc: Trạng thái (Active/Ended) + Category + Search Text
            let filtered = allEvents.filter(e => {
                const matchStatus = currentStatusView === 'active' ? e.isActive : !e.isActive;
                const matchCat = currentCategory === 'Tất cả' ? true : e.cat === currentCategory;
                const matchSearch = e.title.toLowerCase().includes(term) || e.cat.toLowerCase().includes(term);
                return matchStatus && matchCat && matchSearch;
            });

            if(filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-2 text-center py-10"><p class="text-sm text-gray-400">Không có dữ liệu trong mục này.</p></div>`;
                return;
            }

            grid.innerHTML = filtered.map((e) => {
                const noRate = 100 - e.yesRate;
                const btnClass = e.isActive ? "transition-colors" : "btn-disabled pointer-events-none";
                const actionOnClick = e.isActive ? `onclick="handlePredict(${e.id}, 'Đồng ý')"` : "";
                const actionOnClickNo = e.isActive ? `onclick="handlePredict(${e.id}, 'Phản đối')"` : "";

                return `
                <div class="bg-white p-3 rounded-xl border border-gray-200 shadow-sm flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[10px] font-medium text-gray-500">${e.cat}</span>
                            <span class="text-[9px] font-bold ${e.isActive ? 'text-blue-500' : 'text-orange-500'}">
                                ${e.isActive ? '⏳ ' + e.deadline : '🔒 Đã chốt'}
                            </span>
                        </div>
                        <h3 class="text-[11px] font-semibold text-gray-900 line-clamp-3 mb-3 leading-snug h-10">${e.title}</h3>
                    </div>
                    <div class="flex gap-2 mt-auto">
                        <button ${actionOnClick} class="flex-1 flex flex-col items-center bg-[#eff6ff] text-[#2563eb] py-1.5 rounded-lg ${btnClass}">
                            <span class="text-[10px] font-bold">CÓ</span><span class="text-xs font-bold">${e.yesRate}%</span>
                        </button>
                        <button ${actionOnClickNo} class="flex-1 flex flex-col items-center bg-[#fef2f2] text-[#dc2626] py-1.5 rounded-lg ${btnClass}">
                            <span class="text-[10px] font-bold">KHÔNG</span><span class="text-xs font-bold">${noRate}%</span>
                        </button>
                    </div>
                </div>
            `}).join('');
        }

        // CÁC HÀM XỬ LÝ MODAL (Login & Trade)
        function handlePredict(id, type) {
            if (isGuest) document.getElementById('login-modal').classList.add('active');
            else openTradeModal(id, type);
        }

        function closeModal(modalId) { document.getElementById(modalId).classList.remove('active'); }

        function doLogin() {
            isGuest = false; balance = 5000; closeModal('login-modal');
            document.getElementById('auth-area').innerHTML = `<div class="bg-gray-100 px-3 py-1.5 rounded-lg flex items-center gap-1.5"><span class="text-xs">💎</span><span class="text-xs font-bold text-gray-900">${balance.toLocaleString()} P</span></div>`;
        }

        function openTradeModal(id, type) {
            selectedEvent = allEvents.find(e => e.id === id);
            const badge = document.getElementById('modal-side-badge');
            const btn = document.getElementById('btn-confirm');
            
            if(type === 'Đồng ý') {
                badge.innerText = 'Bình chọn: CÓ'; badge.className = 'text-[10px] font-bold uppercase tracking-wider mb-1 text-blue-600';
                btn.className = 'w-full py-3.5 rounded-lg text-sm font-bold text-white shadow-sm transition-colors bg-blue-600';
            } else {
                badge.innerText = 'Bình chọn: KHÔNG'; badge.className = 'text-[10px] font-bold uppercase tracking-wider mb-1 text-red-600';
                btn.className = 'w-full py-3.5 rounded-lg text-sm font-bold text-white shadow-sm transition-colors bg-red-600';
            }
            document.getElementById('modal-title').innerText = selectedEvent.title;
            document.getElementById('modal-balance').innerText = balance.toLocaleString() + ' P';
            document.getElementById('trade-modal').classList.add('active');
            calculatePrize();
        }

        function calculatePrize() {
            const amt = parseInt(document.getElementById('input-amount').value) || 0;
            const p = document.getElementById('prize-estimate');
            if(amt < 500) p.innerText = "Thẻ nạp 10k"; else if(amt < 2000) p.innerText = "Grab 50k"; else p.innerText = "Shopee 200k";
        }

        function confirmTrade() {
            const amt = parseInt(document.getElementById('input-amount').value);
            if(amt > balance) { alert("Không đủ điểm!"); return; }
            balance -= amt;
            document.getElementById('auth-area').innerHTML = `<div class="bg-gray-100 px-3 py-1.5 rounded-lg flex items-center gap-1.5"><span class="text-xs">💎</span><span class="text-xs font-bold text-gray-900">${balance.toLocaleString()} P</span></div>`;
            closeModal('trade-modal'); alert("Gửi nhận định thành công!");
        }

        function goHome() {
            document.getElementById('search-input').value = '';
            setStatusView('active');
            filterCat('Tất cả', document.querySelector('.cat-tab'));
            window.scrollTo(0,0);
        }

        window.onload = fetchEventsFromGoogleSheets;
    </script>
</body>
</html>
