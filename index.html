<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forely - Explore the Future</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .page { display: none; }
        .page.active { display: block; }
        
        /* Màu Indigo chuẩn từ Logo */
        .bg-indigo-forely { background-color: #0f172a; }
        .text-indigo-forely { color: #0f172a; }
        .border-indigo-forely { border-color: #0f172a; }

        /* Hiệu ứng chọn Tab giống ảnh bạn gửi */
        .tab-active { background-color: #0f172a !important; color: white !important; }
        .tab-inactive { background-color: #eff6ff; color: #475569; }

        /* Animation cho nút bấm */
        .btn-press:active { transform: scale(0.95); }
    </style>
</head>
<body class="min-h-screen pb-24">

    <nav class="bg-white p-4 sticky top-0 z-50 flex justify-between items-center border-b border-slate-100 shadow-sm">
        <div class="flex items-center gap-2">
            <svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="53" r="42" stroke="#0f172a" stroke-width="8"/>
                <circle cx="78" cy="25" r="7" stroke="#0f172a" stroke-width="5"/>
                <path d="M50 22V30M50 76V84M22 53H30M70 53H78" stroke="#0f172a" stroke-width="5" stroke-linecap="round"/>
                <path d="M35 53L65 38L50 68L35 53Z" fill="#0f172a"/>
                <path d="M50 53L65 38L50 35L50 53Z" fill="#1e293b"/>
            </svg>
            <h1 class="text-2xl font-black text-indigo-forely tracking-tighter italic">Forely</h1>
        </div>
        
        <div class="flex items-center gap-3">
            <button class="text-xs font-bold text-slate-500 hover:text-indigo-forely">Log in</button>
            <button class="bg-[#38bdf8] text-white px-4 py-1.5 rounded-lg text-xs font-bold shadow-sm btn-press">Sign up</button>
        </div>
    </nav>

    <div id="home-page" class="page active">
        <div class="flex gap-2 overflow-x-auto p-4 bg-white no-scrollbar border-b border-slate-50 sticky top-[65px] z-40">
            <button onclick="filter('Tất cả', this)" class="category-tab tab-active whitespace-nowrap px-6 py-2.5 rounded-full font-black text-[11px] uppercase tracking-widest shadow-md transition-all">Tất cả</button>
            <button onclick="filter('Kinh tế', this)" class="category-tab tab-inactive whitespace-nowrap px-6 py-2.5 rounded-full font-black text-[11px] uppercase tracking-widest transition-all">Kinh tế</button>
            <button onclick="filter('Giải trí', this)" class="category-tab tab-inactive whitespace-nowrap px-6 py-2.5 rounded-full font-black text-[11px] uppercase tracking-widest transition-all">Giải trí</button>
            <button onclick="filter('Công nghệ', this)" class="category-tab tab-inactive whitespace-nowrap px-6 py-2.5 rounded-full font-black text-[11px] uppercase tracking-widest transition-all">Công nghệ</button>
            <button onclick="filter('Thể thao', this)" class="category-tab tab-inactive whitespace-nowrap px-6 py-2.5 rounded-full font-black text-[11px] uppercase tracking-widest transition-all">Thể thao</button>
            <button onclick="filter('Đời sống', this)" class="category-tab tab-inactive whitespace-nowrap px-6 py-2.5 rounded-full font-black text-[11px] uppercase tracking-widest transition-all">Đời sống</button>
        </div>

        <div id="market-grid" class="p-3 grid grid-cols-2 gap-3">
            </div>
    </div>

    <div class="fixed bottom-6 left-6 right-6 bg-white/90 backdrop-blur-md border border-slate-100 flex justify-around py-4 rounded-[2rem] shadow-xl z-50">
        <button class="flex flex-col items-center gap-1 text-indigo-forely">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L4.5 20.29L5.21 21L12 18L18.79 21L19.5 20.29L12 2Z"/></svg>
            <span class="text-[8px] font-black uppercase tracking-tighter">Dự báo</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-slate-300">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M20 6h-2.18c.11-.31.18-.65.18-1a2.5 2.5 0 0 0-5-0.5V6h-2v-.5a2.5 2.5 0 0 0-5 0c0 .35.07.69.18 1H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2m-7-1.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5c0 .32-.1.61-.27.85L13.15 4.58c-.09-.03-.15-.08-.15-.08V4.5m-6 0c0-.83.67-1.5 1.5-1.5S10 3.67 10 4.5v1.5H7V4.5m13 13.5H4V8h16v10Z"/></svg>
            <span class="text-[8px] font-black uppercase tracking-tighter">Đổi quà</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-slate-300">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M16 11V3H8v8H2v10h20V11h-6zM10 5h4v14h-4V5zm-6 8h4v6H4v-6zm16 6h-4v-6h4v6z"/></svg>
            <span class="text-[8px] font-black uppercase tracking-tighter">Top VIP</span>
        </button>
    </div>

    <script>
        const categories = ["Kinh tế", "Giải trí", "Công nghệ", "Thể thao", "Đời sống"];
        const samples = ["VN-Index vượt 1.500?", "SJC lên 120 triệu?", "iPhone 18 bỏ sạc?", "Việt Nam dự World Cup?", "Sơn Tùng ra Album?"];
        
        const allEvents = Array.from({ length: 50 }, (_, i) => ({
            id: i + 1,
            cat: categories[i % categories.length],
            title: samples[i % samples.length] + " #" + (i+1),
            yes: Math.floor(Math.random() * 90 + 5) + "%",
            vol: (Math.random() * 5).toFixed(1) + "B P"
        }));

        function render(data = allEvents) {
            const container = document.getElementById('market-grid');
            container.innerHTML = data.map(e => `
                <div class="bg-white p-3 rounded-2xl border border-slate-100 shadow-sm btn-press">
                    <div class="flex justify-between items-center mb-1.5">
                        <span class="text-[8px] font-black uppercase text-indigo-forely bg-slate-100 px-1.5 py-0.5 rounded-md">${e.cat}</span>
                        <span class="text-[8px] text-slate-400 font-bold">${e.vol}</span>
                    </div>
                    <h3 class="text-[11px] font-bold text-slate-800 line-clamp-2 mb-3 leading-tight h-7 italic">${e.title}</h3>
                    <div class="flex gap-1.5">
                        <button onclick="alert('Dự báo thành công!')" class="flex-1 bg-indigo-forely text-white text-[9px] font-black py-2 rounded-lg shadow-md">CÓ ${e.yes}</button>
                        <button onclick="alert('Dự báo thành công!')" class="flex-1 bg-slate-50 text-slate-400 text-[9px] font-black py-2 rounded-lg border border-slate-100">KHÔNG</button>
                    </div>
                </div>
            `).join('');
        }

        function filter(cat, el) {
            document.querySelectorAll('.category-tab').forEach(t => {
                t.className = "category-tab tab-inactive whitespace-nowrap px-6 py-2.5 rounded-full font-black text-[11px] uppercase tracking-widest transition-all";
            });
            el.className = "category-tab tab-active whitespace-nowrap px-6 py-2.5 rounded-full font-black text-[11px] uppercase tracking-widest shadow-md transition-all";
            render(cat === 'Tất cả' ? allEvents : allEvents.filter(e => e.cat === cat));
        }

        render();
    </script>
</body>
</html>
