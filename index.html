<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORELY - Dự đoán nhận quà</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .page { display: none; }
        .page.active { display: block; }
        .money-change { animation: highlight 0.5s ease-out; }
        @keyframes highlight {
            0% { transform: scale(1.2); color: #0d9488; }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-24 font-sans">

    <div id="home-page" class="page active">
        <nav class="bg-white p-4 sticky top-0 z-50 flex justify-between items-center border-b border-gray-100 shadow-sm">
            <h1 class="text-2xl font-black text-teal-600 italic tracking-tighter">FORELY</h1>
            <div onclick="showPage('portfolio-page')" class="bg-teal-50 px-3 py-1.5 rounded-full border border-teal-100 flex items-center gap-2">
                <span class="text-[10px] font-bold text-teal-600">💎</span>
                <span id="header-balance" class="text-xs font-black text-teal-700 uppercase">1,250 P</span>
            </div>
        </nav>

        <div class="p-4 space-y-4">
            <div class="bg-gradient-to-br from-teal-600 to-teal-700 rounded-[2.5rem] p-6 text-white shadow-lg shadow-teal-100 mb-6">
                <h2 class="text-xl font-black italic mb-1">Thử tài tiên tri</h2>
                <p class="text-teal-100 text-[10px] uppercase font-bold tracking-wider opacity-80">Dự đoán đúng - Đổi quà khủng</p>
                <div class="mt-4 flex gap-2">
                    <span class="bg-white/20 px-3 py-1 rounded-full text-[10px] font-bold">#SJC</span>
                    <span class="bg-white/20 px-3 py-1 rounded-full text-[10px] font-bold">#Showbiz</span>
                </div>
            </div>

            <div class="bg-white rounded-[2rem] p-6 border border-gray-100 shadow-sm">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-[10px] font-black text-amber-600 bg-amber-50 px-2 py-1 rounded-md uppercase tracking-widest italic">Kinh tế</span>
                    <span class="text-gray-400 text-[10px] font-bold italic underline">Xem nguồn xác thực</span>
                </div>
                <h3 class="font-bold text-gray-800 text-lg leading-tight mb-6 italic italic">Chỉ số VN-Index có vượt 1.350 điểm vào cuối tháng này?</h3>
                <div class="flex gap-3">
                    <button onclick="handleTrade('CÓ', 100, 'VN-Index vượt 1350')" class="flex-1 bg-teal-600 text-white py-4 rounded-2xl active:scale-95 transition-all shadow-lg shadow-teal-100">
                        <p class="text-[10px] font-bold opacity-70">DỰ ĐOÁN CÓ</p>
                        <p class="text-lg font-black italic">100 P</p>
                    </button>
                    <button onclick="handleTrade('KHÔNG', 100, 'VN-Index vượt 1350')" class="flex-1 bg-white border-2 border-red-500 text-red-500 py-4 rounded-2xl active:scale-95 transition-all">
                        <p class="text-[10px] font-bold opacity-70">DỰ ĐOÁN KHÔNG</p>
                        <p class="text-lg font-black italic">100 P</p>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="portfolio-page" class="page">
        <nav class="bg-white p-4 sticky top-0 z-50 flex items-center border-b border-gray-100">
            <button onclick="showPage('home-page')" class="mr-4 text-xl">←</button>
            <h1 class="text-lg font-bold flex-1 text-center italic">Kho Điểm Thưởng</h1>
        </nav>
        <div class="p-6">
            <div class="bg-gray-900 rounded-[2.5rem] p-8 text-white mb-8 shadow-2xl relative overflow-hidden">
                <div class="absolute top-[-10px] right-[-10px] w-24 h-24 bg-teal-500 rounded-full opacity-20 blur-2xl"></div>
                <p class="text-gray-400 text-[10px] font-black uppercase tracking-[0.2em] mb-2">F-Point hiện có</p>
                <h2 id="wallet-balance" class="text-4xl font-black italic mb-8 tracking-tighter">1,250 P</h2>
                <button onclick="alert('Tính năng mua Gói Điểm đang được kết nối qua VietQR!')" class="w-full bg-teal-500 py-4 rounded-2xl font-black italic text-sm tracking-widest">SĂN THÊM ĐIỂM</button>
            </div>

            <h3 class="font-black text-xs text-gray-400 uppercase tracking-[0.2em] mb-4">Đổi quà hấp dẫn</h3>
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-white p-4 rounded-3xl border border-gray-100 text-center">
                    <p class="text-2xl mb-1 text-orange-500">🛍️</p>
                    <p class="text-[10px] font-bold text-gray-800 italic">Voucher Shopee 50k</p>
                    <button class="mt-3 bg-gray-100 text-[10px] font-black py-2 px-4 rounded-full text-gray-400">5.000 P</button>
                </div>
                <div class="bg-white p-4 rounded-3xl border border-gray-100 text-center">
                    <p class="text-2xl mb-1 text-green-500">🚗</p>
                    <p class="text-[10px] font-bold text-gray-800 italic">Voucher Grab 30k</p>
                    <button class="mt-3 bg-gray-100 text-[10px] font-black py-2 px-4 rounded-full text-gray-400">3.000 P</button>
                </div>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 w-full bg-white/90 backdrop-blur-md border-t border-gray-100 flex justify-around py-5 rounded-t-[2.5rem] shadow-[0_-10px_20px_rgba(0,0,0,0.02)] text-2xl">
        <button onclick="showPage('home-page')" id="n-home" class="text-teal-600 scale-110">🏠</button>
        <button onclick="showPage('portfolio-page')" id="n-wallet" class="text-gray-300">💎</button>
        <button onclick="alert('Bảng xếp hạng tiên tri sắp ra mắt!')" class="text-gray-300">🏆</button>
    </div>

    <script>
        let balance = 1250;
        
        function updateUI() {
            document.getElementById('header-balance').innerText = balance.toLocaleString() + ' P';
            document.getElementById('wallet-balance').innerText = balance.toLocaleString() + ' P';
            document.getElementById('header-balance').classList.add('money-change');
            setTimeout(() => document.getElementById('header-balance').classList.remove('money-change'), 500);
        }

        function handleTrade(type, amount, name) {
            if (balance >= amount) {
                balance -= amount;
                updateUI();
                alert(`Bạn đã dùng ${amount} điểm để dự báo: ${type} cho sự kiện "${name}". Điểm thưởng sẽ về ví sau khi có kết quả chính thức!`);
            } else {
                alert("Bạn không đủ Điểm Thưởng. Hãy nạp thêm gói điểm!");
            }
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0,0);
            
            // Cập nhật icon nav đơn giản
            if(pageId === 'home-page') {
                document.getElementById('n-home').classList.add('text-teal-600');
                document.getElementById('n-wallet').classList.add('text-gray-300');
                document.getElementById('n-wallet').classList.remove('text-teal-600');
            } else {
                document.getElementById('n-wallet').classList.add('text-teal-600');
                document.getElementById('n-home').classList.add('text-gray-300');
                document.getElementById('n-home').classList.remove('text-teal-600');
            }
        }
    </script>
</body>
</html>
