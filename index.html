<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORELY - Tiên tri tương lai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .page { display: none; }
        .page.active { display: block; }
        .active-nav { color: #0d9488; transform: scale(1.1); font-weight: 900; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-24 font-sans">

    <div id="home-page" class="page active">
        <nav class="bg-white p-4 sticky top-0 z-50 flex justify-between items-center border-b border-gray-100 shadow-sm">
            <h1 class="text-2xl font-black text-teal-600 italic tracking-tighter">FORELY</h1>
            <div onclick="showPage('portfolio-page')" class="bg-teal-50 px-3 py-1.5 rounded-full border border-teal-100 flex items-center gap-2">
                <span class="text-xs font-bold text-teal-700">1,250,000đ</span>
            </div>
        </nav>
        <div class="p-4 space-y-4">
            <div class="bg-teal-600 rounded-[2.5rem] p-6 text-white shadow-lg shadow-teal-100 mb-6">
                <h2 class="text-xl font-black italic mb-2">Hôm nay bạn dự báo gì?</h2>
                <p class="text-teal-100 text-xs opacity-80">Có 5 kèo mới đang chờ bạn quyết định.</p>
            </div>
            <div onclick="showPage('portfolio-page')" class="bg-white rounded-[2rem] p-5 border border-gray-100 shadow-sm">
                <span class="text-[10px] font-black text-amber-600 bg-amber-50 px-2 py-1 rounded-md uppercase">Hot</span>
                <h3 class="font-bold text-gray-800 mt-2 italic">Giá vàng SJC có chạm mốc 100 triệu?</h3>
                <div class="flex gap-2 mt-4 text-white text-xs font-black italic">
                    <div class="flex-1 bg-teal-600 py-3 rounded-xl text-center">CÓ 6.5k</div>
                    <div class="flex-1 bg-red-500 py-3 rounded-xl text-center">KHÔNG 3.5k</div>
                </div>
            </div>
        </div>
    </div>

    <div id="portfolio-page" class="page">
        <nav class="bg-white p-4 sticky top-0 z-50 flex items-center border-b border-gray-100">
            <button onclick="showPage('home-page')" class="mr-4 text-xl">←</button>
            <h1 class="text-lg font-bold flex-1 text-center italic">Ví Tiên Tri</h1>
        </nav>
        <div class="p-6">
            <div class="bg-gray-900 rounded-[2.5rem] p-8 text-white mb-6">
                <p class="text-gray-400 text-xs uppercase font-bold tracking-widest mb-2">Số dư ví</p>
                <h2 class="text-4xl font-black italic mb-8">1,250,000đ</h2>
                <button onclick="alert('Tính năng nạp tiền đang bảo trì nâng cấp!')" class="w-full bg-teal-500 py-4 rounded-2xl font-black italic shadow-lg shadow-teal-900/50">NẠP TIỀN QUA VIETQR</button>
            </div>
        </div>
    </div>

    <div id="profile-page" class="page">
        <nav class="bg-white p-4 sticky top-0 z-50 border-b border-gray-100">
            <h1 class="text-lg font-bold text-center italic">Bảng Xếp Hạng</h1>
        </nav>
        <div class="p-6">
            <div class="flex items-center gap-4 mb-8 p-4 bg-white rounded-3xl border border-gray-100">
                <div class="w-16 h-16 bg-teal-100 rounded-full flex items-center justify-center text-2xl">👤</div>
                <div>
                    <h4 class="font-black text-gray-800 italic text-lg">Bạn (User_88)</h4>
                    <p class="text-xs text-gray-500 font-bold uppercase">Hạng: 1,204</p>
                </div>
            </div>

            <h3 class="font-black text-xs text-gray-400 uppercase tracking-[0.2em] mb-4">Top cao thủ</h3>
            <div class="space-y-3">
                <div class="flex items-center justify-between p-4 bg-amber-50 rounded-2xl border border-amber-100">
                    <div class="flex items-center gap-3">
                        <span class="text-lg font-black text-amber-600">1</span>
                        <span class="font-bold text-gray-700">Shark_Thanh</span>
                    </div>
                    <span class="font-black text-amber-600 italic">+89tr</span>
                </div>
                <div class="flex items-center justify-between p-4 bg-gray-50 rounded-2xl border border-gray-100">
                    <div class="flex items-center gap-3">
                        <span class="text-lg font-black text-gray-400">2</span>
                        <span class="font-bold text-gray-700">Admin_Forely</span>
                    </div>
                    <span class="font-black text-gray-400 italic">+45tr</span>
                </div>
                <div class="flex items-center justify-between p-4 bg-gray-50 rounded-2xl border border-gray-100">
                    <div class="flex items-center gap-3">
                        <span class="text-lg font-black text-gray-400">3</span>
                        <span class="font-bold text-gray-700">DauTu_2026</span>
                    </div>
                    <span class="font-black text-gray-400 italic">+32tr</span>
                </div>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 w-full bg-white/90 backdrop-blur-md border-t border-gray-100 flex justify-around py-5 rounded-t-[2.5rem] shadow-[0_-10px_20px_rgba(0,0,0,0.02)] text-2xl">
        <button onclick="showPage('home-page')" id="n-home" class="active-nav">🏠</button>
        <button onclick="showPage('portfolio-page')" id="n-wallet" class="text-gray-300">📊</button>
        <button onclick="showPage('profile-page')" id="n-rank" class="text-gray-300">🏆</button>
    </div>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            document.getElementById('n-home').className = 'text-gray-300';
            document.getElementById('n-wallet').className = 'text-gray-300';
            document.getElementById('n-rank').className = 'text-gray-300';

            if(pageId === 'home-page') document.getElementById('n-home').className = 'active-nav';
            if(pageId === 'portfolio-page') document.getElementById('n-wallet').className = 'active-nav';
            if(pageId === 'profile-page') document.getElementById('n-rank').className = 'active-nav';
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
