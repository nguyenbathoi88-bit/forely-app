<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forely - Light & Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f0f4f8; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* Modal Style */
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(6px); }
        .modal.active { display: flex; }
        
        /* Màu chủ đạo mới: Indigo pha Xanh nhẹ */
        .text-forely { color: #1e293b; }
        .bg-forely { background-color: #1e293b; }
        .btn-yes { background-color: #f0f9ff; border: 1px solid #bae6fd; color: #0369a1; }
        .btn-no { background-color: #fff1f2; border: 1px solid #fecdd3; color: #be123c; }
    </style>
</head>
<body class="pb-28">

    <nav class="bg-white/80 backdrop-blur-md p-3 sticky top-0 z-50 flex justify-between items-center border-b border-blue-50 shadow-sm">
        <div class="flex items-center gap-2.5">
            <svg width="30" height="30" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="42" stroke="#1e293b" stroke-width="4"/>
                <circle cx="50" cy="50" r="45" stroke="#38bdf8" stroke-width="2" stroke-dasharray="4 4"/>
                <path d="M50 15V25M50 75V85M15 50H25M75 50H85" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
                <path d="M50 25L60 50L50 75L40 50Z" fill="#1e293b"/>
                <path d="M50 25L60 50L50 48L50 25Z" fill="#38bdf8"/> </svg>
            <h1 class="text-xl font-extrabold text-[#1e293b] italic tracking-tight">Forely</h1>
        </div>
        <div class="bg-blue-50 px-3 py-1.5 rounded-full border border-blue-100 flex items-center gap-1.5 shadow-inner">
            <span class="text-[10px]">💎</span>
            <span id="balance" class="text-[10px] font-bold text-blue-900 uppercase">5,000 P</span>
        </div>
    </nav>

    <div class="bg-white px-3 py-2 border-b border-blue-50 sticky top-[55px] z-40 overflow-hidden">
        <div class="flex gap-2 overflow-x-auto no-scrollbar">
            <button onclick="filter('Tất cả', this)" class="tab bg-[#1e293b] text-white px-5 py-1.5 rounded-full text-[10px] font-bold uppercase shrink-0">Tất cả</button>
            <button onclick="filter('Kinh tế', this)" class="tab bg-blue-50/50 text-blue-600/60 px-5 py-1.5 rounded-full text-[10px] font-bold uppercase shrink-0">Kinh tế</button>
            <button onclick="filter('Giải trí', this)" class="tab bg-blue-50/50 text-blue-600/60 px-5 py-1.5 rounded-full text-[10px] font-bold uppercase shrink-0">Giải trí</button>
            <button onclick="filter('Công nghệ', this)" class="tab bg-blue-50/50 text-blue-600/60 px-5 py-1.5 rounded-full text-[10px] font-bold uppercase shrink-0">Công nghệ</button>
        </div>
    </div>

    <div id="market-grid" class="p-3 grid grid-cols-2 gap-2.5">
        </div>

    <div id="trade-modal" class="modal">
        <div class="bg-white w-[88%] rounded-[2.5rem] p-6 shadow-2xl scale-100 transition-all border border-blue-50">
            <h3 id="modal-title" class="text-[13px] font-bold text-slate-800 mb-5 leading-tight italic"></h3>
            
            <div class="bg-blue-50/30 p-4 rounded-3xl mb-4 border border-blue-100">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-[9px] font-bold text-blue-400 uppercase tracking-widest">Điểm dự báo (P)</span>
                    <span class="text-[9px] font-bold text-blue-600">Số dư: 5,000</span>
                </div>
                <input type="number" id="input-amount" value="100" class="w-full bg-transparent text-3xl font-black text-[#1e293b] focus:outline-none" oninput="calculatePrize()">
            </div>

            <div class="bg-teal-50/50 p-4 rounded-3xl mb-8 border border-teal-100 flex items-center gap-3">
                <span class="text-xl">🎁</span>
                <div>
                    <p class="text-[9px] font-bold text-teal-600 uppercase tracking-widest">Quà tặng ước tính</p>
                    <p id="prize-estimate" class="text-xs font-bold text-teal-800 italic">Voucher nạp thẻ 10k</p>
                </div>
            </div>

            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Bỏ qua</button>
                <button onclick="confirmTrade()" class="flex-1 bg-[#1e293b] text-white py-4 rounded-2xl text-[11px] font-black italic shadow-lg shadow-blue-900/10 uppercase tracking-widest">Xác nhận</button>
            </div>
        </div>
    </div>

    <script>
        let balance = 5000;
        let selectedEvent = null;
        const categories = ["Kinh tế", "Giải trí", "Công nghệ", "Thể thao"];
        const titles = ["VN-Index chạm 1550?", "SJC giảm mạnh?", "iPhone 18 không dây?", "Show thực tế mới?", "Lãi suất giảm tiếp?", "Tesla về VN?"];

        // Dữ liệu 100 sự kiện
        const allEvents = Array.from({ length: 100 }, (_, i) => ({
            id: i,
            cat: categories[i % categories.length],
            title: titles[i % titles.length] + " #" + (i + 1),
            yesRate: Math.floor(Math.random() * 70 + 15),
            vol: (Math.random() * 8).toFixed(1) + "M P"
        }));

        function render(data = allEvents) {
            const grid = document.getElementById('market-grid');
            grid.innerHTML = data.map(e => `
                <div class="bg-white p-3 rounded-2xl border border-blue-50 shadow-sm active:scale-95 transition-all">
                    <div class="flex justify-between items-center mb-1.5">
                        <span class="text-[7px] font-bold uppercase text-blue-400 bg-blue-50 px-1.5 py-0.5 rounded-md">${e.cat}</span>
                        <span class="text-[7px] text-slate-300 font-medium italic">${e.vol}</span>
                    </div>
                    <h3 class="text-[10px] font-bold text-[#1e293b] line-clamp-2 mb-3 leading-tight h-6.5 italic">${e.title}</h3>
                    <div class="flex gap-1.5">
                        <button onclick="openModal(${e.id}, 'CÓ')" class="flex-1 btn-yes text-[9px] font-bold py-1.5 rounded-xl uppercase transition-colors">Có ${e.yesRate}%</button>
                        <button onclick="openModal(${e.id}, 'KHÔNG')" class="flex-1 btn-no text-[9px] font-bold py-1.5 rounded-xl uppercase opacity-40 transition-colors">Ko</button>
                    </div>
                </div>
            `).join('');
        }

        function openModal(id, type) {
            selectedEvent = { ...allEvents[id], side: type };
            document.getElementById('modal-title').innerText = `Xác nhận dự báo "${type}" cho sự kiện: ${selectedEvent.title}`;
            document.getElementById('trade-modal').classList.add('active');
            calculatePrize();
        }

        function closeModal() { document.getElementById('trade-modal').classList.remove('active'); }

        function calculatePrize() {
            const amt = parseInt(document.getElementById('input-amount').value) || 0;
            const prizeEl = document.getElementById('prize-estimate');
            if (amt < 500) prizeEl.innerText = "Voucher nạp thẻ 10k";
            else if (amt < 2000) prizeEl.innerText = "Voucher GrabFood 50k";
            else prizeEl.innerText = "Voucher Shopee 200k";
        }

        function confirmTrade() {
            const amt = parseInt(document.getElementById('input-amount').value);
            if (amt > balance) { alert("Không đủ F-Point!"); return; }
            balance -= amt;
            document.getElementById('balance').innerText = balance.toLocaleString() + " P";
            closeModal();
            alert("✅ Đã ghi nhận dự báo!");
        }

        function filter(cat, el) {
            document.querySelectorAll('.tab').forEach(t => t.className = "tab bg-blue-50/50 text-blue-600/60 px-5 py-1.5 rounded-full text-[10px] font-bold uppercase shrink-0");
            el.className = "tab bg-[#1e293b] text-white px-5 py-1.5 rounded-full text-[10px] font-bold uppercase shrink-0";
            render(cat === 'Tất cả' ? allEvents : allEvents.filter(e => e.cat === cat));
        }

        render();
    </script>
</body>
</html>
