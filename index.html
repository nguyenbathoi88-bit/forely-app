<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forely - Insight & Real-time Prediction Ecosystem</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        :root {
            --brand-blue: #2563eb;
            --brand-mint: #0d9488;
            --bg-body: #f8fafc;
            --border-light: #f1f5f9;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-body); 
            color: #0f172a; 
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .brand-gradient { 
            background: linear-gradient(135deg, var(--brand-blue) 0%, var(--brand-mint) 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .page-section { 
            display: none; 
            opacity: 0; 
            transform: translateY(20px); 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .page-active { 
            display: block; 
            opacity: 1; 
            transform: translateY(0); 
        }

        #side-menu { position: fixed; inset: 0; z-index: 2000; visibility: hidden; pointer-events: none; }
        #side-menu.active { visibility: visible; pointer-events: auto; }
        #menu-content { 
            position: absolute; right: 0; top: 0; height: 100%; width: 320px; 
            background: white; transform: translateX(100%); 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: -15px 0 40px rgba(0,0,0,0.08);
        }
        #side-menu.active #menu-content { transform: translateX(0); }
        #menu-overlay { 
            position: absolute; inset: 0; background: rgba(15, 23, 42, 0.4); 
            opacity: 0; transition: opacity 0.4s; backdrop-filter: blur(5px); 
        }
        #side-menu.active #menu-overlay { opacity: 1; }

        .market-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid var(--border-light); background: white; border-radius: 24px; }
        .market-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); border-color: #cbd5e1; }

        .modal { 
            display: none; position: fixed; inset: 0; z-index: 1500; 
            background: rgba(15, 23, 42, 0.6); align-items: center; 
            justify-content: center; backdrop-filter: blur(10px); 
        }
        .modal.active { display: flex; animation: modalFadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .loader { 
            border: 4px solid #f1f5f9; border-top: 4px solid var(--brand-blue); 
            border-radius: 50%; width: 40px; height: 40px; 
            animation: spin 1s linear infinite; margin: auto; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 3000; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { 
            background: white; color: #0f172a; padding: 12px 24px; border-radius: 100px; 
            font-size: 12px; font-weight: 700; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); 
            display: flex; align-items: center; gap: 8px; animation: slideDown 0.3s ease, fadeOut 0.5s ease 2.5s forwards; border: 1px solid var(--border-light);
        }
        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-10px); } }

        .progress-bar-fill { transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .bottom-nav { background: rgba(255,255,255,0.9); backdrop-blur: 20px; border-top: 1px solid #f1f5f9; }
    </style>
</head>
<body class="pb-28">

    <div id="toast-container"></div>

    <nav class="bg-white/80 backdrop-blur-2xl px-5 py-4 sticky top-0 z-[100] flex justify-between items-center border-b border-slate-100 shadow-sm">
        <div onclick="switchPage('home')" class="flex items-center gap-2 cursor-pointer active:scale-95 transition-transform">
            <svg width="34" height="34" viewBox="0 0 120 120">
                <defs><linearGradient id="forelyG" x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stop-color="#2563eb" /><stop offset="100%" stop-color="#0d9488" /></linearGradient></defs>
                <circle cx="60" cy="60" r="50" stroke="url(#forelyG)" stroke-width="12" fill="none"/>
                <path d="M40 80 L85 35 L65 90 L55 65 Z" fill="url(#forelyG)"/><path d="M40 80 L85 35 L30 60 L55 65 Z" fill="#1e293b"/>
            </svg>
            <span class="text-2xl font-black brand-gradient tracking-tighter">Forely</span>
        </div>
        
        <div class="flex items-center gap-3">
            <div id="auth-area" class="flex gap-2">
                <button onclick="openModal('login-modal')" class="text-blue-600 text-xs font-black px-4 py-2 border-2 border-blue-100 rounded-full hover:bg-blue-50 transition-colors" data-i18n="login_btn">Log In</button>
            </div>
            <button onclick="toggleMenu()" class="p-2.5 bg-slate-50 rounded-2xl text-slate-500 border border-slate-100 hover:bg-slate-100 active:scale-90 transition-all">
                <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
            </button>
        </div>
    </nav>

    <div id="side-menu">
        <div id="menu-overlay" onclick="toggleMenu()"></div>
        <div id="menu-content" class="flex flex-col rounded-l-3xl">
            <div class="p-8 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
                <h3 class="font-black text-slate-900 text-xl tracking-tight" data-i18n="menu_settings">Cấu hình</h3>
                <button onclick="toggleMenu()" class="text-slate-400 text-3xl">×</button>
            </div>
            <div class="flex-1 overflow-y-auto p-8 space-y-10">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] block mb-4" data-i18n="p_lang">Ngôn ngữ</label>
                    <div class="grid grid-cols-2 gap-3 bg-slate-50 p-2 rounded-2xl border border-slate-100">
                        <button onclick="switchLang('vi')" id="lang-vi" class="py-3 text-xs font-black rounded-xl bg-white shadow-sm text-blue-600 transition-all">VIE</button>
                        <button onclick="switchLang('en')" id="lang-en" class="py-3 text-xs font-black rounded-xl text-slate-400 hover:bg-slate-100 transition-all">ENG</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="page-home" class="page-section page-active">
        <div class="px-5 pt-4">
            <input type="text" id="search-input" oninput="renderMarketGrid()" placeholder="Tìm kiếm thị trường..." class="w-full bg-slate-50 border border-slate-200 rounded-2xl py-3.5 px-5 text-sm font-bold focus:ring-2 focus:ring-blue-500/20 outline-none" data-i18n-placeholder="search_placeholder">
            <div class="flex gap-3 mt-4 bg-slate-100 p-1.5 rounded-2xl">
                <button onclick="setViewStatus('active')" id="tab-active" class="flex-1 py-2.5 text-[11px] font-black rounded-xl bg-white text-blue-600 shadow-sm">🟢 ĐANG MỞ</button>
                <button onclick="setViewStatus('ended')" id="tab-ended" class="flex-1 py-2.5 text-[11px] font-black rounded-xl text-slate-400">⏳ LỊCH SỬ</button>
            </div>
        </div>
        <div id="home-loader" class="py-32 text-center"><div class="loader"></div></div>
        <div id="market-grid" class="p-5 grid grid-cols-1 md:grid-cols-2 gap-4 hidden"></div>
    </div>

    <div id="page-detail" class="page-section bg-white min-h-screen">
        <div class="px-5 py-4 flex items-center border-b border-slate-100 sticky top-0 z-50 bg-white">
            <button onclick="switchPage('home')" class="p-2 text-slate-500 bg-slate-50 rounded-xl">◀</button>
            <h2 class="text-sm font-black text-slate-900 ml-4 uppercase tracking-widest" data-i18n="detail_title">Dữ liệu thời gian thực</h2>
        </div>
        <div class="p-6">
            <h1 id="dt-title" class="text-2xl font-black text-slate-900 leading-tight mb-6">Nội dung câu hỏi</h1>
            
            <div class="bg-white p-4 rounded-3xl border border-slate-100 mb-6 shadow-sm">
                <canvas id="detailChart" height="150"></canvas>
            </div>

            <div class="bg-slate-50 rounded-[30px] p-6 border border-slate-100 mb-6">
                <div class="flex justify-between items-end mb-4">
                    <div>
                        <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Đồng thuận</p>
                        <h2 class="text-5xl font-black text-blue-600"><span id="dt-yes-rate">50</span>%</h2>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Khối lượng (P)</p>
                        <p id="dt-vol" class="text-xl font-black text-slate-900">0</p>
                    </div>
                </div>
                <div class="w-full bg-red-100 rounded-full h-3 overflow-hidden flex">
                    <div id="dt-bar-yes" class="progress-bar-fill bg-blue-600 h-full" style="width: 50%"></div>
                    <div id="dt-bar-no" class="progress-bar-fill bg-red-500 h-full" style="width: 50%"></div>
                </div>
            </div>

            <div class="mb-10">
                <h3 class="text-sm font-black text-slate-900 uppercase mb-4">Sổ lệnh trực tiếp</h3>
                <div class="bg-white border border-slate-100 rounded-2xl overflow-hidden shadow-sm">
                    <table class="w-full text-left text-xs">
                        <thead class="bg-slate-50 font-black text-slate-400 uppercase">
                            <tr><th class="p-4">User</th><th class="p-4 text-center">Lệnh</th><th class="p-4 text-right">P</th></tr>
                        </thead>
                        <tbody id="live-order-body">
                            <tr><td colspan="3" class="p-10 text-center italic text-slate-400">Đang tải dữ liệu...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t p-4 flex gap-3 shadow-lg z-50">
                <button onclick="handlePredictClick('yes')" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-black text-sm">CHỌN CÓ</button>
                <button onclick="handlePredictClick('no')" class="flex-1 bg-red-500 text-white py-4 rounded-2xl font-black text-sm">CHỌN KHÔNG</button>
            </div>
        </div>
    </div>

    <div id="page-news" class="page-section bg-slate-50 min-h-screen">
        <div class="p-6 bg-white border-b">
            <h2 class="text-2xl font-black" data-i18n="news_title">Tin tức</h2>
        </div>
        <div id="news-loader" class="py-20 text-center"><div class="loader"></div></div>
        <div id="news-col-vne" class="p-5 space-y-4"></div>
    </div>

    <div id="page-deposit" class="page-section p-5 min-h-screen">
        <div class="bg-white rounded-[40px] p-8 text-center border shadow-sm">
            <h3 class="font-black text-xl mb-6">Nạp P qua VietQR</h3>
            <div class="bg-slate-50 p-4 rounded-3xl border-2 border-dashed border-slate-200 mb-6">
                <img id="qr-img" src="https://via.placeholder.com/200?text=VietQR" class="w-48 h-48 mx-auto object-contain">
            </div>
            <div id="qr-text" class="p-4 bg-blue-50 rounded-2xl font-black text-blue-700 text-lg mb-6">FORELY_USER</div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="generateQR(50000)" class="bg-white border py-4 rounded-2xl font-black">50,000 P</button>
                <button onclick="generateQR(100000)" class="bg-white border py-4 rounded-2xl font-black">100,000 P</button>
            </div>
        </div>
    </div>

    <div id="login-modal" class="modal">
        <div class="bg-white w-[90%] max-w-sm rounded-[40px] p-10 text-center">
            <h2 class="text-2xl font-black mb-4">Xin chào!</h2>
            <p class="text-slate-500 text-sm mb-8">Đăng nhập để tham gia dự đoán.</p>
            <button onclick="loginGoogle()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black flex items-center justify-center gap-2">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-5 h-5"> Google Login
            </button>
            <button onclick="closeModal('login-modal')" class="mt-6 text-slate-400 font-bold text-xs uppercase">Đóng</button>
        </div>
    </div>

    <div id="trade-modal" class="modal">
        <div class="bg-white w-[90%] max-w-sm rounded-[40px] p-10">
            <h3 id="trade-title" class="font-black text-lg mb-6">Xác nhận</h3>
            <input type="number" id="trade-input" value="1000" class="w-full bg-slate-50 p-5 rounded-2xl text-2xl font-black mb-6 outline-none border">
            <button id="trade-confirm-btn" onclick="executeTradeToDatabase()" class="w-full py-4 rounded-2xl font-black text-white bg-blue-600">XÁC NHẬN</button>
            <button onclick="closeModal('trade-modal')" class="w-full mt-4 text-slate-400 font-bold text-xs">HỦY</button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 flex justify-around py-4 z-[100] bottom-nav">
        <button onclick="switchPage('home')" id="nav-home" class="flex flex-col items-center text-blue-600">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            <span class="text-[9px] font-black uppercase mt-1">Home</span>
        </button>
        <button onclick="switchPage('news')" id="nav-news" class="flex flex-col items-center text-slate-400">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            <span class="text-[9px] font-black uppercase mt-1">News</span>
        </button>
        <button onclick="switchPage('deposit')" id="nav-deposit" class="flex flex-col items-center text-slate-400">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
            <span class="text-[9px] font-black uppercase mt-1">Deposit</span>
        </button>
    </nav>

    <script>
        const APP_CONFIG = {
            sheetsUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vREHXHIoKFy_Vhds8sFY8pJzrvcLZItNS2O0hQTy8Z-JJ9TiwFvCYmQgWVyhLVpcyY1IheROL0ljntf/pub?gid=0&single=true&output=csv",
            firebase: {
                apiKey: "AIzaSyCuwGrrEG9IaoZ-9UAbf-1rMLZV61yiDsc", 
                authDomain: "forely-app-5a8e6.firebaseapp.com",
                projectId: "forely-app-5a8e6",
                storageBucket: "forely-app-5a8e6.firebasestorage.app",
                messagingSenderId: "563811990300",
                appId: "1:563811990300:web:c1983d8e017f796fb8d8d9",
                measurementId: "G-SG704VZBP8"
            }
        };

        const i18n = {
            vi: { login_btn: "Đăng nhập", search_placeholder: "Tìm kiếm...", news_title: "Tin tức", detail_title: "Chi tiết" },
            en: { login_btn: "Login", search_placeholder: "Search...", news_title: "Market News", detail_title: "Details" }
        };

        firebase.initializeApp(APP_CONFIG.firebase);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        let state = { user: null, balance: 5000, events: [], viewStatus: 'active', selectedEvent: null, liveListener: null };

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function switchPage(pageId) {
            document.querySelectorAll('.page-section').forEach(el => el.classList.remove('page-active'));
            document.getElementById('page-' + pageId).classList.add('page-active');
            ['home', 'news', 'deposit'].forEach(id => {
                const btn = document.getElementById('nav-'+id);
                if(btn) btn.classList.toggle('text-blue-600', id===pageId);
                if(btn) btn.classList.toggle('text-slate-400', id!==pageId);
            });
            if(pageId === 'news') fetchNews();
            if(pageId !== 'detail' && state.liveListener) { state.liveListener(); state.liveListener = null; }
        }

        function loginGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(() => closeModal('login-modal')).catch(e => showToast(e.message));
        }

        auth.onAuthStateChanged(u => {
            state.user = u;
            if(u) {
                document.getElementById('auth-area').innerHTML = `<img src="${u.photoURL}" class="w-10 h-10 rounded-full border-2 border-blue-500">`;
                document.getElementById('qr-text').innerText = "FORELY " + u.displayName.split(' ')[0].toUpperCase();
            }
        });

        function loadMarketData() {
            Papa.parse(APP_CONFIG.sheetsUrl, {
                download: true, header: true,
                complete: res => {
                    state.events = res.data.filter(r => r.Title).map((r, i) => ({
                        id: i.toString(), cat: r.Category, title: r.Title, yesRate: parseInt(r.YesRate)||50,
                        isActive: r.Status !== 'Ended', desc: r.Description || "Đang cập nhật..."
                    }));
                    document.getElementById('home-loader').style.display='none';
                    document.getElementById('market-grid').classList.remove('hidden');
                    renderMarketGrid();
                }
            });
        }

        function renderMarketGrid() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const filtered = state.events.filter(e => (state.viewStatus === 'active' ? e.isActive : !e.isActive) && e.title.toLowerCase().includes(term));
            document.getElementById('market-grid').innerHTML = filtered.map(e => `
                <div onclick="openEventDetailPage('${e.id}')" class="market-card p-6 cursor-pointer">
                    <div class="flex justify-between text-[10px] font-black uppercase mb-3 text-slate-400">
                        <span>${e.cat}</span><span>${e.isActive?'🟢 Open':'🔒 Closed'}</span>
                    </div>
                    <h3 class="text-sm font-black text-slate-800 mb-6">${e.title}</h3>
                    <div class="flex gap-2">
                        <button class="flex-1 py-3 rounded-xl bg-blue-50 text-blue-600 font-black text-xs">CÓ ${e.yesRate}%</button>
                        <button class="flex-1 py-3 rounded-xl bg-slate-50 text-slate-400 font-black text-xs">KHÔNG</button>
                    </div>
                </div>`).join('');
        }

        function openEventDetailPage(id) {
            state.selectedEvent = state.events.find(e => e.id === id);
            const ev = state.selectedEvent;
            document.getElementById('dt-title').innerText = ev.title;
            switchPage('detail');
            initChart(ev.yesRate);
            connectLive(ev.id, ev.yesRate);
        }

        function connectLive(eventId, baseRate) {
            const tbody = document.getElementById('live-order-body');
            state.liveListener = db.collection("trades").where("eventId", "==", eventId).orderBy("timestamp", "desc").limit(10).onSnapshot(snap => {
                let html = ""; let totalYes = 0; let totalNo = 0;
                snap.forEach(doc => {
                    const d = doc.data();
                    if(d.side === 'yes') totalYes += d.amount; else totalNo += d.amount;
                    html += `<tr class="border-b"><td class="p-4 font-bold">${d.userName.split(' ')[0]}</td><td class="p-4 text-center">${d.side.toUpperCase()}</td><td class="p-4 text-right">${d.amount}P</td></tr>`;
                });
                tbody.innerHTML = html || '<tr><td colspan="3" class="p-10 text-center italic text-slate-400">Chưa có lệnh nào.</td></tr>';
            });
        }

        function initChart(rate) {
            const ctx = document.getElementById('detailChart').getContext('2d');
            if(window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, {
                type: 'line',
                data: { labels: ['1h', '30m', '15m', 'Now'], datasets: [{ data: [rate-5, rate+2, rate-3, rate], borderColor: '#2563eb', tension: 0.4 }] },
                options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
            });
        }

        function handlePredictClick(side) {
            if(!state.user) { openModal('login-modal'); return; }
            state.tradeSide = side;
            document.getElementById('trade-title').innerText = "Dự đoán: " + side.toUpperCase();
            openModal('trade-modal');
        }

        async function executeTradeToDatabase() {
            const amt = parseInt(document.getElementById('trade-input').value);
            if(amt > state.balance) { showToast("Không đủ P"); return; }
            try {
                await db.collection("trades").add({
                    eventId: state.selectedEvent.id, userName: state.user.displayName,
                    side: state.tradeSide, amount: amt, timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                showToast("Thành công!");
                closeModal('trade-modal');
            } catch(e) { showToast("Lỗi: " + e.message); }
        }

        function generateQR(amt) {
            const note = document.getElementById('qr-text').innerText;
            document.getElementById('qr-img').src = `https://img.vietqr.io/image/MB-123456789-compact2.png?amount=${amt}&addInfo=${encodeURIComponent(note)}`;
            showToast("Đã tạo mã QR!");
        }

        async function fetchNews() {
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://vnexpress.net/rss/kinh-doanh.rss`);
            const data = await res.json();
            document.getElementById('news-loader').style.display='none';
            document.getElementById('news-col-vne').innerHTML = data.items.slice(0, 5).map(item => `
                <a href="${item.link}" target="_blank" class="block bg-white p-4 rounded-2xl border shadow-sm">
                    <h4 class="font-bold text-sm">${item.title}</h4>
                    <p class="text-[10px] text-blue-500 mt-2">VnExpress</p>
                </a>`).join('');
        }

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function setViewStatus(s) { state.viewStatus = s; renderMarketGrid(); }
        function switchLang(l) { localStorage.setItem('lang', l); location.reload(); }

        window.addEventListener('DOMContentLoaded', loadMarketData);
    </script>
</body>
</html>
