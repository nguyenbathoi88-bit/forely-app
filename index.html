<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forely - Nền tảng Nhận định Cộng đồng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f7f9fa; color: #111827; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .brand-text { background: linear-gradient(135deg, #1e3a8a 0%, #0d9488 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .page-section { display: none; animation: fadeIn 0.3s ease; }
        .page-active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal.active { display: flex; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #2dd4bf; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-24">

    <nav class="bg-white/95 backdrop-blur-md px-4 py-3 sticky top-0 z-50 flex justify-between items-center border-b border-gray-100 shadow-sm">
        <div onclick="switchPage('home')" class="flex items-center gap-2.5 cursor-pointer">
            <svg width="32" height="32" viewBox="0 0 120 120">
                <defs><linearGradient id="forelyBrand" x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stop-color="#3b82f6" /><stop offset="100%" stop-color="#2dd4bf" /></linearGradient></defs>
                <circle cx="60" cy="60" r="46" stroke="url(#forelyBrand)" stroke-width="10" fill="none"/>
                <path d="M35 85 L90 30 L65 95 L55 65 Z" fill="url(#forelyBrand)"/><path d="M35 85 L90 30 L25 55 L55 65 Z" fill="#1e293b"/>
            </svg>
            <h1 class="text-2xl font-extrabold brand-text tracking-tight">Forely</h1>
        </div>
        <div id="auth-area">
            <button onclick="openModal('login-modal')" class="bg-gray-100 text-gray-900 text-[13px] font-bold px-4 py-1.5 rounded-lg">Log In</button>
        </div>
    </nav>

    <div id="page-home" class="page-section page-active">
        <div class="bg-white sticky top-[60px] z-40 border-b border-gray-200">
            <div class="px-4 pt-3 pb-2">
                <input type="text" id="search-input" oninput="renderGrid()" placeholder="Tìm kiếm nhận định..." class="w-full bg-gray-50 border border-gray-200 rounded-lg py-2.5 pl-4 text-sm focus:ring-2 focus:ring-teal-500/20 outline-none">
                <div class="flex gap-2 bg-gray-100 p-1.5 rounded-lg mt-3">
                    <button onclick="setViewStatus('active')" id="tab-active" class="flex-1 py-1.5 text-xs font-bold rounded-md bg-white text-gray-900 shadow-sm">🟢 Đang mở</button>
                    <button onclick="setViewStatus('ended')" id="tab-ended" class="flex-1 py-1.5 text-xs font-bold rounded-md text-gray-500">⏳ Lịch sử</button>
                </div>
            </div>
            <div class="flex gap-2 overflow-x-auto px-4 pb-3 no-scrollbar">
                <button onclick="setCat('Tất cả', this)" class="cat-tab bg-gray-900 text-white px-4 py-1.5 rounded-full text-[11px] font-semibold shrink-0">Tất cả</button>
                <button onclick="setCat('Kinh tế vĩ mô', this)" class="cat-tab bg-gray-100 text-gray-600 px-4 py-1.5 rounded-full text-[11px] font-semibold shrink-0">Kinh tế vĩ mô</button>
                <button onclick="setCat('Chính sách', this)" class="cat-tab bg-gray-100 text-gray-600 px-4 py-1.5 rounded-full text-[11px] font-semibold shrink-0">Chính sách</button>
                <button onclick="setCat('Giải trí - Xã hội', this)" class="cat-tab bg-gray-100 text-gray-600 px-4 py-1.5 rounded-full text-[11px] font-semibold shrink-0">Giải trí - Xã hội</button>
                <button onclick="setCat('Hạ tầng - BĐS', this)" class="cat-tab bg-gray-100 text-gray-600 px-4 py-1.5 rounded-full text-[11px] font-semibold shrink-0">Hạ tầng - BĐS</button>
                <button onclick="setCat('Công nghệ', this)" class="cat-tab bg-gray-100 text-gray-600 px-4 py-1.5 rounded-full text-[11px] font-semibold shrink-0">Công nghệ</button>
                <button onclick="setCat('Thể thao', this)" class="cat-tab bg-gray-100 text-gray-600 px-4 py-1.5 rounded-full text-[11px] font-semibold shrink-0">Thể thao</button>
            </div>
        </div>
        <div id="loader" class="text-center py-10"><div class="loader"></div></div>
        <div id="market-grid" class="p-4 grid grid-cols-2 gap-3.5 md:grid-cols-3 hidden"></div>
    </div>

    <div id="page-news" class="page-section bg-white min-h-screen">
        <div class="p-4 border-b font-bold text-lg">Tin tức thị trường</div>
        <div id="news-container" class="p-4 flex flex-col gap-4"></div>
    </div>

    <div id="page-deposit" class="page-section bg-white min-h-screen p-4">
        <div class="bg-slate-50 rounded-2xl p-6 text-center border">
            <h3 class="font-bold mb-4">Nạp P qua VietQR</h3>
            <img id="qr-img" src="" class="w-48 h-48 mx-auto mb-4 rounded-xl shadow-sm border">
            <div class="bg-white p-3 rounded-lg border text-sm font-bold text-blue-600 uppercase">Nội dung: <span id="qr-content">FORELY USER</span></div>
        </div>
        <div class="grid grid-cols-2 gap-3 mt-6">
            <button onclick="genQR(50000)" class="p-4 border rounded-xl font-bold bg-white">50,000 P</button>
            <button onclick="genQR(100000)" class="p-4 border rounded-xl font-bold bg-white">100,000 P</button>
        </div>
    </div>

    <div id="page-rewards" class="page-section bg-gray-50 min-h-screen p-4">
        <div class="grid grid-cols-2 gap-4" id="reward-list">
            </div>
    </div>

    <div id="page-profile" class="page-section bg-white min-h-screen">
        <div class="p-8 text-center border-b">
            <img id="u-avatar" src="" class="w-20 h-20 rounded-full mx-auto border-4 border-teal-500 shadow-md">
            <h2 id="u-name" class="mt-4 text-xl font-black">User Name</h2>
            <p id="u-email" class="text-xs text-gray-400">email@example.com</p>
            <div class="mt-6 flex gap-3">
                <div class="flex-1 bg-gray-50 p-3 rounded-xl border">
                    <div class="text-[10px] text-gray-400 font-bold uppercase">Số dư</div>
                    <div class="text-lg font-black"><span class="u-balance">0</span> P</div>
                </div>
            </div>
            <button onclick="auth.signOut()" class="mt-8 text-red-500 font-bold text-sm">Đăng xuất</button>
        </div>
    </div>

    <div id="login-modal" class="modal">
        <div class="bg-white w-[85%] max-w-sm rounded-3xl p-8 text-center shadow-2xl">
            <h2 class="text-xl font-black mb-6">Đăng nhập Forely</h2>
            <button onclick="loginGoogle()" class="w-full bg-white border border-gray-200 py-3.5 rounded-xl flex items-center justify-center gap-3 shadow-sm active:scale-95 transition-all">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-5 h-5">
                <span class="text-sm font-bold text-gray-700">Tiếp tục với Google</span>
            </button>
            <button onclick="closeModal('login-modal')" class="mt-6 text-xs text-gray-400">Đóng</button>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t flex justify-around py-2 z-50">
        <button onclick="switchPage('home')" id="nav-home" class="flex flex-col items-center gap-1 w-1/5 text-teal-600"><span class="text-xl">🧭</span><span class="text-[9px] font-bold">Khảo sát</span></button>
        <button onclick="switchPage('news')" id="nav-news" class="flex flex-col items-center gap-1 w-1/5 text-gray-400"><span class="text-xl">📰</span><span class="text-[9px] font-bold">Tin tức</span></button>
        <button onclick="switchPage('deposit')" id="nav-deposit" class="flex flex-col items-center gap-1 w-1/5 text-gray-400"><span class="text-xl">💳</span><span class="text-[9px] font-bold">Nạp P</span></button>
        <button onclick="switchPage('rewards')" id="nav-rewards" class="flex flex-col items-center gap-1 w-1/5 text-gray-400"><span class="text-xl">🎁</span><span class="text-[9px] font-bold">Quà</span></button>
        <button onclick="switchPage('profile')" id="nav-profile" class="flex flex-col items-center gap-1 w-1/5 text-gray-400"><span class="text-xl">👤</span><span class="text-[9px] font-bold">Tôi</span></button>
    </div>

    <script>
        // --- 1. CONFIG (THAY CONFIG CỦA BẠN VÀO ĐÂY) ---
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vREHXHIoKFy_Vhds8sFY8pJzrvcLZItNS2O0hQTy8Z-JJ9TiwFvCYmQgWVyhLVpcyY1IheROL0ljntf/pub?gid=0&single=true&output=csv";
        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "forely-app.firebaseapp.com",
            projectId: "forely-app",
            storageBucket: "forely-app.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // --- 2. STATE ---
        let user = null; let balance = 5000; let allEvents = []; let viewStatus = 'active'; let viewCat = 'Tất cả';

        // --- 3. FIREBASE AUTH ---
        function loginGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(() => closeModal('login-modal')).catch(e => alert("Lỗi đăng nhập: " + e.message));
        }

        auth.onAuthStateChanged(u => {
            if(u) {
                user = u;
                document.getElementById('auth-area').innerHTML = `
                    <div class="flex items-center gap-2">
                        <div class="bg-gray-100 px-3 py-1.5 rounded-lg flex items-center gap-1.5 border">
                            <span class="text-xs">💎</span><span class="text-[13px] font-bold u-balance">${balance.toLocaleString()}</span>
                        </div>
                        <img src="${u.photoURL}" onclick="switchPage('profile')" class="w-8 h-8 rounded-full border border-teal-500 cursor-pointer">
                    </div>`;
                document.getElementById('u-name').innerText = u.displayName;
                document.getElementById('u-email').innerText = u.email;
                document.getElementById('u-avatar').src = u.photoURL;
                document.getElementById('qr-content').innerText = "FORELY " + u.displayName.split(' ').pop().toUpperCase();
                genQR(50000);
            } else {
                user = null;
                document.getElementById('auth-area').innerHTML = `<button onclick="openModal('login-modal')" class="bg-gray-100 text-[13px] font-bold px-4 py-1.5 rounded-lg">Log In</button>`;
            }
        });

        // --- 4. GOOGLE SHEETS & GRID ---
        function fetchEvents() {
            Papa.parse(SHEET_URL, { download: true, header: true, complete: res => {
                const now = new Date().getTime();
                allEvents = res.data.filter(r => r.Title).map((r, i) => ({
                    id: i, cat: r.Category, title: r.Title, yesRate: parseInt(r.YesRate)||50, deadline: r.Deadline,
                    isActive: !(r.Status==='Ended' || (r.Deadline && new Date(r.Deadline).getTime() < now)),
                    result: r.Result ? r.Result.trim().toLowerCase() : ""
                }));
                document.getElementById('loader').style.display = 'none';
                document.getElementById('market-grid').classList.remove('hidden');
                renderGrid();
            }});
        }

        function renderGrid() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const grid = document.getElementById('market-grid');
            const filtered = allEvents.filter(e => (viewStatus==='active'?e.isActive:!e.isActive) && (viewCat==='Tất cả'||e.cat===viewCat) && e.title.toLowerCase().includes(term));
            
            grid.innerHTML = filtered.map(e => {
                const noRate = 100 - e.yesRate;
                let yC = "bg-blue-50 text-blue-600"; let nC = "bg-red-50 text-red-600"; let yI = ""; let nI = "";
                if(!e.isActive) {
                    yC = nC = "bg-gray-100 text-gray-400";
                    if(e.result==='có') { yC = "bg-teal-50 text-teal-700 border border-teal-200"; yI = "🏆 "; }
                    else if(e.result==='không') { nC = "bg-teal-50 text-teal-700 border border-teal-200"; nI = "🏆 "; }
                }
                return `<div class="bg-white p-3.5 rounded-xl border border-gray-200 shadow-sm flex flex-col justify-between h-44">
                    <div>
                        <div class="flex justify-between items-center mb-2.5 text-[10px] font-bold">
                            <span class="text-gray-400 truncate w-1/2">${e.cat}</span>
                            <span class="${e.isActive?'text-teal-600':'text-orange-500'}">${e.isActive?'⏳':'🔒'} ${e.deadline||''}</span>
                        </div>
                        <h3 class="text-xs font-semibold line-clamp-3 leading-snug">${e.title}</h3>
                    </div>
                    <div class="flex gap-2">
                        <button class="flex-1 py-2 rounded-lg text-[11px] font-bold ${yC}">${yI}Có ${e.yesRate}%</button>
                        <button class="flex-1 py-2 rounded-lg text-[11px] font-bold ${nC}">${nI}Không</button>
                    </div>
                </div>`;
            }).join('');
        }

        // --- 5. TÍNH NĂNG KHÁC ---
        function switchPage(p) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('page-active'));
            document.getElementById('page-'+p).classList.add('page-active');
            ['home', 'news', 'deposit', 'rewards', 'profile'].forEach(id => {
                const btn = document.getElementById('nav-'+id);
                if(btn) btn.className = "flex flex-col items-center gap-1 w-1/5 py-1 " + (id===p ? "text-teal-600" : "text-gray-400");
            });
            if(p==='news') fetch('https://api.rss2json.com/v1/api.json?rss_url=https://vnexpress.net/rss/kinh-doanh.rss').then(r=>r.json()).then(d=>{
                document.getElementById('news-container').innerHTML = d.items.slice(0,10).map(i => `<a href="${i.link}" target="_blank" class="block bg-gray-50 p-3 rounded-xl text-sm font-bold">${i.title}</a>`).join('');
            });
            if(p==='rewards') {
                const rs = [{n:"Thẻ 10k", p:10000}, {n:"Voucher 50k", p:50000}];
                document.getElementById('reward-list').innerHTML = rs.map(r => `<div class="bg-white p-4 rounded-xl border text-center"><div class="font-bold">${r.n}</div><button class="w-full bg-teal-600 text-white py-2 rounded-lg mt-3 text-xs font-bold">Đổi ${r.p.toLocaleString()} P</button></div>`).join('');
            }
        }

        function setViewStatus(s) {
            viewStatus = s;
            document.getElementById('tab-active').className = "flex-1 py-1.5 text-xs font-bold rounded-md " + (s==='active'?'bg-white shadow-sm text-gray-900':'text-gray-500');
            document.getElementById('tab-ended').className = "flex-1 py-1.5 text-xs font-bold rounded-md " + (s==='ended'?'bg-white shadow-sm text-gray-900':'text-gray-500');
            renderGrid();
        }

        function setCat(c, el) {
            viewCat = c;
            document.querySelectorAll('.cat-tab').forEach(t => t.className = "cat-tab bg-gray-100 text-gray-600 px-4 py-1.5 rounded-full text-[11px] font-semibold shrink-0");
            el.className = "cat-tab bg-gray-900 text-white px-4 py-1.5 rounded-full text-[11px] font-semibold shrink-0";
            renderGrid();
        }

        function genQR(amt) {
            const content = document.getElementById('qr-content').innerText;
            document.getElementById('qr-img').src = `https://img.vietqr.io/image/MB-123456789-compact2.png?amount=${amt}&addInfo=${encodeURIComponent(content)}`;
        }

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        window.onload = fetchEvents;
    </script>
</body>
</html>
