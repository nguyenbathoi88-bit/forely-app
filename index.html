<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forely - Trí tuệ cộng đồng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        // Cấu hình tông màu Xanh Đậm và Trắng
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e3a8a',    // Xanh đậm Navy (Đại diện cho uy tín Fintech)
                        secondary: '#3b82f6',  // Xanh dương sáng (Điểm nhấn)
                        surface: '#f8fafc',    // Trắng xám nền (Giúp thẻ nội dung nổi bật)
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        /* Ẩn thanh cuộn để giao diện giống App di động */
      .hide-scroll-bar::-webkit-scrollbar { display: none; }
      .hide-scroll-bar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-surface text-slate-800 pb-20">

<nav class="sticky top-0 z-40 bg-primary shadow-md">
    <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
        <div class="text-white font-bold text-2xl flex items-center gap-2 cursor-pointer" onclick="location.reload()">
            <i class="fa-solid fa-compass text-secondary"></i> <span class="tracking-wide">FORELY</span>
        </div>
        
        <div class="flex items-center gap-4">
            <div class="hidden md:block relative">
                <input type="text" id="searchInputDesktop" oninput="handleSearch(this.value)" placeholder="Tìm kiếm sự kiện..." class="bg-white/10 text-sm text-white placeholder-blue-200 rounded-full pl-10 pr-4 py-2 w-64 focus:outline-none focus:bg-white focus:text-slate-900 focus:placeholder-slate-400 transition-all border border-blue-800">
                <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-2.5 text-blue-300" id="searchIconDesktop"></i>
            </div>
            <div class="bg-white rounded-full px-4 py-1.5 flex items-center gap-2 shadow-sm border border-slate-200">
                <i class="fa-solid fa-coins text-yellow-500"></i>
                <span id="user-balance" class="font-bold text-primary text-sm md:text-base">100.000</span>
            </div>
        </div>
    </div>
</nav>

<div class="md:hidden px-4 py-3 bg-white border-b border-slate-200 shadow-sm sticky top-[60px] z-30">
    <div class="relative">
        <input type="text" id="searchInputMobile" oninput="handleSearch(this.value)" placeholder="Tìm kiếm nhanh..." class="w-full bg-slate-100 text-sm text-slate-800 rounded-full pl-10 pr-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-secondary border border-slate-300">
        <i class="fa-solid fa-magnifying-glass absolute left-4 top-3 text-slate-400"></i>
    </div>
</div>

<main class="max-w-6xl mx-auto px-4 py-6 grid grid-cols-1 md:grid-cols-4 gap-6">
    
    <aside class="md:col-span-1">
        <h2 class="hidden md:block text-slate-500 font-bold mb-4 uppercase text-sm tracking-wider">Bộ lọc chuyên mục</h2>
        <div class="flex overflow-x-auto md:flex-col gap-2 pb-2 md:pb-0 hide-scroll-bar" id="category-container">
            </div>
    </aside>

    <div class="md:col-span-3 space-y-5" id="events-container">
        </div>

</main>

<div id="prediction-modal" class="hidden fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm transition-opacity">
    <div class="bg-white w-full max-w-md rounded-2xl p-6 shadow-2xl relative transform transition-all border border-slate-100">
        <button onclick="closeModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-700 bg-slate-100 hover:bg-slate-200 rounded-full w-8 h-8 flex items-center justify-center transition-colors"><i class="fa-solid fa-xmark text-lg"></i></button>
        
        <h2 class="text-2xl font-bold text-slate-900 text-center mb-1">Xác nhận Dự báo</h2>
        <p id="modal-event-title" class="text-sm text-slate-500 text-center mb-5 line-clamp-2">Tên sự kiện...</p>
        
        <div class="bg-slate-50 rounded-xl p-4 mb-5 flex justify-between items-center border border-slate-200">
            <span class="text-slate-600 font-medium">Lựa chọn của bạn:</span>
            <span id="modal-choice" class="font-bold text-xl px-3 py-1 rounded-lg">CÓ</span>
        </div>

        <div class="mb-5">
            <div class="flex justify-between text-sm mb-2">
                <label class="text-slate-600 font-medium">Số điểm FP đầu tư:</label>
                <span class="text-secondary font-semibold cursor-pointer hover:underline" onclick="setAllIn()">Tất cả (All-in)</span>
            </div>
            <div class="relative">
                <input type="number" id="invest-amount" value="10000" oninput="calculateReward()" class="w-full bg-white text-slate-900 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-secondary focus:border-secondary text-xl font-bold text-center border-2 border-slate-200 transition-all">
                <span class="absolute right-4 top-3.5 text-slate-400 font-bold">FP</span>
            </div>
        </div>

        <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 mb-6 text-center relative overflow-hidden">
            <span class="text-xs text-blue-600 font-bold block mb-1 uppercase tracking-wider">Quà tặng Voucher ước tính</span>
            <div class="text-3xl font-black text-secondary flex justify-center items-center gap-1">
                <span id="estimated-reward">0</span> <span class="text-lg text-blue-500">VNĐ</span>
            </div>
            <span id="odds-display" class="text-xs text-slate-500 mt-2 block font-medium">Tỷ lệ nhân: x0 (Bao gồm gốc)</span>
        </div>

        <button onclick="submitPrediction()" class="w-full py-3.5 rounded-xl font-bold text-white bg-primary shadow-lg shadow-blue-900/30 hover:bg-blue-800 transition-colors text-lg">
            XÁC NHẬN ĐẦU TƯ
        </button>
    </div>
</div>

<script>
    // --- DỮ LIỆU MÔ PHỎNG ---
    let currentBalance = 100000;
    let currentCategory = 'Tất cả';
    let searchQuery = '';
    let activeEvent = null;
    let activeChoice = '';

    const categories =;

    // Bổ sung nhiều sự kiện đa dạng hơn
    const eventsData =;

    // --- KHỞI TẠO GIAO DIỆN ---
    window.onload = () => {
        updateBalanceDisplay();
        renderCategories();
        renderEvents();
    };

    function updateBalanceDisplay() {
        document.getElementById('user-balance').innerText = currentBalance.toLocaleString('vi-VN');
    }

    // --- LOGIC RENDER DANH MỤC LỌC ---
    function renderCategories() {
        const container = document.getElementById('category-container');
        container.innerHTML = '';
        
        categories.forEach(cat => {
            const isSelected = cat === currentCategory;
            // Áp dụng class sáng màu
            const btnClass = isSelected 
              ? 'bg-primary text-white font-bold px-5 py-2.5 md:py-3 rounded-full md:rounded-xl whitespace-nowrap shadow-md transition-all' 
                : 'bg-white text-slate-600 hover:text-primary hover:bg-slate-50 px-5 py-2.5 md:py-3 rounded-full md:rounded-xl whitespace-nowrap border border-slate-300 transition-all cursor-pointer font-medium shadow-sm';
            
            const btn = document.createElement('button');
            btn.className = btnClass;
            btn.innerText = cat;
            btn.onclick = () => {
                currentCategory = cat;
                renderCategories();
                renderEvents();
            };
            container.appendChild(btn);
        });
    }

    // --- LOGIC TÌM KIẾM ---
    function handleSearch(value) {
        searchQuery = value.toLowerCase();
        document.getElementById('searchInputDesktop').value = value;
        document.getElementById('searchInputMobile').value = value;
        renderEvents();
    }

    // --- LOGIC RENDER DANH SÁCH SỰ KIỆN ---
    function renderEvents() {
        const container = document.getElementById('events-container');
        container.innerHTML = '';

        const filteredEvents = eventsData.filter(e => {
            const matchCategory = currentCategory === 'Tất cả' |

| e.category === currentCategory;
            const matchSearch = e.title.toLowerCase().includes(searchQuery);
            return matchCategory && matchSearch;
        });

        if(filteredEvents.length === 0) {
            container.innerHTML = `
                <div class="text-center py-16 bg-white rounded-2xl border border-slate-200 flex flex-col items-center shadow-sm">
                    <i class="fa-regular fa-folder-open text-5xl text-slate-300 mb-4"></i>
                    <p class="text-slate-500 font-medium text-lg">Không tìm thấy sự kiện nào phù hợp.</p>
                    <p class="text-slate-400 text-sm mt-1">Vui lòng thử từ khóa khác.</p>
                </div>`;
            return;
        }

        filteredEvents.forEach(e => {
            const card = document.createElement('div');
            // Thẻ màu trắng, bóng mờ
            card.className = 'bg-white rounded-2xl p-5 md:p-6 border border-slate-200 hover:border-secondary hover:shadow-lg transition-all duration-300 shadow-sm group';
            card.innerHTML = `
                <div class="flex justify-between items-start mb-4">
                    <div class="flex items-center gap-2">
                        <span class="text-xs font-bold bg-blue-50 text-secondary border border-blue-100 px-3 py-1.5 rounded-md uppercase tracking-wide">${e.category}</span>
                        <span class="text-xs text-slate-500 font-medium flex items-center gap-1.5 bg-slate-50 px-2.5 py-1.5 rounded-md border border-slate-100"><i class="fa-solid fa-users text-slate-400"></i> ${e.participants.toLocaleString()} FP</span>
                    </div>
                    <span class="text-xs font-bold text-rose-600 bg-rose-50 border border-rose-100 px-3 py-1.5 rounded-md flex items-center gap-1.5 shadow-sm">
                        <i class="fa-regular fa-clock"></i> ${e.time}
                    </span>
                </div>
                
                <h3 class="font-bold text-lg md:text-xl mb-2 leading-snug text-slate-900 group-hover:text-primary transition-colors">${e.title}</h3>
                <p class="text-sm text-slate-500 mb-6 font-medium"><i class="fa-solid fa-check-double text-emerald-500 mr-1"></i> Xác thực bởi: <span class="text-slate-700 underline decoration-slate-300 underline-offset-2">${e.source}</span></p>
                
                <div class="grid grid-cols-2 gap-3 md:gap-4">
                    <button onclick="openModal(${e.id}, 'YES')" class="relative overflow-hidden bg-primary border-2 border-primary rounded-xl py-3 hover:bg-blue-800 hover:border-blue-800 transition-all text-center shadow-md">
                        <span class="block font-black text-white mb-0.5 text-lg">CÓ</span>
                        <span class="block text-sm text-blue-200 font-medium">Tỷ lệ: x${e.oddsYes.toFixed(2)}</span>
                    </button>
                    
                    <button onclick="openModal(${e.id}, 'NO')" class="relative overflow-hidden bg-white border-2 border-slate-300 rounded-xl py-3 hover:bg-slate-50 hover:border-slate-400 transition-all text-center shadow-sm">
                        <span class="block font-black text-slate-700 mb-0.5 text-lg">KHÔNG</span>
                        <span class="block text-sm text-slate-500 font-medium">Tỷ lệ: x${e.oddsNo.toFixed(2)}</span>
                    </button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // --- LOGIC XỬ LÝ POPUP ---
    function openModal(eventId, choice) {
        activeEvent = eventsData.find(e => e.id === eventId);
        activeChoice = choice;

        document.getElementById('modal-event-title').innerText = activeEvent.title;
        
        const choiceEl = document.getElementById('modal-choice');
        if(choice === 'YES') {
            choiceEl.innerText = 'CÓ (YES)';
            choiceEl.className = 'font-bold text-lg px-4 py-1.5 rounded-lg bg-blue-50 text-blue-700 border border-blue-200';
        } else {
            choiceEl.innerText = 'KHÔNG (NO)';
            choiceEl.className = 'font-bold text-lg px-4 py-1.5 rounded-lg bg-slate-100 text-slate-700 border border-slate-300';
        }

        document.getElementById('prediction-modal').classList.remove('hidden');
        document.body.style.overflow = 'hidden'; 
        
        document.getElementById('invest-amount').value = 10000;
        calculateReward();
    }

    function closeModal() {
        document.getElementById('prediction-modal').classList.add('hidden');
        document.body.style.overflow = 'auto'; 
        activeEvent = null;
    }

    function setAllIn() {
        document.getElementById('invest-amount').value = currentBalance;
        calculateReward();
    }

    function calculateReward() {
        if(!activeEvent) return;
        
        let amount = parseInt(document.getElementById('invest-amount').value) |

| 0;
        let odds = activeChoice === 'YES'? activeEvent.oddsYes : activeEvent.oddsNo;
        
        let reward = Math.floor(amount * odds); 
        
        document.getElementById('estimated-reward').innerText = reward.toLocaleString('vi-VN');
        document.getElementById('odds-display').innerText = `Tỷ lệ nhân: x${odds.toFixed(2)} (Bao gồm gốc)`;
    }

    function submitPrediction() {
        let amount = parseInt(document.getElementById('invest-amount').value);
        
        if (isNaN(amount) |

| amount <= 0) {
            alert('Vui lòng nhập số điểm hợp lệ!');
            return;
        }
        
        if(amount > currentBalance) {
            alert('Bạn không đủ F-Point! Vui lòng nạp thêm qua VietQR.');
            return;
        }

        currentBalance -= amount;
        updateBalanceDisplay();
        
        activeEvent.participants += Math.floor(amount/1000); // Tăng volume điểm giả lập
        renderEvents(); 

        closeModal();
        
        setTimeout(() => {
            alert(`✅ GHI NHẬN THÀNH CÔNG!\n\nBạn đã đầu tư ${amount.toLocaleString('vi-VN')} FP vào sự kiện này.\nVoucher sẽ tự động cộng vào tài khoản nếu dự báo chính xác.`);
        }, 200);
    }
</script>

</body>
</html>
