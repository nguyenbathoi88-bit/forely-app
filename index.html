<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forely - Prediction Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f7f9fa; color: #111827; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* Modal Style */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal.active { display: flex; }

        /* Animation cho Nút */
        button:active { transform: scale(0.98); transition: all 0.1s; }
        
        /* Màu chủ đạo chuẩn Logo */
        .logo-color { fill: #0f172a; stroke: #0f172a; }
    </style>
</head>
<body class="pb-20">

    <nav class="bg-white px-4 py-3 sticky top-0 z-50 flex justify-between items-center border-b border-gray-200">
        <div onclick="goHome()" class="flex items-center gap-2.5 cursor-pointer">
            <svg width="28" height="28" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="55" cy="60" r="45" stroke="#0f172a" stroke-width="8"/>
                <circle cx="95" cy="25" r="10" stroke="#0f172a" stroke-width="7"/>
                <path d="M55 20v8M55 92v8M20 60h8M82 60h8" stroke="#0f172a" stroke-width="5" stroke-linecap="round"/>
                <path d="M35 85L85 35L62 90L52 68Z" fill="#0f172a"/>
                <path d="M35 85L85 35L30 62L52 68Z" fill="#334155"/>
            </svg>
            <h1 class="text-xl font-bold text-gray-900 tracking-tight">Forely</h1>
        </div>
        
        <div id="auth-area">
            <button onclick="openLoginModal()" class="bg-gray-100 hover:bg-gray-200 text-gray-900 text-sm font-semibold px-4 py-1.5 rounded-lg transition-colors">
                Log In
            </button>
        </div>
    </nav>

    <div class="bg-white sticky top-[53px] z-40 border-b border-gray-200">
        <div class="px-4 py-3">
            <div class="relative">
                <input type="text" id="search-input" oninput="searchEvents()" placeholder="Search markets..." class="w-full bg-gray-100 border-none rounded-lg py-2 pl-9 pr-4 text-sm font-medium text-gray-900 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <span class="absolute left-3 top-2.5 text-gray-400">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                </span>
            </div>
        </div>
        <div class="flex gap-2 overflow-x-auto px-4 pb-3 no-scrollbar">
            <button onclick="filter('Tất cả', this)" class="tab bg-gray-900 text-white px-4 py-1.5 rounded-full text-xs font-semibold shrink-0 transition-all">Tất cả</button>
            <button onclick="filter('Kinh tế', this)" class="tab bg-gray-100 text-gray-600 hover:bg-gray-200 px-4 py-1.5 rounded-full text-xs font-semibold shrink-0 transition-all">Kinh tế</button>
            <button onclick="filter('Giải trí', this)" class="tab bg-gray-100 text-gray-600 hover:bg-gray-200 px-4 py-1.5 rounded-full text-xs font-semibold shrink-0 transition-all">Giải trí</button>
            <button onclick="filter('Công nghệ', this)" class="tab bg-gray-100 text-gray-600 hover:bg-gray-200 px-4 py-1.5 rounded-full text-xs font-semibold shrink-0 transition-all">Công nghệ</button>
            <button onclick="filter('Thể thao', this)" class="tab bg-gray-100 text-gray-600 hover:bg-gray-200 px-4 py-1.5 rounded-full text-xs font-semibold shrink-0 transition-all">Thể thao</button>
        </div>
    </div>

    <div id="market-grid" class="p-4 grid grid-cols-2 gap-3">
        </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around py-3 z-50">
        <button onclick="goHome()" class="flex flex-col items-center gap-1 text-gray-900">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span class="text-[10px] font-semibold">Markets</span>
        </button>
        <button onclick="alert('Đổi Voucher sắp ra mắt!')" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-900">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"/><rect x="16" y="14" width="4" height="4" rx="1"/></svg>
            <span class="text-[10px] font-semibold">Rewards</span>
        </button>
        <button onclick="alert('Bảng xếp hạng')" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-900">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20v-8m0 0V4m0 8h8m-8 0H4"/></svg>
            <span class="text-[10px] font-semibold">Leaderboard</span>
        </button>
    </div>

    <div id="login-modal" class="modal">
        <div class="bg-white w-[85%] max-w-sm rounded-2xl p-6 text-center shadow-xl">
            <h2 class="text-xl font-bold text-gray-900 mb-2">Log in to Forely</h2>
            <p class="text-gray-500 text-sm mb-6">Đăng nhập để nhận <span class="text-blue-600 font-semibold">5,000 P</span> miễn phí.</p>
            
            <div class="space-y-3">
                <button onclick="doLogin('Google')" class="w-full bg-white border border-gray-300 py-3 rounded-lg flex items-center justify-center gap-3 hover:bg-gray-50">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-5 h-5">
                    <span class="text-sm font-semibold text-gray-700">Continue with Google</span>
                </button>
                <button onclick="doLogin('Facebook')" class="w-full bg-[#1877F2] text-white py-3 rounded-lg flex items-center justify-center gap-3 hover:bg-[#166fe5]">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_2023.png" class="w-5 h-5 invert">
                    <span class="text-sm font-semibold">Continue with Facebook</span>
                </button>
                <button onclick="closeLoginModal()" class="w-full py-2 text-sm font-medium text-gray-500 mt-2">Cancel</button>
            </div>
        </div>
    </div>

    <div id="trade-modal" class="modal">
        <div class="bg-white w-[90%] max-w-sm rounded-2xl shadow-2xl overflow-hidden flex flex-col">
            <div id="modal-header" class="px-5 py-4 flex justify-between items-start border-b border-gray-100">
                <div class="pr-4">
                    <p id="modal-side-badge" class="text-[10px] font-bold uppercase tracking-wider mb-1"></p>
                    <h3 id="modal-title" class="text-sm font-semibold text-gray-900 leading-snug"></h3>
                </div>
                <button onclick="closeTradeModal()" class="text-gray-400 hover:text-gray-600">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            </div>
            
            <div class="p-5">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-sm font-medium text-gray-700">Đầu tư (F-Point)</span>
                    <span class="text-xs font-medium text-gray-500">Số dư: <span id="modal-balance">0</span></span>
                </div>
                <div class="relative mb-6">
                    <input type="number" id="input-amount" value="100" class="w-full bg-gray-50 border border-gray-200 rounded-lg py-3 px-4 text-xl font-bold text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-colors" oninput="calculatePrize()">
                    <span class="absolute right-4 top-3.5 text-gray-400 font-semibold">P</span>
                </div>

                <div class="bg-gray-50 rounded-lg p-3 mb-6 flex items-center justify-between border border-gray-100">
                    <span class="text-xs font-medium text-gray-500">Ước tính quà tặng</span>
                    <span id="prize-estimate" class="text-sm font-bold text-green-600">Thẻ nạp 10k</span>
                </div>

                <button onclick="confirmTrade()" id="btn-confirm" class="w-full py-3.5 rounded-lg text-sm font-bold text-white shadow-sm transition-colors">
                    Xác nhận dự báo
                </button>
            </div>
        </div>
    </div>

    <script>
        let isGuest = true;
        let balance = 0;
        let selectedEvent = null;

        const categories = ["Kinh tế", "Giải trí", "Công nghệ", "Thể thao"];
        const titles = ["Will VN-Index hit 1500 in 2026?", "Will gold prices drop below 80M?", "Will Apple remove charging port?", "Will BlackPink tour in VN?", "Will interest rates drop?", "Will VinFast launch new SUV?"];

        // Generate 100 Markets
        const allEvents = Array.from({ length: 100 }, (_, i) => ({
            id: i,
            cat: categories[i % categories.length],
            title: titles[i % titles.length] + " #" + (i + 1),
            yesRate: Math.floor(Math.random() * 80 + 10),
            vol: "$" + (Math.random() * 5 + 1).toFixed(1) + "M"
        }));

        // RENDER THE GRID (POLYMARKET CARD STYLE)
        function render(data = allEvents) {
            const grid = document.getElementById('market-grid');
            grid.innerHTML = data.map(e => {
                const noRate = 100 - e.yesRate;
                return `
                <div class="bg-white p-3 rounded-xl border border-gray-200 shadow-sm flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[10px] font-medium text-gray-500 flex items-center gap-1">
                                <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2v20M2 12h20"/></svg>
                                ${e.cat}
                            </span>
                            <span class="text-[10px] font-medium text-gray-400">${e.vol}</span>
                        </div>
                        <h3 class="text-xs font-semibold text-gray-900 line-clamp-2 mb-4 leading-snug">${e.title}</h3>
                    </div>
                    
                    <div class="flex gap-2 mt-auto">
                        <button onclick="handlePredict(${e.id}, 'Yes')" class="flex-1 flex justify-between items-center bg-[#eff6ff] hover:bg-[#dbeafe] text-[#2563eb] text-[11px] font-semibold py-2 px-2.5 rounded-lg transition-colors">
                            <span>Yes</span>
                            <span>${e.yesRate}¢</span>
                        </button>
                        <button onclick="handlePredict(${e.id}, 'No')" class="flex-1 flex justify-between items-center bg-[#fef2f2] hover:bg-[#fee2e2] text-[#dc2626] text-[11px] font-semibold py-2 px-2.5 rounded-lg transition-colors">
                            <span>No</span>
                            <span>${noRate}¢</span>
                        </button>
                    </div>
                </div>
            `}).join('');
        }

        // LUỒNG XỬ LÝ
        function handlePredict(id, type) {
            if (isGuest) {
                openLoginModal();
            } else {
                openTradeModal(id, type);
            }
        }

        // ĐĂNG NHẬP
        function openLoginModal() { document.getElementById('login-modal').classList.add('active'); }
        function closeLoginModal() { document.getElementById('login-modal').classList.remove('active'); }
        
        function doLogin(provider) {
            isGuest = false;
            balance = 5000;
            closeLoginModal();
            document.getElementById('auth-area').innerHTML = `
                <div class="bg-gray-100 px-3 py-1.5 rounded-lg flex items-center gap-1.5">
                    <span class="text-xs">💎</span>
                    <span id="balance-display" class="text-xs font-bold text-gray-900">${balance.toLocaleString()} P</span>
                </div>
            `;
        }

        // GIAO DỊCH
        function openTradeModal(id, type) {
            selectedEvent = { ...allEvents[id], side: type };
            
            // Đổi màu Modal Header theo Yes/No
            const badge = document.getElementById('modal-side-badge');
            const btnConfirm = document.getElementById('btn-confirm');
            
            if(type === 'Yes') {
                badge.innerText = 'Buy Yes';
                badge.className = 'text-[10px] font-bold uppercase tracking-wider mb-1 text-blue-600';
                btnConfirm.className = 'w-full py-3.5 rounded-lg text-sm font-bold text-white shadow-sm transition-colors bg-blue-600 hover:bg-blue-700';
            } else {
                badge.innerText = 'Buy No';
                badge.className = 'text-[10px] font-bold uppercase tracking-wider mb-1 text-red-600';
                btnConfirm.className = 'w-full py-3.5 rounded-lg text-sm font-bold text-white shadow-sm transition-colors bg-red-600 hover:bg-red-700';
            }

            document.getElementById('modal-title').innerText = selectedEvent.title;
            document.getElementById('modal-balance').innerText = balance.toLocaleString() + ' P';
            document.getElementById('trade-modal').classList.add('active');
            calculatePrize();
        }

        function closeTradeModal() { document.getElementById('trade-modal').classList.remove('active'); }

        function calculatePrize() {
            const amt = parseInt(document.getElementById('input-amount').value) || 0;
            const prizeEl = document.getElementById('prize-estimate');
            if (amt < 500) prizeEl.innerText = "Thẻ cào 10k";
            else if (amt < 2000) prizeEl.innerText = "Grab 50k";
            else prizeEl.innerText = "Shopee 200k";
        }

        function confirmTrade() {
            const amt = parseInt(document.getElementById('input-amount').value);
            if (isNaN(amt) || amt <= 0) return;
            if (amt > balance) { alert("Không đủ F-Point!"); return; }
            
            balance -= amt;
            document.getElementById('balance-display').innerText = balance.toLocaleString() + " P";
            closeTradeModal();
            alert("Order submitted successfully!");
        }

        // TÌM KIẾM & LỌC
        function goHome() {
            document.getElementById('search-input').value = '';
            filter('Tất cả', document.getElementById('default-tab'));
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function searchEvents() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const filtered = allEvents.filter(e => e.title.toLowerCase().includes(term) || e.cat.toLowerCase().includes(term));
            render(filtered);
        }

        function filter(cat, el) {
            document.querySelectorAll('.tab').forEach(t => {
                t.className = "tab bg-gray-100 text-gray-600 hover:bg-gray-200 px-4 py-1.5 rounded-full text-xs font-semibold shrink-0 transition-all";
            });
            el.className = "tab bg-gray-900 text-white px-4 py-1.5 rounded-full text-xs font-semibold shrink-0 transition-all";
            render(cat === 'Tất cả' ? allEvents : allEvents.filter(e => e.cat === cat));
        }

        render();
    </script>
</body>
</html>
