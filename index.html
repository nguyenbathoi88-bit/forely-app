<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forely - Trí tuệ Cộng đồng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfd; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* Modal & Overlay */
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.5); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal.active { display: flex; }

        /* Card Styling */
        .forecast-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .forecast-card:active { transform: scale(0.96); }
        .logo-btn:active { transform: scale(0.95); transition: 0.1s; }
    </style>
</head>
<body class="pb-28 text-slate-800">

    <nav class="bg-white/95 backdrop-blur-md p-4 sticky top-0 z-50 flex justify-between items-center border-b border-slate-100 shadow-sm">
        <div onclick="goHome()" class="flex items-center gap-3 cursor-pointer logo-btn">
            <svg width="32" height="32" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="40" height="40" rx="10" fill="#1e293b"/>
                <circle cx="20" cy="20" r="14" stroke="#38bdf8" stroke-width="2" stroke-dasharray="2 2"/>
                <path d="M20 10L24 20L20 18L16 20L20 10Z" fill="white"/>
                <path d="M20 30L16 20L20 22L24 20L20 30Z" fill="#64748b"/>
            </svg>
            <h1 class="text-xl font-extrabold text-[#1e293b] tracking-tight">Forely</h1>
        </div>
        
        <div id="auth-area">
            <button onclick="openLoginModal()" class="bg-[#1e293b] text-white text-[10px] font-bold px-4 py-2 rounded-xl shadow-md uppercase tracking-widest">Đăng nhập</button>
        </div>
    </nav>

    <div class="bg-white sticky top-[65px] z-40 border-b border-slate-50">
        <div class="px-4 pt-3">
            <div class="relative">
                <input type="text" id="search-input" oninput="searchEvents()" placeholder="Tìm kiếm trong 100 sự kiện..." class="w-full bg-slate-50 border border-slate-100 rounded-xl py-2.5 px-10 text-xs font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500/10">
                <span class="absolute left-4 top-3 opacity-40 text-xs">🔍</span>
            </div>
        </div>
        <div class="flex gap-2 overflow-x-auto p-4 no-scrollbar">
            <button onclick="filter('Tất cả', this)" id="default-tab" class="tab bg-[#1e293b] text-white px-5 py-2 rounded-xl text-[11px] font-bold uppercase shrink-0 shadow-md shadow-indigo-900/10 transition-all">Tất cả</button>
            <button onclick="filter('Kinh tế', this)" class="tab bg-white text-slate-400 border border-slate-100 px-5 py-2 rounded-xl text-[11px] font-bold uppercase shrink-0 transition-all">Kinh tế</button>
            <button onclick="filter('Giải trí', this)" class="tab bg-white text-slate-400 border border-slate-100 px-5 py-2 rounded-xl text-[11px] font-bold uppercase shrink-0 transition-all">Giải trí</button>
            <button onclick="filter('Công nghệ', this)" class="tab bg-white text-slate-400 border border-slate-100 px-5 py-2 rounded-xl text-[11px] font-bold uppercase shrink-0 transition-all">Công nghệ</button>
            <button onclick="filter('Thể thao', this)" class="tab bg-white text-slate-400 border border-slate-100 px-5 py-2 rounded-xl text-[11px] font-bold uppercase shrink-0 transition-all">Thể thao</button>
        </div>
    </div>

    <div id="market-grid" class="p-4 grid grid-cols-2 gap-4">
        </div>

    <div class="fixed bottom-6 left-6 right-6 bg-white/95 backdrop-blur-xl border border-slate-100 flex justify-around py-4 rounded-[2rem] shadow-2xl z-50">
        <button onclick="goHome()" class="flex flex-col items-center gap-1.5 text-[#1e293b]">
            <span class="text-xl">🧭</span><span class="text-[8px] font-extrabold uppercase tracking-widest">Khám phá</span>
        </button>
        <button onclick="alert('Đổi Voucher: Tính năng mở khóa sau khi có đủ điểm!')" class="flex flex-col items-center gap-1.5 text-slate-300">
            <span class="text-xl">🎁</span><span class="text-[8px] font-extrabold uppercase tracking-widest">Đổi quà</span>
        </button>
        <button onclick="alert('Bảng xếp hạng đang cập nhật')" class="flex flex-col items-center gap-1.5 text-slate-300">
            <span class="text-xl">🏆</span><span class="text-[8px] font-extrabold uppercase tracking-widest">Hạng</span>
        </button>
    </div>

    <div id="login-modal" class="modal">
        <div class="bg-white w-[85%] max-w-sm rounded-[2.5rem] p-8 text-center shadow-2xl scale-100">
            <div class="w-16 h-16 bg-[#1e293b] rounded-2xl flex items-center justify-center mx-auto mb-5 shadow-lg">
                <span class="text-[#38bdf8] text-3xl font-black italic">F</span>
            </div>
            <h2 class="text-xl font-extrabold text-[#1e293b] mb-2 tracking-tight">Cộng đồng Forely</h2>
            <p class="text-slate-500 text-[11px] mb-8 leading-relaxed">Đăng nhập để nhận <span class="text-[#38bdf8] font-bold">5,000 P</span> khởi nghiệp và bắt đầu hành trình dự báo.</p>
            
            <div class="space-y-3">
                <button onclick="doLogin('Google')" class="w-full bg-white border border-slate-200 py-3.5 rounded-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-4 h-4">
                    <span class="text-xs font-bold text-slate-700">Đăng nhập với Google</span>
                </button>
                <button onclick="doLogin('Facebook')" class="w-full bg-[#1877F2] text-white py-3.5 rounded-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_2023.png" class="w-4 h-4 invert">
                    <span class="text-xs font-bold">Đăng nhập với Facebook</span>
                </button>
                <button onclick="closeLoginModal()" class="w-full py-3 text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-2">Đóng</button>
            </div>
        </div>
    </div>

    <div id="trade-modal" class="modal">
        <div class="bg-white w-[90%] max-w-sm rounded-[2.5rem] p-8 shadow-2xl scale-100 border border-slate-50">
            <p id="modal-side" class="text-[10px] font-black uppercase tracking-[0.2em] mb-2"></p>
            <h3 id="modal-title" class="text-lg font-bold text-slate-900 mb-6 leading-tight italic"></h3>
            
            <div class="bg-slate-50 p-5 rounded-3xl mb-5">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Đầu tư</span>
                    <span class="text-[10px] font-bold text-[#1e293b]">F-Point</span>
                </div>
                <input type="number" id="input-amount" value="100" class="w-full bg-transparent text-4xl font-black text-[#1e293b] focus:outline-none" oninput="calculatePrize()">
            </div>

            <div class="bg-indigo-50/50 p-4 rounded-2xl mb-8 flex items-center gap-3">
                <span class="text-xl">🎁</span>
                <div>
                    <p class="text-[9px] font-black text-indigo-400 uppercase tracking-widest mb-0.5">Quà tặng (Nếu đúng)</p>
                    <p id="prize-estimate" class="text-xs font-bold text-indigo-700 italic">Thẻ cào điện thoại 10k</p>
                </div>
            </div>

            <div class="flex gap-4">
                <button onclick="closeTradeModal()" class="flex-1 py-2 text-xs font-bold text-slate-400 uppercase tracking-widest">Hủy</button>
                <button onclick="confirmTrade()" class="flex-1 bg-[#1e293b] text-white py-4 rounded-2xl text-[11px] font-black uppercase tracking-widest shadow-xl shadow-indigo-900/20">Xác nhận</button>
            </div>
        </div>
    </div>

    <script>
        // TRẠNG THÁI HỆ THỐNG
        let isGuest = true;
        let balance = 0;
        let selectedEvent = null;

        // DỮ LIỆU: TẠO 100 SỰ KIỆN ĐA DẠNG
        const categories = ["Kinh tế", "Giải trí", "Công nghệ", "Thể thao"];
        const titles = ["VN-Index chạm 1550?", "Giá Vàng giảm mạnh?", "iPhone bỏ cổng sạc?", "Show âm nhạc mới?", "Lãi suất ngân hàng giảm?", "Hãng xe điện về VN?", "Đội tuyển vào Chung kết?", "Luật Crypto thông qua?"];

        const allEvents = Array.from({ length: 100 }, (_, i) => ({
            id: i,
            cat: categories[i % categories.length],
            title: titles[i % titles.length] + " #" + (i + 1),
            yesRate: Math.floor(Math.random() * 60 + 20),
            vol: (Math.random() * 5 + 1).toFixed(1) + "M"
        }));

        // HÀM HIỂN THỊ DỮ LIỆU
        function render(data = allEvents) {
            const grid = document.getElementById('market-grid');
            grid.innerHTML = data.map(e => `
                <div class="forecast-card bg-white p-4 rounded-[1.5rem] border border-slate-100 shadow-[0_2px_10px_rgba(0,0,0,0.02)]">
                    <div class="flex justify-between items-start mb-3">
                        <span class="text-[8px] font-bold uppercase text-slate-400 tracking-widest bg-slate-50 px-2 py-1 rounded-md">${e.cat}</span>
                        <span class="text-[8px] font-bold text-indigo-300 italic">${e.vol} P</span>
                    </div>
                    <h3 class="text-[11px] font-extrabold text-[#1e293b] line-clamp-2 mb-4 leading-snug h-8 italic">${e.title}</h3>
                    <div class="flex flex-col gap-2">
                        <button onclick="handlePredict(${e.id}, 'CÓ')" class="w-full bg-[#f0fdfa] text-[#0d9488] text-[9px] font-extrabold py-2.5 rounded-xl border border-[#ccfbf1] uppercase tracking-widest transition-colors active:bg-[#ccfbf1]">CÓ ${e.yesRate}%</button>
                        <button onclick="handlePredict(${e.id}, 'KHÔNG')" class="w-full bg-[#fff1f2] text-[#e11d48] text-[9px] font-extrabold py-2.5 rounded-xl border border-[#ffe4e6] uppercase tracking-widest transition-colors active:bg-[#ffe4e6]">KHÔNG</button>
                    </div>
                </div>
            `).join('');
        }

        // LUỒNG DỰ BÁO (GUEST VS LOGGED IN)
        function handlePredict(id, type) {
            if (isGuest) {
                openLoginModal();
            } else {
                openTradeModal(id, type);
            }
        }

        // HÀM ĐĂNG NHẬP
        function openLoginModal() { document.getElementById('login-modal').classList.add('active'); }
        function closeLoginModal() { document.getElementById('login-modal').classList.remove('active'); }
        
        function doLogin(provider) {
            isGuest = false;
            balance = 5000;
            closeLoginModal();
            // Cập nhật giao diện Header
            document.getElementById('auth-area').innerHTML = `
                <div class="flex items-center gap-2 bg-blue-50 px-3 py-1.5 rounded-2xl border border-blue-100">
                    <span class="text-xs">💎</span>
                    <span id="balance-display" class="text-xs font-black text-[#1e293b] uppercase tracking-tighter">${balance.toLocaleString()} P</span>
                </div>
            `;
            alert(`Đăng nhập ${provider} thành công! Bạn nhận được 5,000 P.`);
        }

        // HÀM XỬ LÝ GIAO DỊCH & QUÀ TẶNG
        function openTradeModal(id, type) {
            selectedEvent = { ...allEvents[id], side: type };
            document.getElementById('modal-side').innerText = `Dự báo: ${type}`;
            document.getElementById('modal-side').className = `text-[10px] font-black uppercase tracking-[0.2em] mb-2 ${type === 'CÓ' ? 'text-teal-500' : 'text-rose-500'}`;
            document.getElementById('modal-title').innerText = selectedEvent.title;
            document.getElementById('trade-modal').classList.add('active');
            calculatePrize();
        }

        function closeTradeModal() { document.getElementById('trade-modal').classList.remove('active'); }

        function calculatePrize() {
            const amt = parseInt(document.getElementById('input-amount').value) || 0;
            const prizeEl = document.getElementById('prize-estimate');
            if (amt < 500) prizeEl.innerText = "Thẻ cào 10k";
            else if (amt < 2000) prizeEl.innerText = "Grab 50k";
            else if (amt < 4000) prizeEl.innerText = "Shopee 200k";
            else prizeEl.innerText = "Vé xem phim CGV VIP";
        }

        function confirmTrade() {
            const amt = parseInt(document.getElementById('input-amount').value);
            if (isNaN(amt) || amt <= 0) { alert("Vui lòng nhập số điểm hợp lệ!"); return; }
            if (amt > balance) { alert("Không đủ F-Point! Hãy nạp thêm."); return; }
            
            balance -= amt;
            document.getElementById('balance-display').innerText = balance.toLocaleString() + " P";
            closeTradeModal();
            alert("🎯 Chốt dự báo thành công! Chúc bạn may mắn nhận quà.");
        }

        // HÀM TÌM KIẾM, LỌC & TRANG CHỦ
        function goHome() {
            document.getElementById('search-input').value = '';
            filter('Tất cả', document.getElementById('default-tab'));
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function searchEvents() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const filtered = allEvents.filter(e => e.title.toLowerCase().includes(term) || e.cat.toLowerCase().includes(term));
            render(filtered);
        }

        function filter(cat, el) {
            document.querySelectorAll('.tab').forEach(t => {
                t.className = "tab bg-white text-slate-400 border border-slate-100 px-5 py-2 rounded-xl text-[11px] font-bold uppercase shrink-0 transition-all";
            });
            el.className = "tab bg-[#1e293b] text-white px-5 py-2 rounded-xl text-[11px] font-bold uppercase shrink-0 shadow-md shadow-indigo-900/10 transition-all";
            render(cat === 'Tất cả' ? allEvents : allEvents.filter(e => e.cat === cat));
        }

        // Khởi tạo ban đầu
        render();
    </script>
</body>
</html>
