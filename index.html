<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forely - Future Insights</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal.active { display: flex; }
    </style>
</head>
<body class="pb-24">

    <nav class="bg-white p-3 sticky top-0 z-50 flex justify-between items-center border-b border-slate-200">
        <div class="flex items-center gap-2">
            <svg width="28" height="28" viewBox="0 0 100 100" fill="none">
                <circle cx="50" cy="55" r="40" stroke="#0f172a" stroke-width="8"/>
                <circle cx="75" cy="25" r="6" stroke="#0f172a" stroke-width="5"/>
                <path d="M50 25V33M50 77V85M22 55H30M70 55H78" stroke="#0f172a" stroke-width="5" stroke-linecap="round"/>
                <path d="M38 55L62 43L50 67L38 55Z" fill="#0f172a"/>
                <path d="M50 55L62 43L50 40L50 55Z" fill="#334155"/>
            </svg>
            <h1 class="text-xl font-black text-[#0f172a] italic tracking-tighter">Forely</h1>
        </div>
        <div class="bg-slate-100 px-3 py-1 rounded-full border border-slate-200 flex items-center gap-1.5">
            <span class="text-[10px]">💎</span>
            <span id="balance" class="text-[10px] font-black text-slate-700">5,000 P</span>
        </div>
    </nav>

    <div class="bg-white px-3 py-2 border-b border-slate-100 sticky top-[53px] z-40">
        <div class="flex gap-2 overflow-x-auto no-scrollbar">
            <button onclick="filter('Tất cả', this)" class="tab bg-[#0f172a] text-white px-5 py-1.5 rounded-full text-[10px] font-bold uppercase shrink-0">Tất cả</button>
            <button onclick="filter('Kinh tế', this)" class="tab bg-slate-100 text-slate-500 px-5 py-1.5 rounded-full text-[10px] font-bold uppercase shrink-0">Kinh tế</button>
            <button onclick="filter('Giải trí', this)" class="tab bg-slate-100 text-slate-500 px-5 py-1.5 rounded-full text-[10px] font-bold uppercase shrink-0">Giải trí</button>
            <button onclick="filter('Công nghệ', this)" class="tab bg-slate-100 text-slate-500 px-5 py-1.5 rounded-full text-[10px] font-bold uppercase shrink-0">Công nghệ</button>
        </div>
    </div>

    <div id="market-grid" class="p-3 grid grid-cols-2 gap-2.5"></div>

    <div id="trade-modal" class="modal">
        <div class="bg-white w-[90%] rounded-[2rem] p-6 shadow-2xl scale-95 transition-all">
            <h3 id="modal-title" class="text-sm font-bold text-slate-800 mb-4 leading-tight italic"></h3>
            
            <div class="bg-slate-50 p-4 rounded-2xl mb-6 border border-slate-100">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Bạn dự báo (P)</span>
                    <span class="text-[10px] font-bold text-teal-600">Max: 5000</span>
                </div>
                <input type="number" id="input-amount" value="100" class="w-full bg-transparent text-3xl font-black text-[#0f172a] focus:outline-none" oninput="calculatePrize()">
            </div>

            <div class="bg-indigo-50 p-4 rounded-2xl mb-8 border border-indigo-100">
                <p class="text-[9px] font-black text-indigo-400 uppercase tracking-widest mb-1">Quà tặng dự kiến (nếu đúng)</p>
                <p id="prize-estimate" class="text-lg font-black text-indigo-700 italic">🎁 Voucher Shopee 50k</p>
            </div>

            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 py-3 text-xs font-bold text-slate-400 uppercase tracking-widest">Hủy</button>
                <button onclick="confirmTrade()" class="flex-1 bg-[#0f172a] text-white py-4 rounded-2xl text-xs font-black italic shadow-lg shadow-slate-900/20">XÁC NHẬN</button>
            </div>
        </div>
    </div>

    <script>
        let balance = 5000;
        let selectedEvent = null;
        const categories = ["Kinh tế", "Giải trí", "Công nghệ", "Thể thao", "Đời sống"];
        const titles = ["VN-Index đạt 1600?", "SJC giảm còn 80tr?", "iPhone 18 không nút?", "BlackPink diễn HN?", "Xăng giảm dưới 20k?", "AI đạt trí tuệ người?"];

        // Tạo 100 dự báo
        const allEvents = Array.from({ length: 100 }, (_, i) => ({
            id: i,
            cat: categories[i % categories.length],
            title: titles[i % titles.length] + " #" + (i + 1),
            yesRate: Math.floor(Math.random() * 85 + 5),
            vol: (Math.random() * 10).toFixed(1) + "M P"
        }));

        function render(data = allEvents) {
            const grid = document.getElementById('market-grid');
            grid.innerHTML = data.map(e => `
                <div class="bg-white p-3 rounded-xl border border-slate-200 shadow-sm active:scale-95 transition-all">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[7px] font-black uppercase text-slate-400 tracking-tighter">${e.cat}</span>
                        <span class="text-[7px] text-slate-400 font-bold italic">${e.vol}</span>
                    </div>
                    <h3 class="text-[10px] font-bold text-slate-800 line-clamp-2 mb-3 leading-tight h-6.5 italic">${e.title}</h3>
                    <div class="flex gap-1.5">
                        <button onclick="openModal(${e.id}, 'CÓ')" class="flex-1 bg-slate-50 text-[#0f172a] text-[9px] font-black py-2 rounded-lg border border-slate-100 uppercase">CÓ ${e.yesRate}%</button>
                        <button onclick="openModal(${e.id}, 'KHÔNG')" class="flex-1 bg-slate-50 text-slate-400 text-[9px] font-black py-2 rounded-lg border border-slate-100 uppercase">Ko</button>
                    </div>
                </div>
            `).join('');
        }

        function openModal(id, type) {
            selectedEvent = { ...allEvents[id], side: type };
            document.getElementById('modal-title').innerText = `Dự báo "${type}" cho: ${selectedEvent.title}`;
            document.getElementById('trade-modal').classList.add('active');
            calculatePrize();
        }

        function closeModal() { document.getElementById('trade-modal').classList.remove('active'); }

        function calculatePrize() {
            const amt = parseInt(document.getElementById('input-amount').value) || 0;
            const prizeEl = document.getElementById('prize-estimate');
            if (amt < 500) prizeEl.innerText = "🎁 Thẻ cào 10k";
            else if (amt < 2000) prizeEl.innerText = "🎁 Voucher Grab 50k";
            else if (amt < 4000) prizeEl.innerText = "🎁 Voucher Shopee 200k";
            else prizeEl.innerText = "🎁 Vé xem phim VIP";
        }

        function confirmTrade() {
            const amt = parseInt(document.getElementById('input-amount').value);
            if (amt > balance) { alert("Không đủ P!"); return; }
            balance -= amt;
            document.getElementById('balance').innerText = balance.toLocaleString() + " P";
            closeModal();
            alert("✅ Chốt dự báo thành công! Chờ ngày ghi nhận kết quả.");
        }

        function filter(cat, el) {
            document.querySelectorAll('.tab').forEach(t => t.className = "tab bg-slate-100 text-slate-500 px-5 py-1.5 rounded-full text-[10px] font-bold uppercase shrink-0");
            el.className = "tab bg-[#0f172a] text-white px-5 py-1.5 rounded-full text-[10px] font-bold uppercase shrink-0";
            render(cat === 'Tất cả' ? allEvents : allEvents.filter(e => e.cat === cat));
        }

        render();
    </script>
</body>
</html>
