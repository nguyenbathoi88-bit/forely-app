<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORELY - Dự báo tương lai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-24 font-sans">

    <div id="home-page" class="page active">
        <nav class="bg-white p-4 sticky top-0 z-50 flex justify-between items-center border-b border-gray-100 shadow-sm">
            <h1 class="text-2xl font-black text-teal-600 italic tracking-tighter">FORELY</h1>
            <button onclick="showPage('portfolio-page')" class="bg-teal-50 px-4 py-1.5 rounded-full border border-teal-100 flex items-center gap-2">
                <span class="text-sm font-bold text-teal-700">1,250,000đ</span>
            </button>
        </nav>

        <div class="flex gap-6 overflow-x-auto p-4 bg-white no-scrollbar border-b border-gray-100">
            <button class="whitespace-nowrap font-bold text-teal-600 border-b-2 border-teal-600 pb-1">🔥 Hot</button>
            <button class="whitespace-nowrap font-medium text-gray-400 pb-1">📈 Kinh tế</button>
            <button class="whitespace-nowrap font-medium text-gray-400 pb-1">🎤 Giải trí</button>
        </div>

        <div class="p-4 space-y-5">
            <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-4">
                    <span class="bg-teal-100 text-teal-700 text-[10px] font-black px-2.5 py-1 rounded-lg uppercase">Kinh tế</span>
                    <span class="text-green-500 text-xs font-bold">● 12% Sôi động</span>
                </div>
                <h3 class="text-xl font-extrabold text-gray-800 mb-6 italic">Giá vàng SJC vượt mốc 95 triệu/lượng trước 30/06?</h3>
                <div class="flex gap-3">
                    <button onclick="confirmTrade('ĐỒNG Ý', '6.5k')" class="flex-1 bg-teal-600 text-white py-5 rounded-2xl flex flex-col items-center shadow-lg shadow-teal-100">
                        <span class="text-[10px] font-bold opacity-70 uppercase">Đồng ý</span>
                        <span class="text-2xl font-black">6.5k</span>
                    </button>
                    <button onclick="confirmTrade('PHẢN ĐỐI', '3.5k')" class="flex-1 bg-white border-2 border-red-500 text-red-500 py-5 rounded-2xl flex flex-col items-center">
                        <span class="text-[10px] font-bold opacity-70 uppercase">Phản đối</span>
                        <span class="text-2xl font-black">3.5k</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="portfolio-page" class="page">
        <nav class="bg-white p-4 sticky top-0 z-50 flex items-center border-b border-gray-100">
            <button onclick="showPage('home-page')" class="mr-4 text-2xl text-gray-400">←</button>
            <h1 class="text-xl font-bold text-gray-800 text-center flex-1">Ví của tôi</h1>
        </nav>

        <div class="p-6 bg-teal-600 text-white m-4 rounded-[2rem] shadow-xl shadow-teal-100">
            <p class="text-teal-100 text-sm opacity-80 mb-1 font-medium italic">Tổng tài sản</p>
            <h2 class="text-3xl font-black mb-6 tracking-tight">1,250,000 đ</h2>
            <div class="flex gap-4">
                <button onclick="alert('Tính năng Nạp tiền QR đang được kết nối với ngân hàng!')()" class="flex-1 bg-white text-teal-600 font-bold py-3 rounded-xl shadow-sm">Nạp tiền</button>
                <button class="flex-1 bg-teal-500 text-white border border-teal-400 font-bold py-3 rounded-xl">Rút tiền</button>
            </div>
        </div>

        <div class="px-6 py-4">
            <h3 class="font-black text-gray-800 text-lg mb-4 italic tracking-tight">Dự báo đang mở</h3>
            <div class="bg-white p-4 rounded-2xl border border-gray-100 italic text-gray-400 text-center py-10">
                Bạn chưa có dự báo nào. <br> Hãy bắt đầu tiên tri ngay!
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 w-full bg-white/80 backdrop-blur-md border-t border-gray-100 flex justify-around py-5 rounded-t-[2.5rem] shadow-[0_-10px_20px_rgba(0,0,0,0.02)] text-2xl">
        <button onclick="showPage('home-page')" class="text-teal-600">🏠</button>
        <button onclick="showPage('portfolio-page')" class="text-gray-300">📊</button>
        <button class="text-gray-300">👤</button>
    </div>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0,0);
        }
        function confirmTrade(type, price) {
            alert("Xác nhận dự báo: " + type + " với giá " + price + " VNĐ. (Hệ thống đang kết nối Smart Contract)");
        }
    </script>
</body>
</html>
