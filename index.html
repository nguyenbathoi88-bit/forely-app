<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forely - Community Insights</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* Smooth Page Transitions */
        .page-section { display: none; animation: slideUp 0.3s ease-out; }
        .page-active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Modal Blur */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal.active { display: flex; }

        .brand-gradient { background: linear-gradient(135deg, #2563eb 0%, #0d9488 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #2dd4bf; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .btn-predict:active { transform: scale(0.96); transition: 0.1s; }
    </style>
</head>
<body class="pb-24">

    <nav class="bg-white/95 backdrop-blur-md px-4 py-3 sticky top-0 z-[100] flex justify-between items-center border-b border-slate-100 shadow-sm">
        <div onclick="switchPage('home')" class="flex items-center gap-2 cursor-pointer">
            <svg width="32" height="32" viewBox="0 0 120 120">
                <defs><linearGradient id="forelyG" x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stop-color="#2563eb" /><stop offset="100%" stop-color="#2dd4bf" /></linearGradient></defs>
                <circle cx="60" cy="60" r="48" stroke="url(#forelyG)" stroke-width="10" fill="none"/>
                <path d="M40 80 L85 35 L65 90 L55 65 Z" fill="url(#forelyG)"/><path d="M40 80 L85 35 L30 60 L55 65 Z" fill="#1e293b"/>
            </svg>
            <span class="text-2xl font-black brand-gradient tracking-tighter">Forely</span>
        </div>
        <div id="auth-area">
            <button onclick="openModal('login-modal')" class="bg-blue-600 text-white text-xs font-bold px-4 py-2 rounded-full shadow-md" data-i18n="login_btn">Đăng nhập</button>
        </div>
    </nav>

    <div id="page-home" class="page-section page-active">
        <div class="bg-white sticky top-[58px] z-40 border-b border-slate-100">
            <div class="px-4 pt-3 pb-2">
                <div class="relative">
                    <input type="text" id="search-input" oninput="renderGrid()" placeholder="Tìm nhận định..." class="w-full bg-slate-50 border border-slate-200 rounded-xl py-2.5 pl-10 pr-4 text-sm focus:ring-2 focus:ring-blue-500/20 outline-none" data-i18n-placeholder="search_placeholder">
                    <span class="absolute left-3.5 top-3 text-slate-400">🔍</span>
                </div>
                <div class="flex gap-2 mt-3 bg-slate-100 p-1 rounded-lg">
                    <button onclick="setViewStatus('active')" id="tab-active" class="flex-1 py-1.5 text-xs font-bold rounded-md bg-white text-blue-600 shadow-sm transition-all" data-i18n="tab_active">🟢 Đang mở</button>
                    <button onclick="setViewStatus('ended')" id="tab-ended" class="flex-1 py-1.5 text-xs font-bold rounded-md text-slate-500 transition-all" data-i18n="tab_ended">⏳ Lịch sử</button>
                </div>
            </div>
            
            <div class="flex gap-2 overflow-x-auto px-4 pb-3 no-scrollbar">
                <button onclick="setCat('Tất cả', this)" class="cat-tab bg-slate-900 text-white px-4 py-1.5 rounded-full text-[11px] font-bold shrink-0 transition-all" data-i18n="cat_all">Tất cả</button>
                <button onclick="setCat('Kinh tế vĩ mô', this)" class="cat-tab bg-white border border-slate-200 text-slate-600 px-4 py-1.5 rounded-full text-[11px] font-bold shrink-0" data-i18n="cat_eco">Kinh tế vĩ mô</button>
                <button onclick="setCat('Chính sách', this)" class="cat-tab bg-white border border-slate-200 text-slate-600 px-4 py-1.5 rounded-full text-[11px] font-bold shrink-0" data-i18n="cat_policy">Chính sách</button>
                <button onclick="setCat('Giải trí - Xã hội', this)" class="cat-tab bg-white border border-slate-200 text-slate-600 px-4 py-1.5 rounded-full text-[11px] font-bold shrink-0" data-i18n="cat_ent">Giải trí - Xã hội</button>
                <button onclick="setCat('Hạ tầng - BĐS', this)" class="cat-tab bg-white border border-slate-200 text-slate-600 px-4 py-1.5 rounded-full text-[11px] font-bold shrink-0" data-i18n="cat_infra">Hạ tầng - BĐS</button>
                <button onclick="setCat('Công nghệ', this)" class="cat-tab bg-white border border-slate-200 text-slate-600 px-4 py-1.5 rounded-full text-[11px] font-bold shrink-0" data-i18n="cat_tech">Công nghệ</button>
                <button onclick="setCat('Thể thao', this)" class="cat-tab bg-white border border-slate-200 text-slate-600 px-4 py-1.5 rounded-full text-[11px] font-bold shrink-0" data-i18n="cat_sport">Thể thao</button>
            </div>
        </div>

        <div id="loader" class="py-20 text-center"><div class="loader"></div></div>
        
        <div id="market-grid" class="p-4 grid grid-cols-2 gap-3.5 md:grid-cols-3 lg:grid-cols-4 hidden"></div>
    </div>

    <div id="page-news" class="page-section bg-slate-50 min-h-screen">
        <div class="p-4 bg-white border-b border-slate-100 flex justify-between items-center sticky top-[58px] z-30">
            <h2 class="text-lg font-bold" data-i18n="news_title">Tin tức thị trường</h2>
            <span class="text-[10px] bg-blue-50 text-blue-600 px-2 py-1 rounded font-bold uppercase">Live RSS</span>
        </div>
        <div id="news-container" class="p-4 flex flex-col gap-4"></div>
    </div>

    <div id="page-deposit" class="page-section bg-slate-50 min-h-screen p-4">
        <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 mb-6 text-center">
            <h3 class="font-bold text-slate-800 mb-4" data-i18n="deposit_qr_title">Nạp P qua VietQR</h3>
            <div class="bg-slate-50 p-4 rounded-2xl border-2 border-dashed border-slate-200 inline-block mb-4">
                <img id="qr-img" src="https://via.placeholder.com/200?text=Select+Package" class="w-48 h-48 object-contain">
            </div>
            <div class="w-full bg-blue-50 p-3 rounded-xl border border-blue-100 text-left">
                <p class="text-[10px] font-bold text-blue-400 uppercase mb-1" data-i18n="qr_content">Nội dung chuyển khoản</p>
                <div class="flex justify-between items-center">
                    <span id="qr-text" class="text-sm font-black text-blue-700">FORELY USER</span>
                    <button onclick="navigator.clipboard.writeText(document.getElementById('qr-text').innerText); alert('Copied!')">📋</button>
                </div>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
            <button onclick="genQR(50000)" class="bg-white p-4 rounded-2xl border font-bold hover:border-blue-500 transition-all shadow-sm">50,000 P</button>
            <button onclick="genQR(100000)" class="bg-white p-4 rounded-2xl border font-bold hover:border-blue-500 transition-all shadow-sm">100,000 P</button>
            <button onclick="genQR(200000)" class="bg-white p-4 rounded-2xl border font-bold hover:border-blue-500 transition-all shadow-sm">200,000 P</button>
            <button onclick="genQR(500000)" class="bg-blue-600 text-white p-4 rounded-2xl border-none font-bold shadow-lg">500,000 P</button>
        </div>
    </div>

    <div id="page-rewards" class="page-section bg-slate-50 min-h-screen p-4">
        <div class="grid grid-cols-2 gap-4" id="reward-list"></div>
    </div>

    <div id="page-profile" class="page-section bg-slate-50 min-h-screen">
        <div class="bg-white p-8 rounded-b-[40px] shadow-sm border-b text-center mb-6">
            <div class="relative inline-block">
                <img id="u-avatar" src="" class="w-20 h-20 rounded-full border-4 border-teal-500 mx-auto shadow-lg">
                <span class="absolute bottom-0 right-0 w-5 h-5 bg-green-500 border-2 border-white rounded-full"></span>
            </div>
            <h2 id="u-name" class="mt-4 text-xl font-black text-slate-900">User</h2>
            <p id="u-email" class="text-xs text-slate-400">email@example.com</p>
            
            <div class="flex gap-3 mt-6">
                <div class="flex-1 bg-slate-50 p-4 rounded-2xl border">
                    <p class="text-[9px] font-bold text-slate-400 uppercase mb-1" data-i18n="p_balance">Số dư</p>
                    <p class="text-lg font-black"><span class="u-balance">0</span> P</p>
                </div>
                <div class="flex-1 bg-teal-50 p-4 rounded-2xl border border-teal-100">
                    <p class="text-[9px] font-bold text-teal-400 uppercase mb-1" data-i18n="p_winrate">Tỷ lệ thắng</p>
                    <p class="text-lg font-black text-teal-600">72%</p>
                </div>
            </div>
        </div>
        <div class="px-4 space-y-4">
            <div class="bg-white p-5 rounded-3xl shadow-sm border">
                <h4 class="text-[10px] font-black text-slate-300 uppercase mb-4" data-i18n="p_analytics">Hiệu suất nhận định</h4>
                <canvas id="winChart" height="180"></canvas>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border flex justify-between items-center">
                <div class="flex items-center gap-3"><span>🌐</span><span class="text-sm font-bold" data-i18n="p_lang">Ngôn ngữ</span></div>
                <select id="lang-select" onchange="switchLang(this.value)" class="text-xs font-bold bg-slate-100 px-3 py-1.5 rounded-lg outline-none">
                    <option value="vi">Tiếng Việt</option>
                    <option value="en">English</option>
                </select>
            </div>
            <button onclick="auth.signOut()" class="w-full py-4 text-red-500 font-bold text-sm bg-white rounded-2xl border border-red-50 shadow-sm mb-10" data-i18n="logout">Đăng xuất</button>
        </div>
    </div>

    <div id="login-modal" class="modal">
        <div class="bg-white w-[85%] max-w-sm rounded-[32px] p-10 text-center shadow-2xl">
            <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6 text-2xl">⚡</div>
            <h2 class="text-2xl font-black text-slate-900 mb-2">Forely Login</h2>
            <p class="text-sm text-slate-500 mb-8" data-i18n="modal_login_desc">Đăng nhập để bắt đầu tham gia cộng đồng nhận định.</p>
            <button onclick="loginGoogle()" class="w-full bg-white border border-slate-200 py-4 rounded-2xl flex items-center justify-center gap-3 hover:bg-slate-50 active:scale-95 transition-all shadow-sm mb-4">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-5 h-5">
                <span class="text-sm font-bold text-gray-700">Continue with Google</span>
            </button>
            <button onclick="closeModal('login-modal')" class="text-xs font-bold text-slate-400" data-i18n="cancel">Hủy bỏ</button>
        </div>
    </div>

    <div id="trade-modal" class="modal">
        <div class="bg-white w-[90%] max-w-sm rounded-[32px] shadow-2xl overflow-hidden">
            <div class="p-8">
                <div id="trade-side-badge" class="inline-block px-3 py-1 rounded-full text-[10px] font-black uppercase mb-4">CÓ</div>
                <h3 id="trade-event-title" class="text-lg font-bold text-slate-900 mb-6 leading-tight h-14 overflow-hidden"></h3>
                <div class="flex justify-between items-center mb-2">
                    <span class="text-xs font-bold text-slate-400 uppercase" data-i18n="modal_trade_amt">Sử dụng P</span>
                    <span class="text-[10px] font-bold text-slate-400">Balance: <span class="u-balance">0</span> P</span>
                </div>
                <input type="number" id="trade-input" value="1000" class="w-full bg-slate-50 border-none rounded-2xl py-4 px-6 text-2xl font-black text-slate-900 mb-6 focus:ring-2 focus:ring-blue-500/20">
                <button onclick="confirmTrade()" id="trade-confirm-btn" class="w-full py-4 rounded-2xl text-sm font-black text-white shadow-lg transition-all active:scale-95" data-i18n="modal_trade_confirm">Xác nhận</button>
                <button onclick="closeModal('trade-modal')" class="w-full mt-4 text-xs font-bold text-slate-400" data-i18n="cancel">Đóng</button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-lg border-t border-slate-100 flex justify-around py-3 z-[100]">
        <button onclick="switchPage('home')" id="nav-home" class="flex flex-col items-center gap-1 w-1/5 text-blue-600">
            <span class="text-xl">🧭</span><span class="text-[9px] font-black uppercase" data-i18n="nav_markets">Thị trường</span>
        </button>
        <button onclick="switchPage('news')" id="nav-news" class="flex flex-col items-center gap-1 w-1/5 text-slate-300">
            <span class="text-xl">📰</span><span class="text-[9px] font-black uppercase" data-i18n="nav_news">Tin tức</span>
        </button>
        <button onclick="switchPage('deposit')" id="nav-deposit" class="flex flex-col items-center gap-1 w-1/5 text-slate-300">
            <span class="text-xl">💳</span><span class="text-[9px] font-black uppercase" data-i18n="nav_deposit">Nạp P</span>
        </button>
        <button onclick="switchPage('rewards')" id="nav-rewards" class="flex flex-col items-center gap-1 w-1/5 text-slate-300">
            <span class="text-xl">🎁</span><span class="text-[9px] font-black uppercase" data-i18n="nav_rewards">Đổi quà</span>
        </button>
        <button onclick="switchPage('profile')" id="nav-profile" class="flex flex-col items-center gap-1 w-1/5 text-slate-300">
            <span class="text-xl">👤</span><span class="text-[9px] font-black uppercase" data-i18n="nav_account">Tôi</span>
        </button>
    </div>

    <script>
        // --- 1. SETTINGS & CONFIG ---
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vREHXHIoKFy_Vhds8sFY8pJzrvcLZItNS2O0hQTy8Z-JJ9TiwFvCYmQgWVyhLVpcyY1IheROL0ljntf/pub?gid=0&single=true&output=csv";
        
        // 🔥 FIREBASE: DÁN CONFIG CỦA BẠN VÀO ĐÂY
        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "forely-app.firebaseapp.com",
            projectId: "forely-app",
            storageBucket: "forely-app.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // --- 2. MULTI-LANG DATA ---
        const i18n = {
            vi: {
                login_btn: "Đăng nhập", search_placeholder: "Tìm nhận định...", tab_active: "🟢 Đang mở", tab_ended: "⏳ Lịch sử",
                cat_all: "Tất cả", cat_eco: "Kinh tế vĩ mô", cat_policy: "Chính sách", cat_ent: "Giải trí - Xã hội", cat_infra: "Hạ tầng - BĐS", cat_tech: "Công nghệ", cat_sport: "Thể thao",
                news_title: "Tin tức thị trường", deposit_qr_title: "Nạp P qua VietQR", qr_content: "Nội dung chuyển khoản",
                p_balance: "Số dư", p_winrate: "Tỷ lệ thắng", p_analytics: "Hiệu suất cá nhân", p_lang: "Ngôn ngữ", logout: "Đăng xuất",
                modal_login_desc: "Đăng nhập để tham gia nhận định và tích lũy phần thưởng.", modal_trade_amt: "Sử dụng P", modal_trade_confirm: "Xác nhận nhận định", cancel: "Hủy bỏ",
                nav_markets: "Khảo sát", nav_news: "Tin tức", nav_deposit: "Nạp P", nav_rewards: "Đổi quà", nav_account: "Cá nhân"
            },
            en: {
                login_btn: "Log In", search_placeholder: "Search prediction...", tab_active: "🟢 Active", tab_ended: "⏳ History",
                cat_all: "All", cat_eco: "Economy", cat_policy: "Policy", cat_ent: "Showbiz", cat_infra: "Infrastructure", cat_tech: "Tech", cat_sport: "Sports",
                news_title: "Market News", deposit_qr_title: "Deposit via VietQR", qr_content: "Transfer Note",
                p_balance: "Balance", p_winrate: "Win Rate", p_analytics: "My Analytics", p_lang: "Language", logout: "Log Out",
                modal_login_desc: "Sign in to predict and earn rewards from community.", modal_trade_amt: "Use Points", modal_trade_confirm: "Confirm", cancel: "Cancel",
                nav_markets: "Markets", nav_news: "News", nav_deposit: "Deposit", nav_rewards: "Redeem", nav_account: "Profile"
            }
        };

        // --- 3. STATE ---
        let user = null; let balance = 5000; let allEvents = []; let viewStatus = 'active'; let viewCat = 'Tất cả'; let selectedEvent = null;

        // --- 4. AUTH LOGIC ---
        function loginGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(() => closeModal('login-modal')).catch(e => alert("Error: " + e.message));
        }

        auth.onAuthStateChanged(u => {
            if(u) {
                user = u;
                document.getElementById('auth-area').innerHTML = `
                    <div class="flex items-center gap-2">
                        <div class="bg-slate-100 px-3 py-1.5 rounded-full flex items-center gap-1.5 border">
                            <span class="text-xs">💎</span><span class="text-xs font-black u-balance">${balance.toLocaleString()}</span>
                        </div>
                        <img src="${u.photoURL}" onclick="switchPage('profile')" class="w-8 h-8 rounded-full border-2 border-teal-500 cursor-pointer shadow-sm">
                    </div>`;
                document.getElementById('u-name').innerText = u.displayName;
                document.getElementById('u-email').innerText = u.email;
                document.getElementById('u-avatar').src = u.photoURL;
                document.getElementById('qr-text').innerText = "FORELY " + u.displayName.split(' ').pop().toUpperCase();
            } else {
                user = null;
                document.getElementById('auth-area').innerHTML = `<button onclick="openModal('login-modal')" class="bg-blue-600 text-white text-[11px] font-black px-4 py-2 rounded-full" data-i18n="login_btn">Đăng nhập</button>`;
                if(document.getElementById('page-profile').classList.contains('page-active')) switchPage('home');
            }
            updateUIBalance();
        });

        // --- 5. PAGE NAVIGATION ---
        function switchPage(p) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('page-active'));
            document.getElementById('page-'+p).classList.add('page-active');
            window.scrollTo(0,0);
            
            ['home', 'news', 'deposit', 'rewards', 'profile'].forEach(id => {
                const btn = document.getElementById('nav-'+id);
                if(id === p) { btn.classList.add('text-blue-600'); btn.classList.remove('text-slate-300'); }
                else { btn.classList.remove('text-blue-600'); btn.classList.add('text-slate-300'); }
            });
            
            if(p === 'news') fetchNews();
            if(p === 'rewards') renderRewards();
            if(p === 'profile' && user) initProfileChart();
        }

        function switchLang(lang) {
            document.querySelectorAll('[data-i18n]').forEach(el => el.innerText = i18n[lang][el.getAttribute('data-i18n')]);
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => el.placeholder = i18n[lang][el.getAttribute('data-i18n-placeholder')]);
            localStorage.setItem('lang', lang);
        }

        // --- 6. CORE LOGIC (SHEETS & GRID) ---
        function fetchEvents() {
            Papa.parse(SHEET_URL, { download: true, header: true, complete: res => {
                const now = new Date().getTime();
                allEvents = res.data.filter(r => r.Title).map((r, i) => ({
                    id: i, cat: r.Category, title: r.Title, yesRate: parseInt(r.YesRate)||50, deadline: r.Deadline,
                    isActive: !(r.Status==='Ended' || (r.Deadline && new Date(r.Deadline).getTime() < now)),
                    result: r.Result ? r.Result.trim().toLowerCase() : ""
                }));
                document.getElementById('loader').style.display = 'none';
                document.getElementById('market-grid').classList.remove('hidden');
                renderGrid();
            }});
        }

        function renderGrid() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const grid = document.getElementById('market-grid');
            const filtered = allEvents.filter(e => 
                (viewStatus==='active' ? e.isActive : !e.isActive) && 
                (viewCat==='Tất cả' || e.cat===viewCat) && 
                e.title.toLowerCase().includes(term)
            );
            
            grid.innerHTML = filtered.map(e => {
                const noRate = 100 - e.yesRate;
                let yC = "bg-blue-50 text-blue-600"; let nC = "bg-red-50 text-red-600"; let yI = ""; let nI = "";
                if(!e.isActive) {
                    yC = nC = "bg-slate-100 text-slate-400";
                    if(e.result==='có' || e.result==='yes') { yC = "bg-teal-50 text-teal-700 border border-teal-200"; yI = "🏆 "; }
                    else if(e.result==='không' || e.result==='no') { nC = "bg-teal-50 text-teal-700 border border-teal-200"; nI = "🏆 "; }
                }
                const clickY = e.isActive ? `onclick="openTrade(${e.id}, 'có')"` : "";
                const clickN = e.isActive ? `onclick="openTrade(${e.id}, 'không')"` : "";

                return `
                <div class="bg-white p-3.5 rounded-2xl border border-slate-100 shadow-sm flex flex-col justify-between h-44 hover:shadow-md transition-shadow">
                    <div>
                        <div class="flex justify-between items-center mb-2 text-[9px] font-black uppercase">
                            <span class="text-slate-300 truncate w-16">${e.cat}</span>
                            <span class="${e.isActive?'text-blue-500':'text-orange-500'}">${e.isActive?'⏳':'🔒'} ${e.deadline||'2026'}</span>
                        </div>
                        <h3 class="text-[11px] font-bold text-slate-800 line-clamp-3 leading-snug h-10">${e.title}</h3>
                    </div>
                    <div class="flex gap-2">
                        <button ${clickY} class="flex-1 py-2 rounded-xl text-[10px] font-black btn-predict ${yC}">${yI}CÓ ${e.yesRate}%</button>
                        <button ${clickN} class="flex-1 py-2 rounded-xl text-[10px] font-black btn-predict ${nC}">${nI}KHÔNG</button>
                    </div>
                </div>`;
            }).join('');
        }

        // --- 7. NEWS, DEPOSIT, REWARDS ---
        function fetchNews() {
            fetch('https://api.rss2json.com/v1/api.json?rss_url=https://vnexpress.net/rss/kinh-doanh.rss')
            .then(r => r.json()).then(d => {
                document.getElementById('news-container').innerHTML = d.items.slice(0,10).map(i => {
                    let img = i.description.match(/src\s*=\s*"(.+?)"/);
                    return `<a href="${i.link}" target="_blank" class="flex gap-4 bg-white p-3 rounded-2xl border border-slate-100 shadow-sm">
                        ${img ? `<img src="${img[1]}" class="w-20 h-16 object-cover rounded-xl shrink-0">` : ''}
                        <div class="flex flex-col justify-between py-0.5"><h4 class="text-xs font-bold text-slate-800 line-clamp-2 leading-tight">${i.title}</h4><span class="text-[9px] font-black text-blue-500 uppercase">VnExpress</span></div>
                    </a>`;
                }).join('');
            });
        }

        function genQR(amt) {
            if(!user) { openModal('login-modal'); return; }
            const note = document.getElementById('qr-text').innerText;
            document.getElementById('qr-img').src = `https://img.vietqr.io/image/MB-123456789-compact2.png?amount=${amt}&addInfo=${encodeURIComponent(note)}`;
        }

        function renderRewards() {
            const gifts = [{n: "Thẻ cào 20k", p: 20000, i: "📱"}, {n: "Voucher Grab 50k", p: 50000, i: "🍔"}, {n: "Shopee 100k", p: 100000, i: "🛍️"}, {n: "Netflix 1 Th", p: 250000, i: "🎬"}];
            document.getElementById('reward-list').innerHTML = gifts.map(g => `
                <div class="bg-white p-5 rounded-3xl border border-slate-100 text-center shadow-sm">
                    <div class="text-3xl mb-2">${g.i}</div>
                    <div class="text-[11px] font-bold text-slate-800">${g.n}</div>
                    <div class="text-xs font-black text-blue-600 my-3">${g.p.toLocaleString()} P</div>
                    <button onclick="redeem(${g.p})" class="w-full py-2 bg-slate-900 text-white rounded-xl text-[10px] font-bold">ĐỔI QUÀ</button>
                </div>`).join('');
        }

        function redeem(p) { if(balance < p) alert("Insufficient points!"); else { balance -= p; updateUIBalance(); alert("Request sent!"); } }

        // --- 8. HELPERS & MODALS ---
        function setViewStatus(s) { viewStatus = s; document.getElementById('tab-active').className = "flex-1 py-1.5 text-xs font-bold rounded-md " + (s==='active'?'bg-white shadow-sm text-blue-600':'text-slate-500'); document.getElementById('tab-ended').className = "flex-1 py-1.5 text-xs font-bold rounded-md " + (s==='ended'?'bg-white shadow-sm text-blue-600':'text-slate-500'); renderGrid(); }
        function setCat(c, el) { viewCat = c; document.querySelectorAll('.cat-tab').forEach(t => t.className = "cat-tab bg-white border border-slate-200 text-slate-600 px-4 py-1.5 rounded-full text-[11px] font-bold shrink-0"); el.className = "cat-tab bg-slate-900 text-white px-4 py-1.5 rounded-full text-[11px] font-bold shrink-0 shadow-md"; renderGrid(); }
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        function openTrade(id, side) {
            if(!user) { openModal('login-modal'); return; }
            selectedEvent = allEvents.find(e => e.id === id);
            document.getElementById('trade-event-title').innerText = selectedEvent.title;
            const badge = document.getElementById('trade-side-badge');
            const btn = document.getElementById('trade-confirm-btn');
            if(side === 'có') { badge.innerText = "BÌNH CHỌN: CÓ"; badge.className = "inline-block px-3 py-1 rounded-full text-[10px] font-black bg-blue-50 text-blue-600 mb-4"; btn.className = "w-full py-4 rounded-2xl text-sm font-black text-white shadow-lg bg-blue-600 shadow-blue-100"; }
            else { badge.innerText = "BÌNH CHỌN: KHÔNG"; badge.className = "inline-block px-3 py-1 rounded-full text-[10px] font-black bg-red-50 text-red-600 mb-4"; btn.className = "w-full py-4 rounded-2xl text-sm font-black text-white shadow-lg bg-red-600 shadow-red-100"; }
            openModal('trade-modal');
        }

        function confirmTrade() {
            const amt = parseInt(document.getElementById('trade-input').value);
            if(amt > balance) alert("Not enough P!");
            else { balance -= amt; updateUIBalance(); closeModal('trade-modal'); alert("Successful!"); }
        }

        function updateUIBalance() { document.querySelectorAll('.u-balance').forEach(el => el.innerText = balance.toLocaleString()); }

        function initProfileChart() {
            const ctx = document.getElementById('winChart').getContext('2d');
            if(window.forelyChart) window.forelyChart.destroy();
            window.forelyChart = new Chart(ctx, {
                type: 'line',
                data: { labels: ['W1', 'W2', 'W3', 'W4'], datasets: [{ data: [10, 25, 15, 30], borderColor: '#0d9488', tension: 0.4, fill: true, backgroundColor: 'rgba(13, 148, 136, 0.05)', pointRadius: 0 }] },
                options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { font: { size: 8, weight: 'bold' } } } } }
            });
        }

        window.onload = () => {
            fetchEvents();
            switchLang(localStorage.getItem('lang') || 'vi');
        };
    </script>
</body>
</html>
