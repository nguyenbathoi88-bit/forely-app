<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forely - Insight & News Engine</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        :root { --brand-blue: #2563eb; --brand-mint: #2dd4bf; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        
        .brand-gradient { background: linear-gradient(135deg, var(--brand-blue) 0%, var(--brand-mint) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Chuyển trang */
        .page-section { display: none; opacity: 0; transform: translateY(10px); transition: all 0.3s ease; }
        .page-active { display: block; opacity: 1; transform: translateY(0); }

        /* Side Menu */
        #side-menu { position: fixed; inset: 0; z-index: 2000; visibility: hidden; }
        #side-menu.active { visibility: visible; }
        #menu-content { position: absolute; right: 0; top: 0; height: 100%; width: 280px; background: white; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        #side-menu.active #menu-content { transform: translateX(0); }
        #menu-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.3s; backdrop-filter: blur(4px); }
        #side-menu.active #menu-overlay { opacity: 1; }

        /* News Column Styling */
        .news-column { height: fit-content; }
        .news-card { transition: all 0.2s; }
        .news-card:active { transform: scale(0.98); background: #f1f5f9; }

        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--brand-blue); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); z-index: 1500; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal.active { display: flex; }
    </style>
</head>
<body class="pb-24">

    <nav class="bg-white/90 backdrop-blur-md px-4 py-3 sticky top-0 z-[100] flex justify-between items-center border-b border-slate-100 shadow-sm">
        <div onclick="switchPage('home')" class="flex items-center gap-2 cursor-pointer">
            <svg width="30" height="30" viewBox="0 0 120 120">
                <defs><linearGradient id="g" x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stop-color="#2563eb" /><stop offset="100%" stop-color="#2dd4bf" /></linearGradient></defs>
                <circle cx="60" cy="60" r="48" stroke="url(#g)" stroke-width="10" fill="none"/>
                <path d="M40 80 L85 35 L65 90 L55 65 Z" fill="url(#g)"/><path d="M40 80 L85 35 L30 60 L55 65 Z" fill="#1e293b"/>
            </svg>
            <span class="text-2xl font-black brand-gradient tracking-tighter">Forely</span>
        </div>
        <div class="flex items-center gap-2">
            <div id="auth-area">
                <button onclick="openModal('login-modal')" class="bg-blue-600 text-white text-[11px] font-bold px-4 py-1.5 rounded-full" data-i18n="login_btn">Log In</button>
            </div>
            <button onclick="toggleMenu()" class="p-2.5 bg-slate-50 rounded-xl text-slate-500 border border-slate-100"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
        </div>
    </nav>

    <div id="side-menu">
        <div id="menu-overlay" onclick="toggleMenu()"></div>
        <div id="menu-content" class="flex flex-col">
            <div class="p-6 border-b bg-slate-50 flex justify-between items-center">
                <h3 class="font-bold text-slate-800" data-i18n="menu_settings">Cài đặt</h3>
                <button onclick="toggleMenu()" class="text-2xl text-slate-400">×</button>
            </div>
            <div class="p-6 flex-1 overflow-y-auto space-y-8">
                <div>
                    <label class="text-[10px] font-black text-slate-300 tracking-widest block mb-4">NGÔN NGỮ</label>
                    <div class="grid grid-cols-2 gap-2 bg-slate-100 p-1 rounded-xl">
                        <button onclick="switchLang('vi')" id="l-vi" class="py-2 text-xs font-bold rounded-lg transition-all">Tiếng Việt</button>
                        <button onclick="switchLang('en')" id="l-en" class="py-2 text-xs font-bold rounded-lg transition-all">English</button>
                    </div>
                </div>
                <div class="space-y-4">
                    <a href="#" class="block text-sm font-bold text-slate-600">Điều khoản sử dụng</a>
                    <a href="#" class="block text-sm font-bold text-slate-600">Liên hệ hỗ trợ</a>
                </div>
            </div>
        </div>
    </div>

    <div id="page-home" class="page-section page-active">
        <div class="bg-white sticky top-[54px] z-40 border-b border-slate-100">
            <div class="px-4 pt-3 pb-2">
                <input type="text" id="search-input" oninput="renderGrid()" placeholder="Tìm nhận định..." class="w-full bg-slate-50 border border-slate-200 rounded-xl py-2.5 pl-4 text-sm focus:ring-2 focus:ring-blue-500/20 outline-none">
                <div class="flex gap-2 mt-3 bg-slate-100 p-1 rounded-lg text-xs font-bold">
                    <button onclick="setViewStatus('active')" id="tab-active" class="flex-1 py-1.5 rounded-md bg-white text-blue-600 shadow-sm">🟢 Đang mở</button>
                    <button onclick="setViewStatus('ended')" id="tab-ended" class="flex-1 py-1.5 rounded-md text-slate-500">⏳ Lịch sử</button>
                </div>
            </div>
            <div class="flex gap-2 overflow-x-auto px-4 pb-3 no-scrollbar text-[11px] font-bold">
                <button onclick="setCat('Tất cả', this)" class="cat-tab bg-slate-900 text-white px-4 py-1.5 rounded-full shrink-0">Tất cả</button>
                <button onclick="setCat('Kinh tế vĩ mô', this)" class="cat-tab bg-white border border-slate-200 text-slate-600 px-4 py-1.5 rounded-full shrink-0">Kinh tế</button>
                <button onclick="setCat('Chính sách', this)" class="cat-tab bg-white border border-slate-200 text-slate-600 px-4 py-1.5 rounded-full shrink-0">Chính sách</button>
                <button onclick="setCat('Giải trí - Xã hội', this)" class="cat-tab bg-white border border-slate-200 text-slate-600 px-4 py-1.5 rounded-full shrink-0">Giải trí</button>
                <button onclick="setCat('Hạ tầng - BĐS', this)" class="cat-tab bg-white border border-slate-200 text-slate-600 px-4 py-1.5 rounded-full shrink-0">Hạ tầng</button>
                <button onclick="setCat('Công nghệ', this)" class="cat-tab bg-white border border-slate-200 text-slate-600 px-4 py-1.5 rounded-full shrink-0">Công nghệ</button>
            </div>
        </div>
        <div id="loader" class="py-20 text-center"><div class="loader"></div></div>
        <div id="market-grid" class="p-4 grid grid-cols-2 gap-3.5 md:grid-cols-3 lg:grid-cols-4 hidden"></div>
    </div>

    <div id="page-detail" class="page-section bg-white min-h-screen">
        <div class="px-4 py-3 flex items-center border-b sticky top-0 bg-white z-50">
            <button onclick="switchPage('home')" class="text-slate-400 p-2">❮</button>
            <h2 class="font-bold text-sm ml-2">Phân tích chuyên sâu</h2>
        </div>
        <div class="p-5" id="detail-content">
            <h1 id="dt-title" class="text-2xl font-black mb-6 leading-tight"></h1>
            <div class="bg-slate-50 p-6 rounded-[32px] border mb-8">
                <canvas id="detailChart" height="150"></canvas>
            </div>
            <p id="dt-desc" class="text-sm text-slate-500 leading-relaxed"></p>
        </div>
    </div>

    <div id="page-news" class="page-section bg-slate-50 min-h-screen">
        <div class="sticky top-[54px] z-50 bg-white border-b border-slate-100">
            <div class="p-4 flex justify-between items-center pb-2">
                <h2 class="text-xl font-black" data-i18n="news_title">Tin tức nóng hổi</h2>
                <div class="flex gap-1">
                    <span class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-bounce"></span>
                    <span class="w-1.5 h-1.5 bg-blue-400 rounded-full animate-bounce delay-75"></span>
                    <span class="w-1.5 h-1.5 bg-blue-300 rounded-full animate-bounce delay-150"></span>
                </div>
            </div>
            <div class="flex gap-2 overflow-x-auto px-4 pb-4 no-scrollbar">
                <button onclick="changeNewsCat('kinh-doanh', this)" class="news-cat-tab bg-blue-600 text-white px-4 py-1.5 rounded-xl text-[11px] font-bold shrink-0">📈 Kinh tế</button>
                <button onclick="changeNewsCat('the-gioi', this)" class="news-cat-tab bg-white border border-slate-200 text-slate-500 px-4 py-1.5 rounded-xl text-[11px] font-bold shrink-0">🌍 Thế giới</button>
                <button onclick="changeNewsCat('cong-nghe', this)" class="news-cat-tab bg-white border border-slate-200 text-slate-500 px-4 py-1.5 rounded-xl text-[11px] font-bold shrink-0">📡 Công nghệ</button>
                <button onclick="changeNewsCat('thoi-su', this)" class="news-cat-tab bg-white border border-slate-200 text-slate-500 px-4 py-1.5 rounded-xl text-[11px] font-bold shrink-0">📰 Thời sự</button>
            </div>
        </div>

        <div class="p-4 grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="news-column">
                <div class="flex items-center gap-2 mb-4">
                    <span class="w-8 h-8 bg-[#9f224e] rounded-lg flex items-center justify-center text-white font-black text-[10px]">VNE</span>
                    <h3 class="font-black text-slate-800 text-sm uppercase tracking-tighter">VnExpress</h3>
                </div>
                <div id="news-col-vne" class="space-y-4"></div>
            </div>

            <div class="news-column">
                <div class="flex items-center gap-2 mb-4">
                    <span class="w-8 h-8 bg-[#e32] rounded-lg flex items-center justify-center text-white font-black text-[10px]">TT</span>
                    <h3 class="font-black text-slate-800 text-sm uppercase tracking-tighter">Tuổi Trẻ</h3>
                </div>
                <div id="news-col-tt" class="space-y-4"></div>
            </div>

            <div class="news-column">
                <div class="flex items-center gap-2 mb-4">
                    <span class="w-8 h-8 bg-[#005baa] rounded-lg flex items-center justify-center text-white font-black text-[10px]">VNN</span>
                    <h3 class="font-black text-slate-800 text-sm uppercase tracking-tighter">VietnamNet</h3>
                </div>
                <div id="news-col-vnn" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <div id="page-deposit" class="page-section bg-slate-50 min-h-screen p-4">
        <div class="bg-white rounded-3xl p-8 border shadow-sm text-center">
            <h3 class="font-bold mb-6" data-i18n="deposit_qr_title">Nạp P qua VietQR</h3>
            <img id="qr-img" src="" class="w-52 h-52 mx-auto mb-6 border rounded-2xl p-2 shadow-inner">
            <div class="bg-blue-50 p-4 rounded-xl border border-blue-100 text-sm font-black text-blue-600 uppercase">FORELY <span id="qr-user">USER</span></div>
        </div>
        <div class="grid grid-cols-2 gap-3 mt-6">
            <button onclick="genQR(50000)" class="bg-white p-4 border rounded-2xl font-bold hover:border-blue-500 transition-all">50,000 P</button>
            <button onclick="genQR(100000)" class="bg-white p-4 border rounded-2xl font-bold hover:border-blue-500 transition-all">100,000 P</button>
        </div>
    </div>

    <div id="page-rewards" class="page-section bg-slate-50 min-h-screen p-4">
        <div class="grid grid-cols-2 gap-4" id="reward-list"></div>
    </div>

    <div id="page-profile" class="page-section bg-white min-h-screen">
        <div class="p-10 text-center border-b bg-slate-50 rounded-b-[40px]">
            <img id="u-avatar" src="" class="w-24 h-24 rounded-full mx-auto border-4 border-white shadow-xl">
            <h2 id="u-name" class="mt-4 text-2xl font-black">User</h2>
            <div class="mt-6 flex gap-4">
                <div class="flex-1 bg-white p-4 rounded-2xl border shadow-sm text-center">

                    <p class="text-xl font-black u-balance">0</p>
                </div>

                    <p class="text-[10px] font-bold text-slate-300 uppercase mb-1">Dự báo đúng</p>
                    <p class="text-xl font-black text-teal-500">76%</p>
                </div>
            </div>
            <button onclick="auth.signOut(); location.reload();" class="mt-10 text-red-500 font-bold text-sm">ĐĂNG XUẤT</button>
        </div>

                <p class="text-[10px] font-black text-slate-300 uppercase mb-4">Biểu đồ hiệu suất</p>

            </div>
        </div>
    </div>

    <div id="login-modal" class="modal">
        <div class="bg-white w-[88%] max-w-sm rounded-[40px] p-10 text-center shadow-2xl">
            <h2 class="text-2xl font-black mb-8">Forely Access</h2>
            <button onclick="loginGoogle()" class="w-full bg-slate-900 text-white py-4 rounded-2xl flex items-center justify-center gap-3 active:scale-95 transition-all">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-5 h-5">
                <span class="text-sm font-bold">Tiếp tục với Google</span>
            </button>
            <button onclick="closeModal('login-modal')" class="mt-6 text-xs font-bold text-slate-300">Đóng</button>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t flex justify-around py-3 z-[100] shadow-2xl">
        <button onclick="switchPage('home')" id="nav-home" class="flex flex-col items-center gap-1 w-1/5 text-blue-600 transition-all"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span class="text-[9px] font-black uppercase">Thị trường</span></button>
        <button onclick="switchPage('news')" id="nav-news" class="flex flex-col items-center gap-1 w-1/5 text-slate-300 transition-all"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg><span class="text-[9px] font-black uppercase">Tin tức</span></button>
        <button onclick="switchPage('deposit')" id="nav-deposit" class="flex flex-col items-center gap-1 w-1/5 text-slate-300 transition-all"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg><span class="text-[9px] font-black uppercase">Nạp P</span></button>
        <button onclick="switchPage('rewards')" id="nav-rewards" class="flex flex-col items-center gap-1 w-1/5 text-slate-300 transition-all"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg><span class="text-[9px] font-black uppercase">Quà</span></button>
        <button onclick="switchPage('profile')" id="nav-profile" class="flex flex-col items-center gap-1 w-1/5 text-slate-300 transition-all"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span class="text-[9px] font-black uppercase">Tôi</span></button>
    </div>

    <script>
        // --- 1. CONFIG ---
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vREHXHIoKFy_Vhds8sFY8pJzrvcLZItNS2O0hQTy8Z-JJ9TiwFvCYmQgWVyhLVpcyY1IheROL0ljntf/pub?gid=0&single=true&output=csv";
        const firebaseConfig = { apiKey: "AIzaSy...", authDomain: "forely-app.firebaseapp.com", projectId: "forely-app", storageBucket: "forely-app.appspot.com", messagingSenderId: "...", appId: "..." };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Cấu hình RSS Tin tức
        const NEWS_SOURCES = {
            'kinh-doanh': {
                vne: 'https://vnexpress.net/rss/kinh-doanh.rss',
                tt: 'https://tuoitre.vn/rss/kinh-doanh.rss',
                vnn: 'https://vietnamnet.vn/rss/kinh-doanh.rss'
            },
            'the-gioi': {
                vne: 'https://vnexpress.net/rss/the-gioi.rss',
                tt: 'https://tuoitre.vn/rss/the-gioi.rss',
                vnn: 'https://vietnamnet.vn/rss/the-gioi.rss'
            },
            'cong-nghe': {
                vne: 'https://vnexpress.net/rss/so-hoa.rss',
                tt: 'https://tuoitre.vn/rss/cong-nghe.rss',
                vnn: 'https://vietnamnet.vn/rss/cong-nghe.rss'
            },
            'thoi-su': {
                vne: 'https://vnexpress.net/rss/thoi-su.rss',
                tt: 'https://tuoitre.vn/rss/thoi-su.rss',
                vnn: 'https://vietnamnet.vn/rss/thoi-su.rss'
            }
        };

        // --- 2. STATE ---
        let user = null; let balance = 5000; let allEvents = []; let viewStatus = 'active'; let viewCat = 'Tất cả'; let currentNewsCat = 'kinh-doanh';

        // --- 3. NEWS LOGIC (3 COLUMNS) ---
        function changeNewsCat(cat, el) {
            currentNewsCat = cat;
            document.querySelectorAll('.news-cat-tab').forEach(b => {
                b.className = "news-cat-tab bg-white border border-slate-200 text-slate-500 px-4 py-1.5 rounded-xl text-[11px] font-bold shrink-0";
            });
            el.className = "news-cat-tab bg-blue-600 text-white px-4 py-1.5 rounded-xl text-[11px] font-bold shrink-0 shadow-md";
            fetchAllNews();
        }

        async function fetchAllNews() {
            const loader = document.getElementById('news-loader');
            loader.classList.remove('hidden');
            
            // Tải 3 luồng tin cùng lúc
            const sources = NEWS_SOURCES[currentNewsCat];
            await Promise.all([
                fetchSingleNews(sources.vne, 'news-col-vne', 'VnExpress'),
                fetchSingleNews(sources.tt, 'news-col-tt', 'Tuổi Trẻ'),
                fetchSingleNews(sources.vnn, 'news-col-vnn', 'VietnamNet')
            ]);
            
            loader.classList.add('hidden');
        }

        async function fetchSingleNews(rssUrl, containerId, sourceName) {
            const container = document.getElementById(containerId);
            container.innerHTML = "";
            try {
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`);
                const data = await res.json();
                if(data.status !== 'ok') throw new Error();
                
                container.innerHTML = data.items.slice(0, 6).map(item => {
                    let img = item.thumbnail || (item.description.match(/src\s*=\s*"(.+?)"/) ? item.description.match(/src\s*=\s*"(.+?)"/)[1] : "https://via.placeholder.com/150?text=Forely+News");
                    const date = new Date(item.pubDate);
                    const dateStr = `${date.getDate()}/${date.getMonth()+1}/${date.getFullYear()}`;
                    
                    return `
                    <a href="${item.link}" target="_blank" class="news-card block bg-white p-3 rounded-2xl border border-slate-100 shadow-sm">
                        <img src="${img}" class="w-full h-32 object-cover rounded-xl mb-3 shadow-inner">
                        <h4 class="text-xs font-bold text-slate-800 line-clamp-2 leading-snug mb-2">${item.title}</h4>
                        <div class="flex justify-between items-center text-[9px] font-bold text-slate-400 uppercase">
                            <span>${sourceName}</span>
                            <span>${dateStr}</span>
                        </div>
                    </a>`;
                }).join('');
            } catch (e) {
                container.innerHTML = `<p class="text-[10px] text-slate-300 italic py-4">Tạm thời lỗi tải tin...</p>`;
            }
        }

        // --- 4. CORE LOGIC (SHEETS, AUTH, NAVIGATION) ---
        function toggleMenu() { document.getElementById('side-menu').classList.toggle('active'); }
        function switchPage(p) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('page-active'));
            document.getElementById('page-'+p).classList.add('page-active');
            window.scrollTo(0,0);
            ['home','news','deposit','rewards','profile'].forEach(id => {
                const btn = document.getElementById('nav-'+id);
                if(btn) { btn.classList.toggle('text-blue-600', id===p); btn.classList.toggle('text-slate-300', id!==p); }
            });
            if(p==='news') fetchAllNews();
            if(p==='rewards') renderRewards();
            if(p==='profile' && user) initProfileChart();
        }

        function loginGoogle() { const p = new firebase.auth.GoogleAuthProvider(); auth.signInWithPopup(p).then(()=>closeModal('login-modal')).catch(e=>alert(e.message)); }
        auth.onAuthStateChanged(u => {
            if(u) {
                user = u;
                document.getElementById('auth-area').innerHTML = `<img src="${u.photoURL}" onclick="switchPage('profile')" class="w-9 h-9 rounded-full border-2 border-teal-500 shadow-sm cursor-pointer p-0.5">`;
                document.getElementById('u-name').innerText = u.displayName;
                document.getElementById('u-avatar').src = u.photoURL;
                document.getElementById('qr-user').innerText = u.displayName.split(' ').pop().toUpperCase();
            }
            updateUI();
        });

        function fetchEvents() {
            Papa.parse(SHEET_URL, { download: true, header: true, complete: res => {
                const now = new Date().getTime();
                allEvents = res.data.filter(r => r.Title).map((r, i) => ({ id: i, cat: r.Category, title: r.Title, yesRate: parseInt(r.YesRate)||50, deadline: r.Deadline, isActive: !(r.Status==='Ended' || (r.Deadline && new Date(r.Deadline).getTime() < now)), result: r.Result?r.Result.trim().toLowerCase():"" }));
                document.getElementById('loader').style.display='none'; document.getElementById('market-grid').classList.remove('hidden');
                renderGrid();
            }});
        }

        function renderGrid() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const grid = document.getElementById('market-grid');
            const filtered = allEvents.filter(e => (viewStatus==='active'?e.isActive:!e.isActive) && (viewCat==='Tất cả'||e.cat===viewCat) && e.title.toLowerCase().includes(term));
            grid.innerHTML = filtered.map(e => {
                let yC = "bg-blue-50 text-blue-600"; let nC = "bg-red-50 text-red-600"; let yI = ""; let nI = "";
                if(!e.isActive) {
                    yC = nC = "bg-slate-100 text-slate-400";
                    if(e.result==='có' || e.result==='yes') { yC="bg-teal-50 text-teal-700 border border-teal-200"; yI="🏆 "; }
                    else if(e.result==='không' || e.result==='no') { nC="bg-teal-50 text-teal-700 border border-teal-200"; nI="🏆 "; }
                }
                return `<div class="market-card p-3.5 rounded-3xl border shadow-sm flex flex-col justify-between h-44 cursor-pointer">
                    <div onclick="openEventDetail(${e.id})">
                        <div class="flex justify-between items-center mb-2 text-[9px] font-black uppercase">
                            <span class="text-slate-300 truncate w-16">${e.cat}</span>
                            <span class="${e.isActive?'text-blue-500':'text-orange-500'}">${e.isActive?'⏳':'🔒'} ${e.deadline||'2026'}</span>
                        </div>
                        <h3 class="text-[11px] font-bold text-slate-800 line-clamp-3 leading-snug h-10">${e.title}</h3>
                    </div>
                    <div class="flex gap-2">
                        <button class="flex-1 py-2 rounded-xl text-[10px] font-black ${yC}">${yI}CÓ ${e.yesRate}%</button>
                        <button class="flex-1 py-2 rounded-xl text-[10px] font-black ${nC}">${nI}KHÔNG</button>
                    </div>
                </div>`;
            }).join('');
        }

        // --- HELPERS ---
        function openEventDetail(id) { /* logic mở chi tiết */ switchPage('detail'); }
        function setViewStatus(s) { viewStatus = s; renderGrid(); }
        function setCat(c, el) { viewCat = c; document.querySelectorAll('.cat-tab').forEach(t=>t.className="cat-tab bg-white border border-slate-200 text-slate-600 px-4 py-1.5 rounded-full text-[11px] font-bold shrink-0"); el.className="cat-tab bg-slate-900 text-white px-4 py-1.5 rounded-full text-[11px] font-bold shrink-0 shadow-md"; renderGrid(); }
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function updateUI() { document.querySelectorAll('.u-balance').forEach(el => el.innerText = balance.toLocaleString() + ' P'); }
        function genQR(amt) { document.getElementById('qr-img').src = `https://img.vietqr.io/image/MB-123456789-compact2.png?amount=${amt}&addInfo=FORELY%20${user?user.displayName.split(' ').pop().toUpperCase():'USER'}`; }
        function renderRewards() { /* logic render quà */ }
        function initProfileChart() { /* logic chart */ }

        window.onload = () => { fetchEvents(); };
    </script>
</body>
</html>
