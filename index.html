<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forely - Nền tảng Nhận định Cộng đồng</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* Chuyển trang mượt */
        .page-section { display: none; animation: slideUp 0.3s ease-out; }
        .page-active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Modal & Side Menu */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal.active { display: flex; }

        #side-menu { fixed; inset: 0; z-index: 2000; visibility: hidden; transition: visibility 0.3s; }
        #side-menu.active { visibility: visible; }
        #menu-content { position: absolute; right: 0; top: 0; bottom: 0; width: 280px; bg-white; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        #side-menu.active #menu-content { transform: translateX(0); }
        #menu-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.3s; }
        #side-menu.active #menu-overlay { opacity: 1; }

        .brand-gradient { background: linear-gradient(135deg, #2563eb 0%, #0d9488 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #2dd4bf; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-24">

    <nav class="bg-white/95 backdrop-blur-md px-4 py-3 sticky top-0 z-[100] flex justify-between items-center border-b border-slate-100 shadow-sm">
        <div onclick="switchPage('home')" class="flex items-center gap-2 cursor-pointer">
            <svg width="30" height="30" viewBox="0 0 120 120">
                <defs><linearGradient id="g" x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stop-color="#2563eb" /><stop offset="100%" stop-color="#2dd4bf" /></linearGradient></defs>
                <circle cx="60" cy="60" r="48" stroke="url(#g)" stroke-width="10" fill="none"/>
                <path d="M40 80 L85 35 L65 90 L55 65 Z" fill="url(#g)"/><path d="M40 80 L85 35 L30 60 L55 65 Z" fill="#1e293b"/>
            </svg>
            <span class="text-2xl font-black brand-gradient tracking-tighter">Forely</span>
        </div>
        
        <div class="flex items-center gap-3">
            <div id="auth-area">
                <button onclick="openModal('login-modal')" class="bg-blue-600 text-white text-[11px] font-bold px-4 py-1.5 rounded-full shadow-md" data-i18n="login_btn">Log In</button>
            </div>
            <button onclick="toggleMenu()" class="p-2 bg-slate-50 rounded-xl text-slate-500 active:bg-slate-200 transition-colors">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
            </button>
        </div>
    </nav>

    <div id="side-menu">
        <div id="menu-overlay" onclick="toggleMenu()"></div>
        <div id="menu-content" class="bg-white shadow-2xl flex flex-col">
            <div class="p-6 border-b flex justify-between items-center bg-slate-50">
                <h3 class="font-black text-slate-800" data-i18n="menu_settings">Cài đặt hệ thống</h3>
                <button onclick="toggleMenu()" class="text-slate-400 text-2xl font-light">×</button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-6 space-y-8">
                <div>
                    <label class="text-[10px] font-black text-slate-300 uppercase tracking-widest block mb-3" data-i18n="p_lang">Ngôn ngữ</label>
                    <div class="grid grid-cols-2 gap-2 bg-slate-100 p-1 rounded-xl">
                        <button onclick="switchLang('vi')" id="btn-vi" class="py-2 text-xs font-bold rounded-lg bg-white shadow-sm transition-all">Tiếng Việt</button>
                        <button onclick="switchLang('en')" id="btn-en" class="py-2 text-xs font-bold rounded-lg text-slate-500 transition-all">English</button>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-black text-slate-300 uppercase tracking-widest block mb-3" data-i18n="menu_theme">Giao diện</label>
                    <div class="flex items-center justify-between bg-slate-50 p-4 rounded-2xl border">
                        <span class="text-sm font-bold text-slate-700" data-i18n="menu_darkmode">Chế độ tối</span>
                        <div class="w-10 h-6 bg-slate-200 rounded-full relative p-1 cursor-not-allowed"><div class="w-4 h-4 bg-white rounded-full shadow-sm"></div></div>
                    </div>
                </div>

                <div class="space-y-3">
                    <label class="text-[10px] font-black text-slate-300 uppercase tracking-widest block" data-i18n="menu_info">Thông tin</label>
                    <a href="#" class="block text-sm font-bold text-slate-600 py-2 border-b border-slate-50" data-i18n="menu_terms">Điều khoản sử dụng</a>
                    <a href="#" class="block text-sm font-bold text-slate-600 py-2 border-b border-slate-50" data-i18n="menu_policy">Chính sách bảo mật</a>
                    <a href="mailto:support@forely.vn" class="block text-sm font-bold text-slate-600 py-2 border-b border-slate-50" data-i18n="menu_support">Liên hệ hỗ trợ</a>
                </div>
            </div>

            <div class="p-6 border-t text-center">
                <p class="text-[10px] text-slate-300 font-bold">FORELY APP v2.0.26</p>
            </div>
        </div>
    </div>

    <div id="page-home" class="page-section page-active">
        <div class="bg-white sticky top-[58px] z-40 border-b border-slate-100">
            <div class="px-4 pt-3 pb-2">
                <div class="relative">
                    <input type="text" id="search-input" oninput="renderGrid()" placeholder="Tìm nhận định..." class="w-full bg-slate-50 border border-slate-200 rounded-xl py-2.5 pl-10 pr-4 text-sm focus:ring-2 focus:ring-blue-500/20 outline-none" data-i18n-placeholder="search_placeholder">
                    <span class="absolute left-3.5 top-3 text-slate-400">🔍</span>
                </div>
                <div class="flex gap-2 mt-3 bg-slate-100 p-1 rounded-lg">
                    <button onclick="setViewStatus('active')" id="tab-active" class="flex-1 py-1.5 text-xs font-bold rounded-md bg-white text-blue-600 shadow-sm" data-i18n="tab_active">🟢 Đang mở</button>
                    <button onclick="setViewStatus('ended')" id="tab-ended" class="flex-1 py-1.5 text-xs font-bold rounded-md text-slate-500" data-i18n="tab_ended">⏳ Lịch sử</button>
                </div>
            </div>
            <div class="flex gap-2 overflow-x-auto px-4 pb-3 no-scrollbar">
                <button onclick="setCat('Tất cả', this)" class="cat-tab bg-slate-900 text-white px-4 py-1.5 rounded-full text-[11px] font-bold shrink-0">Tất cả</button>
                <button onclick="setCat('Kinh tế vĩ mô', this)" class="cat-tab bg-white border border-slate-200 text-slate-600 px-4 py-1.5 rounded-full text-[11px] font-bold shrink-0">Kinh tế vĩ mô</button>
                <button onclick="setCat('Chính sách', this)" class="cat-tab bg-white border border-slate-200 text-slate-600 px-4 py-1.5 rounded-full text-[11px] font-bold shrink-0">Chính sách</button>
                <button onclick="setCat('Giải trí - Xã hội', this)" class="cat-tab bg-white border border-slate-200 text-slate-600 px-4 py-1.5 rounded-full text-[11px] font-bold shrink-0">Giải trí - Xã hội</button>
                <button onclick="setCat('Hạ tầng - BĐS', this)" class="cat-tab bg-white border border-slate-200 text-slate-600 px-4 py-1.5 rounded-full text-[11px] font-bold shrink-0">Hạ tầng - BĐS</button>
                <button onclick="setCat('Công nghệ', this)" class="cat-tab bg-white border border-slate-200 text-slate-600 px-4 py-1.5 rounded-full text-[11px] font-bold shrink-0">Công nghệ</button>
                <button onclick="setCat('Thể thao', this)" class="cat-tab bg-white border border-slate-200 text-slate-600 px-4 py-1.5 rounded-full text-[11px] font-bold shrink-0">Thể thao</button>
            </div>
        </div>
        <div id="loader" class="py-20 text-center"><div class="loader"></div></div>
        <div id="market-grid" class="p-4 grid grid-cols-2 gap-3.5 md:grid-cols-3 lg:grid-cols-4 hidden"></div>
    </div>

    <div id="page-news" class="page-section bg-slate-50 min-h-screen">
        <div class="p-4 bg-white border-b font-bold" data-i18n="news_title">Tin tức thị trường</div>
        <div id="news-container" class="p-4 flex flex-col gap-4"></div>
    </div>

    <div id="page-deposit" class="page-section bg-slate-50 p-4 min-h-screen">
        <div class="bg-white rounded-3xl p-6 border text-center shadow-sm">
            <h3 class="font-bold mb-4" data-i18n="deposit_qr_title">Nạp P qua VietQR</h3>
            <img id="qr-img" src="" class="w-48 h-48 mx-auto mb-4 border rounded-xl">
            <div class="bg-blue-50 p-3 rounded-lg border text-sm font-black text-blue-600 uppercase">FORELY <span id="qr-user">USER</span></div>
        </div>
    </div>

    <div id="page-rewards" class="page-section bg-slate-50 p-4 min-h-screen">
        <div class="grid grid-cols-2 gap-4" id="reward-list"></div>
    </div>

    <div id="page-profile" class="page-section bg-white min-h-screen">
        <div class="p-8 text-center border-b">
            <img id="u-avatar" src="" class="w-20 h-20 rounded-full mx-auto border-4 border-teal-500 shadow-md">
            <h2 id="u-name" class="mt-4 text-xl font-black">User Name</h2>
            <div class="mt-6 flex gap-3">
                <div class="flex-1 bg-slate-50 p-4 rounded-2xl border">
                    <p class="text-[9px] font-bold text-slate-400 uppercase" data-i18n="p_balance">Số dư</p>
                    <p class="text-lg font-black u-balance">0</p>
                </div>
            </div>
            <button onclick="auth.signOut(); location.reload();" class="mt-10 text-red-500 font-bold text-sm" data-i18n="logout">Đăng xuất</button>
        </div>
    </div>

    <div id="login-modal" class="modal">
        <div class="bg-white w-[85%] max-w-sm rounded-[32px] p-10 text-center shadow-2xl">
            <h2 class="text-2xl font-black mb-6">Forely Login</h2>
            <button onclick="loginGoogle()" class="w-full bg-white border border-slate-200 py-3.5 rounded-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-5 h-5">
                <span class="text-sm font-bold text-slate-700">Continue with Google</span>
            </button>
            <button onclick="closeModal('login-modal')" class="mt-6 text-xs text-slate-400" data-i18n="cancel">Đóng</button>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t flex justify-around py-2 z-50">
        <button onclick="switchPage('home')" id="nav-home" class="flex flex-col items-center gap-1 w-1/5 text-blue-600"><span class="text-xl">🧭</span><span class="text-[9px] font-bold" data-i18n="nav_markets">Thị trường</span></button>
        <button onclick="switchPage('news')" id="nav-news" class="flex flex-col items-center gap-1 w-1/5 text-gray-400"><span class="text-xl">📰</span><span class="text-[9px] font-bold" data-i18n="nav_news">Tin tức</span></button>
        <button onclick="switchPage('deposit')" id="nav-deposit" class="flex flex-col items-center gap-1 w-1/5 text-gray-400"><span class="text-xl">💳</span><span class="text-[9px] font-bold" data-i18n="nav_deposit">Nạp P</span></button>
        <button onclick="switchPage('rewards')" id="nav-rewards" class="flex flex-col items-center gap-1 w-1/5 text-gray-400"><span class="text-xl">🎁</span><span class="text-[9px] font-bold" data-i18n="nav_rewards">Quà</span></button>
        <button onclick="switchPage('profile')" id="nav-profile" class="flex flex-col items-center gap-1 w-1/5 text-gray-400"><span class="text-xl">👤</span><span class="text-[9px] font-bold" data-i18n="nav_account">Tôi</span></button>
    </div>

    <script>
        // --- 1. CONFIG ---
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vREHXHIoKFy_Vhds8sFY8pJzrvcLZItNS2O0hQTy8Z-JJ9TiwFvCYmQgWVyhLVpcyY1IheROL0ljntf/pub?gid=0&single=true&output=csv";
        const firebaseConfig = { apiKey: "AIzaSy...", authDomain: "forely-app.firebaseapp.com", projectId: "forely-app", storageBucket: "forely-app.appspot.com", messagingSenderId: "...", appId: "..." };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // --- 2. MULTI-LANG ---
        const i18n = {
            vi: {
                login_btn: "Đăng nhập", search_placeholder: "Tìm nhận định...", tab_active: "🟢 Đang mở", tab_ended: "⏳ Lịch sử",
                cat_all: "Tất cả", cat_eco: "Kinh tế vĩ mô", cat_policy: "Chính sách", cat_ent: "Giải trí - Xã hội", cat_infra: "Hạ tầng - BĐS", cat_tech: "Công nghệ", cat_sport: "Thể thao",
                news_title: "Tin tức thị trường", deposit_qr_title: "Nạp P qua VietQR", qr_content: "Nội dung chuyển khoản",
                p_balance: "Số dư", p_winrate: "Tỷ lệ thắng", logout: "Đăng xuất", menu_settings: "Cài đặt", p_lang: "Ngôn ngữ",
                nav_markets: "Thị trường", nav_news: "Tin tức", nav_deposit: "Nạp P", nav_rewards: "Quà", nav_account: "Cá nhân",
                menu_theme: "Giao diện", menu_darkmode: "Chế độ tối", menu_info: "Thông tin", menu_terms: "Điều khoản", menu_policy: "Bảo mật", menu_support: "Hỗ trợ", cancel: "Đóng"
            },
            en: {
                login_btn: "Log In", search_placeholder: "Search markets...", tab_active: "🟢 Active", tab_ended: "⏳ History",
                cat_all: "All", cat_eco: "Economy", cat_policy: "Policy", cat_ent: "Showbiz", cat_infra: "Infrastructure", cat_tech: "Tech", cat_sport: "Sports",
                news_title: "Market News", deposit_qr_title: "Deposit (VietQR)", qr_content: "Transfer Note",
                p_balance: "Balance", p_winrate: "Win Rate", logout: "Log Out", menu_settings: "Settings", p_lang: "Language",
                nav_markets: "Markets", nav_news: "News", nav_deposit: "Deposit", nav_rewards: "Rewards", nav_account: "Account",
                menu_theme: "Theme", menu_darkmode: "Dark Mode", menu_info: "Information", menu_terms: "Terms", menu_policy: "Privacy", menu_support: "Support", cancel: "Close"
            }
        };

        // --- 3. STATE ---
        let user = null; let balance = 5000; let allEvents = []; let viewStatus = 'active'; let viewCat = 'Tất cả';

        // --- 4. FUNCTIONS ---
        function toggleMenu() { document.getElementById('side-menu').classList.toggle('active'); }

        function switchLang(lang) {
            document.querySelectorAll('[data-i18n]').forEach(el => el.innerText = i18n[lang][el.getAttribute('data-i18n')]);
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => el.placeholder = i18n[lang][el.getAttribute('data-i18n-placeholder')]);
            document.getElementById('btn-vi').className = lang==='vi' ? "py-2 text-xs font-bold rounded-lg bg-white shadow-sm" : "py-2 text-xs font-bold rounded-lg text-slate-500";
            document.getElementById('btn-en').className = lang==='en' ? "py-2 text-xs font-bold rounded-lg bg-white shadow-sm" : "py-2 text-xs font-bold rounded-lg text-slate-500";
            localStorage.setItem('lang', lang);
        }

        function switchPage(p) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('page-active'));
            document.getElementById('page-'+p).classList.add('page-active');
            ['home','news','deposit','rewards','profile'].forEach(id => {
                const btn = document.getElementById('nav-'+id);
                if(btn) { btn.classList.toggle('text-blue-600', id===p); btn.classList.toggle('text-gray-400', id!==p); }
            });
            if(p==='news') fetch('https://api.rss2json.com/v1/api.json?rss_url=https://vnexpress.net/rss/kinh-doanh.rss').then(r=>r.json()).then(d=>{
                document.getElementById('news-container').innerHTML = d.items.slice(0,10).map(i => `<a href="${i.link}" target="_blank" class="block bg-white p-4 rounded-2xl border shadow-sm text-sm font-bold">${i.title}</a>`).join('');
            });
            if(p==='rewards') {
                document.getElementById('reward-list').innerHTML = [{n:"Thẻ 20k", p:20000},{n:"Voucher 50k", p:50000}].map(r => `<div class="bg-white p-4 rounded-2xl border text-center font-bold">${r.n}<button class="w-full bg-slate-900 text-white py-2 rounded-xl mt-3 text-xs">Đổi ${r.p.toLocaleString()} P</button></div>`).join('');
            }
        }

        // --- 5. AUTH & DATA ---
        function loginGoogle() { const p = new firebase.auth.GoogleAuthProvider(); auth.signInWithPopup(p).then(()=>closeModal('login-modal')).catch(e=>alert(e.message)); }
        auth.onAuthStateChanged(u => {
            if(u) {
                user = u;
                document.getElementById('auth-area').innerHTML = `<img src="${u.photoURL}" onclick="switchPage('profile')" class="w-8 h-8 rounded-full border-2 border-teal-500 shadow-sm cursor-pointer">`;
                document.getElementById('u-name').innerText = u.displayName;
                document.getElementById('u-avatar').src = u.photoURL;
                document.getElementById('qr-user').innerText = u.displayName.split(' ').pop().toUpperCase();
            }
            updateUI();
        });

        function fetchEvents() {
            Papa.parse(SHEET_URL, { download: true, header: true, complete: res => {
                const now = new Date().getTime();
                allEvents = res.data.filter(r => r.Title).map((r, i) => ({ id: i, cat: r.Category, title: r.Title, yesRate: parseInt(r.YesRate)||50, deadline: r.Deadline, isActive: !(r.Status==='Ended' || (r.Deadline && new Date(r.Deadline).getTime() < now)), result: r.Result?r.Result.trim().toLowerCase():"" }));
                document.getElementById('loader').style.display='none'; document.getElementById('market-grid').classList.remove('hidden');
                renderGrid();
            }});
        }

        function renderGrid() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const grid = document.getElementById('market-grid');
            const filtered = allEvents.filter(e => (viewStatus==='active'?e.isActive:!e.isActive) && (viewCat==='Tất cả'||e.cat===viewCat) && e.title.toLowerCase().includes(term));
            grid.innerHTML = filtered.map(e => {
                let yC = "bg-blue-50 text-blue-600"; let nC = "bg-red-50 text-red-600"; let yI = ""; let nI = "";
                if(!e.isActive) {
                    yC = nC = "bg-slate-100 text-slate-400";
                    if(e.result==='có' || e.result==='yes') { yC="bg-teal-50 text-teal-700 border border-teal-200"; yI="🏆 "; }
                    else if(e.result==='không' || e.result==='no') { nC="bg-teal-50 text-teal-700 border border-teal-200"; nI="🏆 "; }
                }
                return `<div class="bg-white p-3.5 rounded-2xl border border-slate-100 shadow-sm flex flex-col justify-between h-44">
                    <div>
                        <div class="flex justify-between items-center mb-2 text-[9px] font-black uppercase">
                            <span class="text-slate-300 truncate w-16">${e.cat}</span>
                            <span class="${e.isActive?'text-blue-500':'text-orange-500'}">${e.isActive?'⏳':'🔒'} ${e.deadline||'2026'}</span>
                        </div>
                        <h3 class="text-[11px] font-bold text-slate-800 line-clamp-3 leading-snug h-10">${e.title}</h3>
                    </div>
                    <div class="flex gap-2">
                        <button class="flex-1 py-2 rounded-xl text-[10px] font-black ${yC}">${yI}CÓ ${e.yesRate}%</button>
                        <button class="flex-1 py-2 rounded-xl text-[10px] font-black ${nC}">${nI}KHÔNG</button>
                    </div>
                </div>`;
            }).join('');
        }

        function genQR(amt) { document.getElementById('qr-img').src = `https://img.vietqr.io/image/MB-123456789-compact2.png?amount=${amt}&addInfo=FORELY%20${user?user.displayName.split(' ').pop().toUpperCase():'USER'}`; }
        function setViewStatus(s) { viewStatus = s; renderGrid(); }
        function setCat(c, el) { viewCat = c; document.querySelectorAll('.cat-tab').forEach(t=>t.className="cat-tab bg-white border border-slate-200 text-slate-600 px-4 py-1.5 rounded-full text-[11px] font-bold shrink-0"); el.className="cat-tab bg-slate-900 text-white px-4 py-1.5 rounded-full text-[11px] font-bold shrink-0 shadow-md"; renderGrid(); }
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function updateUI() { document.querySelectorAll('.u-balance').forEach(el => el.innerText = balance.toLocaleString()); }

        window.onload = () => { fetchEvents(); switchLang(localStorage.getItem('lang')||'vi'); };
    </script>
</body>
</html>
